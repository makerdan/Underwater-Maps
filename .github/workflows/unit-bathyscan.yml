name: Unit Tests — BathyScan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-bathyscan:
    name: BathyScan vitest suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs (generate types for @workspace/api-client-react)
        run: pnpm run typecheck:libs

      - name: Run BathyScan unit tests
        run: pnpm --filter @workspace/bathyscan run test:unit --reporter=verbose
