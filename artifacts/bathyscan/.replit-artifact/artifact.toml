kind = "web"
previewPath = "/"
title = "BathyScan — 3D Seafloor Explorer"
version = "1.0.0"
id = "artifacts/bathyscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23993

[services.development]
run = "pnpm --filter @workspace/bathyscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bathyscan", "run", "build" ]
publicDir = "artifacts/bathyscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23993"
BASE_PATH = "/"
