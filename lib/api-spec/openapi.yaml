  /datasets/bbox-query:
    post:
      operationId: postDatasetsBboxQuery
      tags: [datasets]
      summary: Find catalog datasets whose coverage intersects a bounding box
      description: |
        Returns the dataset catalog entries whose coverage bounding box
        intersects the request bbox. Use this for "give me data for this area"
        queries drawn on the 2D overview map.

        Validation rules:
          * north > south, east > west
          * latitudes clamped to [-90, 90], longitudes clamped to [-180, 180]
          * zero-area or near-zero-area bboxes are rejected
          * antimeridian-crossing bboxes (east < west) are rejected
          * boxes spanning more than 180° in longitude or 170° in latitude
            are rejected as "too large"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [north, south, east, west]
              properties:
                north: { type: number, minimum: -90, maximum: 90, description: Northern latitude in decimal degrees }
                south: { type: number, minimum: -90, maximum: 90, description: Southern latitude in decimal degrees }
                east:  { type: number, minimum: -180, maximum: 180, description: Eastern longitude in decimal degrees }
                west:  { type: number, minimum: -180, maximum: 180, description: Western longitude in decimal degrees }
                dataType:
                  type: string
                  enum: [bathymetry, substrate, habitat, lidar, chart]
                waterType:
                  type: string
                  enum: [saltwater, freshwater]
      responses:
        "200":
          description: Catalog entries intersecting the bbox, ordered by relevance
          content:
            application/json:
              schema:
                type: object
                required: [bbox, datasets]
                properties:
                  bbox:
                    type: object
                    required: [north, south, east, west]
                    properties:
                      north: { type: number }
                      south: { type: number }
                      east:  { type: number }
                      west:  { type: number }
                  datasets:
                    type: array
                    items:
                      $ref: "#/components/schemas/DatasetCatalogSearchResult"
        "400":
          description: Invalid bbox (zero area, antimeridian, out of range, or too large)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/point-radius-query:
    post:
      operationId: postDatasetsPointRadiusQuery
      tags: [datasets]
      summary: Find catalog datasets whose coverage intersects a circle around a point
      description: |
        Converts a center point plus radius into a latitude-corrected bounding
        box (the longitude span widens toward the poles) and returns the
        dataset catalog entries whose coverage bbox intersects it. The circle
        is approximated by its bounding box, matching the bbox-query
        intersection logic, and the response reuses the same dataset shape.

        Validation rules:
          * lat must be within [-90, 90]; lon is normalized to [-180, 180]
          * radius must be at least ~0.0055 km (half the minimum bbox span)
            and at most ~9399 km (half the maximum bbox latitude span)
          * unit selects kilometers (km, default) or nautical miles (nmi)
          * circles whose bbox would span more than 180° of longitude at the
            given latitude are rejected (too close to a pole)
          * circles whose bbox would cross the antimeridian are rejected
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lon, radius]
              properties:
                lat: { type: number, minimum: -90, maximum: 90, description: Center latitude in decimal degrees }
                lon: { type: number, minimum: -180, maximum: 180, description: Center longitude in decimal degrees }
                radius: { type: number, minimum: 0, description: Search radius in the selected unit }
                unit:
                  type: string
                  enum: [km, nmi]
                  default: km
                  description: Radius unit — kilometers or nautical miles
                dataType:
                  type: string
                  enum: [bathymetry, substrate, habitat, lidar, chart]
                waterType:
                  type: string
                  enum: [saltwater, freshwater]
      responses:
        "200":
          description: Catalog entries intersecting the circle's bounding box, ordered by relevance
          content:
            application/json:
              schema:
                type: object
                required: [center, radiusKm, bbox, datasets]
                properties:
                  center:
                    type: object
                    required: [lat, lon]
                    properties:
                      lat: { type: number }
                      lon: { type: number }
                  radiusKm:
                    type: number
                    description: The radius converted to kilometers
                  bbox:
                    type: object
                    required: [north, south, east, west]
                    properties:
                      north: { type: number }
                      south: { type: number }
                      east:  { type: number }
                      west:  { type: number }
                  datasets:
                    type: array
                    items:
                      $ref: "#/components/schemas/DatasetCatalogSearchResult"
        "400":
          description: Invalid center point, radius out of range, or circle crossing the antimeridian / spanning too much longitude
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ncei/search:
    get:
      operationId: getNceiSearch
      tags: [datasets]
      summary: Search the NCEI Bathymetry Geoportal
      description: |
        Proxies a keyword + optional bounding-box search against the NCEI
        Bathymetry Geoportal (ncei.noaa.gov/maps/bathymetry/). Results are
        normalised, filtered to records with a valid bbox, and cached for
        10 minutes. When q is empty the proxy defaults to "bathymetry" to
        avoid returning non-ocean datasets from the NCEI catalog.
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Free-text keyword query (e.g. "Sitka bathymetry", "Alaska DEM")
        - in: query
          name: bbox
          required: false
          schema:
            type: string
          description: Spatial filter as "minLon,minLat,maxLon,maxLat"
        - in: query
          name: broad
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When true and q is empty, skip the implicit "bathymetry" keyword
            default so the search returns all NCEI record types in the area
            (used by the "Other data in this area" reference listing).
        - in: query
          name: from
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 1-based result offset for pagination (default 1)
        - in: query
          name: max
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of results to return per page (default 20)
      responses:
        "200":
          description: Normalised list of matching NCEI portal results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NceiPortalResult"
        "503":
          description: NCEI Geoportal is unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ncei/save:
    post:
      operationId: postNceiSave
      tags: [datasets]
      summary: Save an NCEI portal result to the user's library
      description: |
        Upserts an NCEI portal result into the dataset catalog (with a
        `ncei-portal-{id}` slug) and queues terrain materialisation via the
        NCEI WCS mosaics. Requires authentication. Idempotent — returns the
        existing save row if one is already in progress or ready.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NceiPortalSaveBody"
      responses:
        "200":
          description: Existing save row returned (already saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "201":
          description: New save job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "400":
          description: Invalid request body or dataset has no WCS coverage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/catalog/{id}/save:
    post:
      operationId: postDatasetsCatalogIdSave
      tags: [datasets]
      summary: Save a catalog dataset to the user's account
      description: Queues a catalog dataset for caching and associates it with the authenticated user's account. Returns a save job record.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Catalog dataset ID
      responses:
        "201":
          description: Save job created (status queued or ready)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Catalog entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves:
    get:
      operationId: getDatasetsMySaves
      tags: [datasets]
      summary: List the authenticated user's saved catalog datasets
      description: Returns all catalog datasets the user has saved, joined with catalog metadata.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of user save records with embedded catalog metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}:
    delete:
      operationId: deleteDatasetsMySavesId
      tags: [datasets]
      summary: Delete a saved catalog dataset
      description: |
        Removes the user's `user_catalog_saves` row and, if the save has been
        materialized, the linked `custom_datasets` row (terrain + overview
        grids) as well. Ownership is enforced — only the user that created
        the save may delete it.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "204":
          description: Save deleted
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}/status:
    get:
      operationId: getDatasetsMySavesIdStatus
      tags: [datasets]
      summary: Poll the status of a user's save job
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "200":
          description: Current status of the save job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}/retry:
    post:
      operationId: postDatasetsMySavesIdRetry
      tags: [datasets]
      summary: Retry materialization of a failed save
      description: |
        Re-runs materialization for a save row that previously failed. Flips
        the row status back to `processing`, clears the prior `errorMessage`,
        and kicks off the materialization pipeline again. If the save is
        already `processing` or `ready`, returns the current row unchanged.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "200":
          description: Save row after retry (status processing, or unchanged if not retryable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record or catalog entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /surface-conditions:
    get:
      operationId: getSurfaceConditions
      tags: [drift-planner]
      summary: Fetch hourly surface weather and tidal conditions for drift planning
      description: |
        Returns 48 hours of hourly wind, tidal current, and wave data for a given
        lat/lon from Open-Meteo. Tidal current is approximated via a sinusoidal
        model when live data is unavailable. Returns estimatedConditions=true when
        Open-Meteo is unreachable and default values are substituted. The `hours`
        array contains the first 24 hours (backward-compatible); `forecast48h`
        contains all 48 hours with ISO timestamps and relative hour indices.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: 24-hour surface conditions array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurfaceConditions"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /weather-stations:
    get:
      operationId: getWeatherStations
      tags: [drift-planner]
      summary: Fetch nearby NOAA aviation weather station observations
      description: |
        Returns ASOS/AWOS station observations (wind, visibility, ceiling,
        temperature) for stations near the given lat/lon using the NOAA
        Weather API (api.weather.gov). Also returns the FAA WeatherCams URL
        for the resolved US state. Observations are cached for 10 minutes.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
        - name: radiusMiles
          in: query
          required: false
          schema:
            type: number
            default: 75
          description: Search radius in statute miles (default 75, max 500)
      responses:
        "200":
          description: Nearby weather stations with live observations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStationsResponse"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream NOAA API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /weather-station-obs:
    get:
      operationId: getWeatherStationObs
      tags: [drift-planner]
      summary: Fetch NOAA weather station observation nearest to a target time
      description: |
        Returns the archived NOAA ASOS/AWOS observation nearest to the requested
        `time` for a single station.  Queries the NOAA observation time-series
        endpoint and picks the feature with the smallest |obsTime − targetTime|
        within the available window.  Returns available=false when the station
        has no archived observations or the upstream API is unreachable.
      parameters:
        - name: stationId
          in: query
          required: true
          schema:
            type: string
          description: NOAA weather station ID (e.g. PAWD)
        - name: time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: ISO 8601 target datetime; the observation nearest to this time is returned
      responses:
        "200":
          description: Nearest NOAA observation or available=false on upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStationObsResponse"
        "400":
          description: Missing or invalid stationId or time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream NOAA API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /raws-stations:
    get:
      operationId: getRawsStations
      tags: [drift-planner]
      summary: Fetch nearby AOOS RAWS weather station list
      description: |
        Returns all RAWS (Remote Automatic Weather Station) stations within
        `radiusKm` kilometres of the given lat/lon, drawn from the AOOS ERDDAP
        catalog (cached 24 h). Returns available=false on ERDDAP failure so
        the UI degrades gracefully.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of dataset centre
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of dataset centre
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            default: 150
          description: Search radius in kilometres (default 150, max 500)
      responses:
        "200":
          description: Nearby RAWS stations or available=false on upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawsStationsResponse"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /raws-weather:
    get:
      operationId: getRawsWeather
      tags: [drift-planner]
      summary: Fetch latest observation for a single AOOS RAWS station
      description: |
        Returns the most-recent observation row for the given RAWS datasetId
        from the AOOS ERDDAP server. The datasetId must match the raws_* pattern.
        Results are cached 10 min on success, 2 min on failure.
        Returns available=false on ERDDAP failure so the UI degrades gracefully.
      parameters:
        - name: datasetId
          in: query
          required: true
          schema:
            type: string
          description: AOOS ERDDAP dataset ID (must match raws_* pattern)
      responses:
        "200":
          description: Latest RAWS observation or available=false on upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawsWeatherResponse"
        "400":
          description: Missing or invalid datasetId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /water-temperature:
    get:
      operationId: getWaterTemperature
      tags: [drift-planner]
      summary: Fetch current sea-surface temperature for a lat/lon point
      description: |
        Returns the current sea-surface temperature (°C) at the requested
        lat/lon from the Open-Meteo Marine API. Used by BathyScan's HUD
        temperature readout as the surface anchor of a thermocline model.
        Returns available=false when the live feed is unreachable so the
        caller can gracefully fall back to a synthetic estimate.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: Current sea-surface temperature for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterTemperature"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /temperature-profile:
    get:
      operationId: getTemperatureProfile
      tags: [drift-planner]
      summary: Fetch a depth-resolved temperature profile for a lat/lon point
      description: |
        Returns a real per-location temperature-vs-depth profile when one
        is available from a bundled CTD cast, an Argo float, or an
        oceanographic reanalysis dataset. The samples are sorted
        shallow→deep so a client can plot them directly. When no real
        profile is available the response is `{ available: false, ... }`
        and the caller is expected to fall back to its surface-anchored
        thermocline model.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
        - name: datasetId
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional preset dataset id (e.g. `thorne-bay`). When provided,
            the server prefers a bundled cast registered for that dataset
            over a generic nearest-neighbour lookup.
      responses:
        "200":
          description: Depth-resolved temperature profile for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureProfile"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /efh:
    get:
      operationId: getEfh
      tags: [datasets]
      summary: Essential Fish Habitat zones
      description: |
        Returns GeoJSON Essential Fish Habitat zone polygons for the requested area.
        Currently covers the Thorne Bay / Clarence Strait / SE Alaska region.
        Data credit: NOAA Fisheries / NMFS Alaska Region.
        https://www.fisheries.noaa.gov/resource/data/alaska-essential-fish-habitat-efh-species-shapefiles
      parameters:
        - name: datasetId
          in: query
          schema:
            type: string
          description: Filter to a known preset dataset's AOI (e.g. thorne-bay)
        - name: species
          in: query
          schema:
            type: string
          description: Comma-separated species names or common names to filter
      responses:
        "200":
          description: GeoJSON FeatureCollection of Essential Fish Habitat zone polygons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfhFeatureCollection"

  /efh/{id}:
    get:
      operationId: getEfhById
      tags: [datasets]
      summary: Essential Fish Habitat zones for a specific dataset
      description: |
        Returns GeoJSON Essential Fish Habitat zone polygons for the given dataset.

        Preset/catalog dataset IDs are public (no auth required). UUID-format (custom
        user-uploaded) dataset IDs require authentication and ownership — callers that
        are not the owner receive 404 rather than 403 to avoid confirming existence.

        If no EFH data is bundled for the requested dataset (e.g. a freshwater upload
        outside NOAA EFH coverage) the response is an empty FeatureCollection with
        HTTP 200.

        Data credit: NOAA Fisheries / NMFS Alaska Region.
        https://www.fisheries.noaa.gov/resource/data/alaska-essential-fish-habitat-efh-species-shapefiles
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Dataset ID (preset slug or UUID for a user-uploaded dataset)
        - in: query
          name: species
          required: false
          schema:
            type: string
          description: Comma-separated species names or common names to filter
      responses:
        "200":
          description: GeoJSON FeatureCollection of Essential Fish Habitat zone polygons (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfhFeatureCollection"
        "401":
          description: Unauthenticated — UUID dataset IDs require a valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or caller does not own the requested UUID dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/zones:
    get:
      operationId: getDatasetZones
      tags: [datasets]
      summary: Get AI-classified seafloor/lake-bed zones for a dataset
      description: Returns 1024 zone labels for the 32×32 coarse grid. Results are cached; a stable gridHash avoids redundant AI calls.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Dataset ID (UUID, "upload", or built-in preset ID)
        - in: query
          name: h
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{8}$|^[a-f0-9]{64}$'
          description: Lowercase hex hash of the depth grid (8-char FNV-1a or 64-char SHA-256) for cache keying
        - in: query
          name: w
          required: true
          schema:
            type: string
            enum: [saltwater, freshwater]
          description: Water type — must be 'saltwater' or 'freshwater'
      responses:
        "200":
          description: Zone classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/chunk:
    post:
      operationId: uploadDatasetChunk
      tags: [datasets]
      summary: Upload one chunk of a large dataset file
      description: Receives a single 5 MB slice of a file. The first chunk (chunkIndex=0) opens the upload session; subsequent chunks must come from the same authenticated user.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [uploadId, chunkIndex, totalChunks, file]
              properties:
                uploadId:
                  type: string
                  description: Stable UUID chosen by the client for this upload session
                chunkIndex:
                  type: integer
                  description: 0-based index of this slice
                totalChunks:
                  type: integer
                  description: Total number of slices the client will send
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Chunk received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/chunk/finalize:
    post:
      operationId: finalizeChunkedUpload
      tags: [datasets]
      summary: Finalize a chunked upload and start processing
      description: Called after all chunks have been sent. Enqueues an async job that reassembles chunks, parses the file, builds the terrain grid, and saves to DB. Returns a jobId to poll.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadId, fileName, totalChunks]
              properties:
                uploadId:
                  type: string
                fileName:
                  type: string
                totalChunks:
                  type: integer
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
      responses:
        "200":
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
        "400":
          description: Invalid parameters or missing chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Upload session belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Upload session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/jobs/{jobId}:
    get:
      operationId: getUploadJobStatus
      tags: [datasets]
      summary: Poll the status of a chunked-upload processing job
      description: Returns the current state of a background upload-processing job. Falls back to the database after a server restart.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [queued, processing, done, error]
                  progress:
                    type: integer
                  error:
                    type: string
                  datasetId:
                    type: string
        "403":
          description: Job belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/request-gcs-url:
    post:
      operationId: requestGcsUploadUrl
      tags: [datasets]
      summary: Get a presigned GCS PUT URL for oversized file uploads
      description: Generates a presigned GCS PUT URL for files >50 MB. The client uploads directly to GCS; the API server's memory is never involved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName]
              properties:
                fileName:
                  type: string
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                  objectKey:
                    type: string
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "415":
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/gcs-job-status:
    get:
      operationId: getGcsJobStatus
      tags: [datasets]
      summary: Check processing status for a GCS-backed upload job
      description: Returns the status of a GCS background-processing job by objectKey. The objectKey must belong to the authenticated user.
      parameters:
        - in: query
          name: objectKey
          required: true
          schema:
            type: string
          description: GCS object key returned by /datasets/upload/request-gcs-url
      responses:
        "200":
          description: GCS job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, processing, done, error]
                  datasetId:
                    type: string
                  error:
                    type: string
        "400":
          description: objectKey is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Object key does not belong to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tidal:
    get:
      operationId: getTidal
      tags: [tidal]
      summary: Current tide height, current speed/direction, and next high/low event
      description: Queries the nearest NOAA water-level and currents-prediction stations for the given coordinates and returns current conditions with slack window data.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees
        - in: query
          name: lon
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees
        - in: query
          name: datetime
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 datetime for the prediction (defaults to now)
      responses:
        "200":
          description: Current tidal conditions
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  tideHeight:
                    type: number
                  currentDirection:
                    type: number
                  currentSpeed:
                    type: number
                  nextEvent:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [high, low]
                      time:
                        type: string
                      height:
                        type: number
                  source:
                    type: string
                    enum: [noaa, estimated]
        "400":
          description: lat and lon are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tides/station:
    get:
      operationId: getTidesStation
      tags: [tidal]
      summary: Nearest NOAA tide station to a point
      description: Resolves the nearest NOAA water-level station to the given coordinates (e.g. a dataset bbox centroid) with the great-circle distance in statute miles. No distance cutoff is applied — the client decides whether to show a distance caveat.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees
        - in: query
          name: lon
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees
      responses:
        "200":
          description: Nearest station, or available=false when the NOAA station catalogue is unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  station:
                    $ref: "#/components/schemas/TideStation"
                required: [available]
        "400":
          description: lat and lon are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tides/{stationId}:
    get:
      operationId: getTidesStationId
      tags: [tidal]
      summary: 31-day window of 6-minute tide predictions for a station
      description: Returns a full 31-day window of 6-minute NOAA tide predictions in feet above MLLW, fetched in a single NOAA call and cached server-side for 24 hours. The window starts at UTC midnight of the current day.
      parameters:
        - in: path
          name: stationId
          required: true
          schema:
            type: string
            pattern: "^\\d{7}$"
          description: 7-digit NOAA station id
      responses:
        "200":
          description: Prediction window
          content:
            application/json:
              schema:
                type: object
                properties:
                  stationId:
                    type: string
                  windowStart:
                    type: string
                    format: date-time
                  windowEnd:
                    type: string
                    format: date-time
                  datum:
                    type: string
                    enum: [MLLW]
                  units:
                    type: string
                    enum: [feet]
                  predictions:
                    type: array
                    items:
                      type: object
                      properties:
                        t:
                          type: string
                          format: date-time
                          description: Sample timestamp (UTC, 6-minute cadence)
                        v:
                          type: number
                          description: Predicted tide height in feet above MLLW
                      required: [t, v]
                required: [stationId, windowStart, windowEnd, datum, units, predictions]
        "400":
          description: stationId must be a 7-digit NOAA station id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: NOAA predictions could not be retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tides/{stationId}/datums:
    get:
      operationId: getTidesStationIdDatums
      tags: [tidal]
      summary: MHW / MHHW tidal datums for a station
      description: Returns the Mean High Water and Mean Higher High Water datums for a NOAA station in feet above MLLW, fetched from the NOAA metadata API and cached server-side for 24 hours. Used by the intertidal classification settings to show what the band thresholds mean.
      parameters:
        - in: path
          name: stationId
          required: true
          schema:
            type: string
            pattern: "^\\d{7}$"
          description: 7-digit NOAA station id
      responses:
        "200":
          description: Station datums
          content:
            application/json:
              schema:
                type: object
                properties:
                  stationId:
                    type: string
                  mhwFt:
                    type: number
                    nullable: true
                    description: Mean High Water, feet above MLLW (null when NOAA has no value)
                  mhhwFt:
                    type: number
                    nullable: true
                    description: Mean Higher High Water, feet above MLLW (null when NOAA has no value)
                  datum:
                    type: string
                    enum: [MLLW]
                  units:
                    type: string
                    enum: [feet]
                required: [stationId, mhwFt, mhhwFt, datum, units]
        "400":
          description: stationId must be a 7-digit NOAA station id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: NOAA datums could not be retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tidal/schedule:
    get:
      operationId: getTidalSchedule
      tags: [tidal]
      summary: Multi-day tide schedule with slack windows
      description: Returns an ordered list of high/low tide events with slack windows and current direction changes for the requested location and day range.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lon
          required: true
          schema:
            type: number
        - in: query
          name: days
          required: false
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 14
          description: Number of days to return (1–14)
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 start datetime (defaults to now)
      responses:
        "200":
          description: Tide schedule
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  source:
                    type: string
                    enum: [noaa, estimated]
                  stationId:
                    type: string
                  stationName:
                    type: string
                  rangeStart:
                    type: string
                  rangeEnd:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [high, low]
                        time:
                          type: string
                        height:
                          type: number
                        nextDirectionDeg:
                          type: number
                        windowStart:
                          type: string
                        windowEnd:
                          type: string
        "400":
          description: lat and lon are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /healthz/deep:
    get:
      operationId: getDeepHealthz
      tags: [health]
      summary: Deep health probe — checks DB, Poe, and AOOS subsystems
      description: Probes each critical subsystem and returns per-subsystem status. Returns HTTP 503 when any subsystem is degraded. Use the shallow /healthz for load-balancer liveness probes.
      responses:
        "200":
          description: All subsystems healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthStatus"
        "503":
          description: One or more subsystems degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthStatus"

  /admin/bucket-monitor:
    get:
      operationId: adminBucketMonitor
      tags: [admin]
      summary: GCS dataset landing bucket processing summary
      description: Returns a JSON summary of all objects in the GCS dataset landing bucket broken down by status (pending, processing, done, failed). Restricted to admin users.
      responses:
        "200":
          description: Bucket status summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: integer
                  processing:
                    type: integer
                  done:
                    type: integer
                  failed:
                    type: integer
                  lifecycle:
                    type: object
                    properties:
                      processedDatasetsTtlDays:
                        type: integer
                      failedDatasetsTtlDays:
                        type: integer
                      note:
                        type: string
                      lastAppliedAt:
                        type: string
                        nullable: true
                      lastApplyError:
                        type: string
                        nullable: true
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/large-datasets-diff:
    get:
      operationId: adminLargeDatasetsDiff
      tags: [admin]
      summary: Detect Large_Datasets files that have changed since last import
      description: >
        Compares each file under the Large_Datasets/ GCS prefix against the
        x-goog-meta-source-md5 stamped on the corresponding processed-datasets/
        copy at import time. Returns entries for files whose content has changed
        ("changed") or that have never been imported ("unimported"). Restricted
        to admin users.
      responses:
        "200":
          description: Diff result
          content:
            application/json:
              schema:
                type: object
                required: [changedCount, unimportedCount, entries]
                properties:
                  changedCount:
                    type: integer
                    description: Number of files that were imported but have since changed.
                  unimportedCount:
                    type: integer
                    description: Number of Large_Datasets files that have never been imported.
                  entries:
                    type: array
                    items:
                      type: object
                      required: [filename, status]
                      properties:
                        filename:
                          type: string
                        largeDatasetsMd5:
                          type: string
                          nullable: true
                        recordedSourceMd5:
                          type: string
                          nullable: true
                        status:
                          type: string
                          enum: [changed, unimported]
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/export:
    get:
      operationId: exportUserData
      tags: [account]
      summary: Export all user data as a downloadable JSON file
      description: Returns markers, custom datasets, GPS trails, and settings as a JSON attachment. Used by Settings → Account & Privacy.
      responses:
        "200":
          description: Full user data export (JSON attachment)
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportedAt:
                    type: string
                  userId:
                    type: string
                  settings:
                    type: object
                    nullable: true
                  markers:
                    type: array
                    items:
                      type: object
                  customDatasets:
                    type: array
                    items:
                      type: object
                  trails:
                    type: array
                    items:
                      type: object

  /me:
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the authenticated user's account and all associated data
      description: Deletes all markers, custom datasets, GPS trails, trail points, and settings for the caller. This action is irreversible.
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deletedAt:
                    type: string

  /github/repos:
    get:
      operationId: listGithubRepos
      tags: [github]
      summary: List GitHub repositories accessible to the configured PAT
      description: Returns up to 100 repositories for the authenticated GitHub token.
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /github/repos/{owner}/{repo}/contents/{path}:
    get:
      operationId: getGithubFileContents
      tags: [github]
      summary: Read a file or list a directory from a GitHub repository
      description: Returns the file content (or directory listing) at the given path in the repository. Optionally accepts a `ref` query parameter to specify a branch or commit SHA.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
        - in: query
          name: ref
          required: false
          description: Branch name or commit SHA to read from
          schema:
            type: string
      responses:
        "200":
          description: File content or directory listing
          content:
            application/json:
              schema:
                type: object
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: putGithubFileContents
      tags: [github]
      summary: Create or update a file in a GitHub repository
      description: Creates or updates a file. Requires a commit message, base64-encoded content, and optionally the current blob SHA (for updates) and a branch name.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, content]
              properties:
                message:
                  type: string
                  description: Commit message
                content:
                  type: string
                  description: Base64-encoded file content
                sha:
                  type: string
                  description: Current blob SHA (required when updating an existing file)
                branch:
                  type: string
                  description: Target branch (defaults to repo default branch)
      responses:
        "200":
          description: File created or updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteGithubFileContents
      tags: [github]
      summary: Delete a file from a GitHub repository
      description: Deletes the file at the given path. Requires the current blob SHA and a commit message. Optionally accepts a branch name.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, sha]
              properties:
                message:
                  type: string
                  description: Commit message
                sha:
                  type: string
                  description: Current blob SHA of the file to delete
                branch:
                  type: string
                  description: Target branch (defaults to repo default branch)
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /query:
    post:
      operationId: queryTerrain
      tags: [query]
      summary: Natural-language terrain query via OpenAI tool calling ("Ask the Ocean")
      description: Receives a free-text query and terrain context. Sends to GPT with terrain tool schema and returns tool calls and/or a text response that the frontend executes locally. Rate-limited per user and per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Natural-language question or command about the terrain
                context:
                  type: object
                  properties:
                    datasetName:
                      type: string
                    waterType:
                      type: string
                    minDepth:
                      type: number
                    maxDepth:
                      type: number
                    cameraLon:
                      type: number
                      nullable: true
                    cameraLat:
                      type: number
                      nullable: true
                    cameraDepth:
                      type: number
                      nullable: true
                    topZones:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Query result with tool calls and/or text response
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolCalls:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        args:
                          type: object
                  textResponse:
                    type: string
                    nullable: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: OpenAI upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /poe/help:
    post:
      operationId: poeHelp
      tags: [poe]
      summary: Answer a BathyScan help question using Poe AI
      description: Receives a plain-text question (and optional conversation history) and returns a concise answer drawn from the built-in help articles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  maxLength: 1000
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
      responses:
        "200":
          description: Help answer
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
        "400":
          description: Missing or invalid question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/upscale:
    post:
      operationId: poeUpscale
      tags: [poe]
      summary: Upscale a 2D heatmap PNG via Poe (TopazLabs model)
      description: Accepts a base64-encoded PNG and an upscale factor (2 or 4). Returns the upscaled image as a base64 PNG. On failure returns a non-200 status so the frontend can fall back to the original bitmap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageBase64]
              properties:
                imageBase64:
                  type: string
                  description: "Base64-encoded PNG (with or without data: prefix)"
                upscaleFactor:
                  type: integer
                  minimum: 2
                  maximum: 4
                  default: 2
      responses:
        "200":
          description: Upscaled image
          content:
            application/json:
              schema:
                type: object
                properties:
                  imageBase64:
                    type: string
        "400":
          description: Missing imageBase64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: TopazLabs returned no image or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Circuit breaker open — upscale service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /routes:
    get:
      operationId: getRoutes
      tags: [routes]
      summary: List saved navigation routes for a dataset
      description: Returns all routes belonging to the authenticated user for the given dataset, ordered by creation time.
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset ID to filter routes by
      responses:
        "200":
          description: List of saved routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRoute"
        "400":
          description: datasetId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createRoute
      tags: [routes]
      summary: Create a new saved navigation route
      description: Saves a named waypoint sequence for the given dataset. Waypoints must contain at least 2 and at most 20 points.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [datasetId, name, waypoints, totalDistanceM]
              properties:
                datasetId:
                  type: string
                name:
                  type: string
                  maxLength: 120
                waypoints:
                  type: array
                  minItems: 2
                  maxItems: 20
                  items:
                    type: object
                    properties:
                      lon:
                        type: number
                      lat:
                        type: number
                      depth:
                        type: number
                totalDistanceM:
                  type: number
      responses:
        "201":
          description: Route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /routes/{id}:
    patch:
      operationId: patchRoute
      tags: [routes]
      summary: Rename a saved navigation route
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 120
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid id or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteRoute
      tags: [routes]
      summary: Delete a saved navigation route
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Route deleted
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /terrain/land:
    get:
      operationId: getTerrainLand
      tags: [terrain]
      summary: Fetch a land-elevation (DEM) grid for a bounding box
      description: |
        Returns a row-major NxN elevation grid sourced from the Copernicus DEM
        for the requested bounding box. Used to drape above-water terrain on the
        3-D canvas. No authentication required.
      parameters:
        - in: query
          name: bbox
          required: true
          schema:
            type: string
          description: '"minLon,minLat,maxLon,maxLat" — four comma-separated finite numbers'
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 32
            maximum: 256
            default: 128
          description: Grid side length N, clamped to [32, 256]
      responses:
        "200":
          description: Land elevation grid
          content:
            application/json:
              schema:
                type: object
                description: Elevation grid in the same shape as TerrainData (depths field contains above-water metres)
        "400":
          description: Invalid or out-of-range bbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream DEM fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /terrain/satellite-tile:
    get:
      operationId: getTerrainSatelliteTile
      tags: [terrain]
      summary: Proxy a satellite/aerial imagery PNG for a bounding box
      description: |
        Fetches and caches a PNG tile from ESRI World Imagery for the given
        bounding box. Returned as `image/png` and cached for 24 hours. The
        client drapes this over the LandTerrainMesh as a photo-realistic
        texture. Antimeridian-crossing bboxes (minLon > maxLon) are handled
        automatically. No authentication required.
      parameters:
        - in: query
          name: bbox
          required: true
          schema:
            type: string
          description: '"minLon,minLat,maxLon,maxLat" — four comma-separated finite numbers'
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 64
            maximum: 1024
            default: 512
          description: Image resolution in pixels, clamped to [64, 1024]
      responses:
        "200":
          description: PNG satellite tile
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid or degenerate bbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream tile fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /terrain/terrain-tile:
    get:
      operationId: getTerrainTerrainTile
      tags: [terrain]
      summary: Proxy a USGS hillshaded terrain PNG for a bounding box
      description: |
        Fetches and caches a PNG tile from the USGS National Map Shaded Relief
        MapServer for the given bounding box. Returned as `image/png` and cached
        for 24 hours. The client draws this as the bottom layer of the Overview
        Map (terrain → heatmap → satellite). Antimeridian-crossing bboxes
        (minLon > maxLon) are handled automatically. No authentication required.
      parameters:
        - in: query
          name: bbox
          required: true
          schema:
            type: string
          description: '"minLon,minLat,maxLon,maxLat" — four comma-separated finite numbers'
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 64
            maximum: 1024
            default: 512
          description: Image resolution in pixels, clamped to [64, 1024]
      responses:
        "200":
          description: PNG terrain tile
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid or degenerate bbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream tile fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /terrain/download/info:
    get:
      operationId: getTerrainDownloadInfo
      tags: [terrain]
      summary: Preflight for bbox terrain CSV download
      description: |
        Lightweight preflight that resolves the upstream data source, nominal
        resolution, and water-cell fraction for the requested bounding box
        without transferring the full grid. The client uses `waterFraction` to
        estimate point counts locally (estimatedPoints = resolution² ×
        waterFraction) so resolution switching is instant. Max bbox: 10° × 10°.
        Authentication required.
      security:
        - clerkAuth: []
      parameters:
        - in: query
          name: north
          required: true
          schema:
            type: number
        - in: query
          name: south
          required: true
          schema:
            type: number
        - in: query
          name: east
          required: true
          schema:
            type: number
        - in: query
          name: west
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Preflight result
          content:
            application/json:
              schema:
                type: object
                required: [sourceName, dataSource, nominalResolutionM, waterFraction]
                properties:
                  sourceName:
                    type: string
                    description: Human-readable name of the upstream data source
                  dataSource:
                    type: string
                    enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
                  nominalResolutionM:
                    type: number
                    description: Nominal grid resolution in metres (0 when synthetic)
                  waterFraction:
                    type: number
                    minimum: 0
                    maximum: 1
                    description: Fraction of the probe grid cells that contain water (0–1)
        "400":
          description: Invalid or out-of-range bbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream preflight failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /terrain/download:
    get:
      operationId: getTerrainDownload
      tags: [terrain]
      summary: Stream a terrain CSV for a bounding box
      description: |
        Builds the full bathymetric grid for the requested bbox and streams it
        as a `text/csv` attachment with columns `lon,lat,depth`. Only water
        cells (depth > 0) are emitted; land and topography are excluded. Max
        bbox: 10° × 10°. Resolution must be one of 64, 256, or 512.
        Authentication required.
      security:
        - clerkAuth: []
      parameters:
        - in: query
          name: north
          required: true
          schema:
            type: number
        - in: query
          name: south
          required: true
          schema:
            type: number
        - in: query
          name: east
          required: true
          schema:
            type: number
        - in: query
          name: west
          required: true
          schema:
            type: number
        - in: query
          name: resolution
          required: false
          schema:
            type: integer
            enum: [64, 256, 512]
            default: 256
      responses:
        "200":
          description: CSV file attachment (lon,lat,depth rows)
          content:
            text/csv:
              schema:
                type: string
        "400":
          description: Invalid bbox or out-of-range parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tidal/pack:
    get:
      operationId: getTidalPack
      tags: [tidal]
      summary: Packed tide-height and current predictions for a location
      description: |
        Returns the nearest NOAA tide-heights station name, an array of
        6-minute height predictions, and an array of max-slack current
        predictions for the requested lat/lon. Falls back to a synthetic
        harmonic model when no NOAA station is reachable. Intended for offline
        packs and pre-fetch scenarios. No authentication required.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
        - in: query
          name: lon
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 3
            maximum: 14
            default: 7
          description: Number of days of predictions to return (clamped to [3, 14])
      responses:
        "200":
          description: Packed tidal predictions
          content:
            application/json:
              schema:
                type: object
                required: [station, generatedAt, heightPredictions, currentPredictions, tidalExpiresAt]
                properties:
                  station:
                    type: string
                    nullable: true
                    description: Name or ID of the nearest NOAA station, or null when synthetic
                  generatedAt:
                    type: string
                    format: date-time
                  tidalExpiresAt:
                    type: string
                    format: date-time
                    description: ISO timestamp marking the end of the prediction window
                  heightPredictions:
                    type: array
                    items:
                      type: object
                      required: [t, v]
                      properties:
                        t:
                          type: string
                          format: date-time
                        v:
                          type: number
                          description: Water level in metres (MLLW datum)
                  currentPredictions:
                    type: array
                    items:
                      type: object
                      required: [t, speed, dir]
                      properties:
                        t:
                          type: string
                          format: date-time
                        speed:
                          type: number
                          description: Current speed in metres per second
                        dir:
                          type: number
                          description: Current direction in degrees true
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /weather/pack:
    get:
      operationId: getWeatherPack
      tags: [drift-planner]
      summary: Weather snapshot for offline packs
      description: |
        Returns the nearest NOAA ASOS weather station observation for the
        requested lat/lon. Intended for offline-pack pre-fetches. Falls back
        gracefully when NOAA is unreachable (returns null fields). No
        authentication required.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
        - in: query
          name: lon
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
      responses:
        "200":
          description: Weather snapshot
          content:
            application/json:
              schema:
                type: object
                required: [station, observation, snapshotAt]
                properties:
                  station:
                    type: string
                    nullable: true
                    description: Station name, or null when unavailable
                  observation:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/WeatherStation"
                  snapshotAt:
                    type: string
                    format: date-time
        "400":
          description: Missing or out-of-range lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/presets/{id}:
    delete:
      operationId: deleteDatasetPreset
      tags: [datasets]
      summary: Disable a built-in preset dataset
      description: |
        Marks a known preset dataset ID as disabled by inserting a row into the
        `disabled_presets` table. The preset will no longer appear in the
        standard dataset list for any user. Idempotent — calling with an already-
        disabled ID is a no-op. No authentication required (admin protection is
        applied at the network/reverse-proxy layer for this endpoint).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
          description: Preset dataset ID (alphanumeric, hyphens, underscores)
      responses:
        "204":
          description: Preset disabled (or was already disabled)
        "400":
          description: Invalid preset ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Unknown preset ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /github/repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches:
    post:
      operationId: postGithubWorkflowDispatch
      tags: [github]
      summary: Trigger a GitHub Actions workflow_dispatch event
      description: |
        Dispatches a `workflow_dispatch` event for the given workflow. The
        `ref` field (branch or tag) is required. Optional `inputs` are passed
        through to the workflow as-is.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: workflow_id
          required: true
          schema:
            type: string
          description: Workflow file name (e.g. "ci.yml") or numeric workflow ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref]
              properties:
                ref:
                  type: string
                  description: Branch or tag name to dispatch against
                inputs:
                  type: object
                  additionalProperties:
                    type: string
                  description: Key-value pairs passed as workflow inputs
      responses:
        "204":
          description: Dispatch accepted
        "400":
          description: Missing ref field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /github/repos/{owner}/{repo}/actions/runs:
    get:
      operationId: listGithubWorkflowRuns
      tags: [github]
      summary: List GitHub Actions workflow runs for a repository
      description: |
        Returns a paginated list of workflow runs for the given repository.
        Optional filters: workflow_id, status, per_page, page.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: query
          name: workflow_id
          required: false
          schema:
            type: string
          description: Filter by workflow file name or ID
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [queued, in_progress, completed]
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
        - in: query
          name: page
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Workflow run list
          content:
            application/json:
              schema:
                type: object
                required: [total_count, workflow_runs]
                properties:
                  total_count:
                    type: integer
                  workflow_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/GithubWorkflowRun"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /github/repos/{owner}/{repo}/actions/runs/{run_id}:
    get:
      operationId: getGithubWorkflowRun
      tags: [github]
      summary: Get a single GitHub Actions workflow run
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: run_id
          required: true
          schema:
            type: integer
          description: Numeric workflow run ID
      responses:
        "200":
          description: Workflow run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWorkflowRun"
        "400":
          description: Invalid run_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    Hyd93AnnotationPoint:
      type: object
      description: |
        A single cartographic annotation point extracted from a HYD93 `.a93.gz`
        file during dataset upload.  Feature codes identify the type of seafloor
        hazard or biological feature (89=rocks, 103=kelp, 146=ledges,
        530=rocky reefs, 988=obstructions/wrecks).
      properties:
        lon:
          type: number
          description: Longitude in decimal degrees (negative = West)
        lat:
          type: number
          description: Latitude in decimal degrees
        featureCode:
          type: integer
          description: HYD93 feature code (89, 103, 146, 530, or 988)
      required:
        - lon
        - lat
        - featureCode

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PoeError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    PoeClassifyRequest:
      type: object
      properties:
        gridBase64:
          type: string
          description: Base64-encoded PNG data URL of the 256×256 depth grid
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
        datasetId:
          type: string
          description: Dataset identifier used for cache keying
        gridHash:
          type: string
          description: Client-computed FNV-1a 32-bit hash of the depth grid (8-char hex)
        depths32:
          type: array
          items:
            type: number
          description: |
            Optional 1024-length (32×32 row-major) downsample of the depth grid in metres.
            Used by the server as input for the depth-based fallback classifier when the
            AI call fails. Not used when the AI call succeeds.
        depthsFull:
          type: array
          items:
            type: number
          description: |
            Optional full-resolution row-major depth grid (length widthFull*heightFull).
            When provided the server may split the area into multiple overlapping 32×32
            tiles, classify each at the existing per-call resolution, and stitch the
            results so high-resolution datasets preserve detail instead of being
            collapsed into a single thumbnail.
        widthFull:
          type: integer
          description: Width of `depthsFull` in cells. Required when `depthsFull` is set.
        heightFull:
          type: integer
          description: Height of `depthsFull` in cells. Required when `depthsFull` is set.
      required:
        - gridBase64

    ClassifyResult:
      type: object
      properties:
        zones:
          type: array
          items:
            type: string
          description: |
            Zone labels in row-major order. Length is `coarseWidth*coarseHeight`,
            which defaults to 1024 (32×32) for the single-tile path and grows for
            tiled high-resolution datasets.
        fromCache:
          type: boolean
          description: Whether the result was served from the in-memory cache
        source:
          type: string
          enum: [ai, heuristic, partial]
          description: |
            "ai" when every cell was labeled by the Poe AI classifier (live or
            cached); "heuristic" when the depth-based fallback covered the whole
            grid because the AI was unavailable; "partial" when the result was
            stitched from a mix of AI-classified and heuristic tiles.
        substrateFp:
          type: string
          description: |
            8-char hex fingerprint of the bundled ShoreZone + ENC substrate grid
            sampled for this dataset's AOI. Forms part of the zone-cache key so
            a change in surveyed substrate coverage invalidates stale results.
            "00000000" when the dataset has no substrate coverage.
        coarseWidth:
          type: integer
          description: Width of the returned zones grid. Defaults to 32 when omitted.
        coarseHeight:
          type: integer
          description: Height of the returned zones grid. Defaults to 32 when omitted.
        tilesTotal:
          type: integer
          description: Total number of tiles in the plan (1 for the single-tile path).
        tilesAi:
          type: integer
          description: Number of tiles that were successfully labeled by the AI.
        tilesHeuristic:
          type: integer
          description: Number of tiles that fell back to the heuristic classifier.
      required:
        - zones
        - fromCache

    ToolCall:
      type: object
      properties:
        name:
          type: string
        args:
          type: object
          additionalProperties: true
        id:
          type: string
      required:
        - name
        - args

    PoeQueryRequest:
      type: object
      properties:
        userMessage:
          type: string
          description: The user's natural language query
        context:
          type: object
          additionalProperties: true
          description: Terrain context (datasetName, waterType, minDepth, maxDepth, lon, lat, cameraDepth, zoneName)
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
          description: Last N conversation turns (server clips to 10)
        previousResponseId:
          type: string
          description: Poe response ID for multi-turn context chaining
      required:
        - userMessage

    QueryResult:
      type: object
      properties:
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        text:
          type: string
          nullable: true
          description: Text reply when no tool calls are made
        responseId:
          type: string
          nullable: true
          description: Poe response ID for chaining
      required:
        - toolCalls

    PoeDescribeRequest:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        zoneName:
          type: string
        datasetName:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]

    PoeModelList:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              owned_by:
                type: string
              description:
                type: string
            required:
              - id
              - object
              - owned_by

    UserSettings:
      type: object
      description: Per-user application settings with sensible defaults
      properties:
        textureQuality:
          type: string
          enum: [off, low, high]
          default: high
        enableCaustics:
          type: boolean
          default: false
        particleDensity:
          type: string
          enum: [off, sparse, dense]
          default: sparse
        fogDensity:
          type: number
          minimum: 0.004
          maximum: 0.030
          default: 0.012
        colormapTheme:
          type: string
          enum: [ocean, thermal, grayscale, viridis, freshwater, custom]
          default: ocean
        paletteShallow:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#00e5ff'
          description: Shallow endpoint hex colour for the Ocean depth palette.
        paletteDeep:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#283593'
          description: Deep endpoint hex colour for the Ocean depth palette.
        customStops:
          type: array
          minItems: 2
          description: Ordered colour stops for the user's Custom depth palette (min 2). Positions are normalised to [0, 1] along the depth axis.
          items:
            type: object
            required: [position, hex]
            properties:
              position:
                type: number
                minimum: 0
                maximum: 1
              hex:
                type: string
                pattern: '^#[0-9a-fA-F]{6}$'
          default:
            - { position: 0.0,  hex: '#00e5ff' }
            - { position: 0.3,  hex: '#0d47a1' }
            - { position: 0.65, hex: '#1a237e' }
            - { position: 1.0,  hex: '#283593' }
        bandColors:
          type: array
          minItems: 10
          maxItems: 10
          description: Per-band hex colours for the Ocean theme. Exactly 10 entries, one per depth band lower boundary (0, 50, 100, 150, 200, 250, 300, 350, 450, 600 ft). Persisted server-side so the palette is consistent across devices.
          items:
            type: string
            pattern: '^#[0-9a-fA-F]{6}$'
          default:
            - '#00e5ff'
            - '#00c8de'
            - '#00a8d0'
            - '#0288d1'
            - '#0277bd'
            - '#1565c0'
            - '#0d47a1'
            - '#1a237e'
            - '#283593'
            - '#1e2b6e'
        bandBoundaries:
          type: array
          minItems: 11
          maxItems: 11
          description: Depth band boundaries in feet. Exactly 11 integers, strictly increasing, first must be 0, last must be 2000. The 9 interior values are user-editable. Persisted server-side so customised boundaries survive across devices.
          items:
            type: integer
            minimum: 0
            maximum: 2000
          default:
            - 0
            - 50
            - 100
            - 150
            - 200
            - 250
            - 300
            - 350
            - 450
            - 600
            - 2000
        lampIntensity:
          type: number
          minimum: 0
          maximum: 5
          default: 2
        defaultSpeedTier:
          type: integer
          minimum: 0
          maximum: 4
          default: 2
        invertMouseY:
          type: boolean
          default: false
        mouseSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
        cameraSpawnBehaviour:
          type: string
          enum: [deepest, home, last, center]
          default: deepest
        showCrosshairGps:
          type: boolean
          default: true
        showCameraPosition:
          type: boolean
          default: true
        showSpeedIndicator:
          type: boolean
          default: true
        showHeading:
          type: boolean
          default: true
        coordinateFormat:
          type: string
          enum: [decimal, dms]
          default: decimal
        depthUnit:
          type: string
          enum: [metres, feet]
          default: metres
        units:
          type: string
          enum: [metric, imperial, nautical]
          default: metric
          description: Global units system applied to depths, distances, speeds and temperatures throughout the app. "nautical" shows speeds in knots and depths/distances in imperial-style feet/miles, for boaters who think in nautical units.
        hudOpacity:
          type: number
          minimum: 0.3
          maximum: 1.0
          default: 0.75
        overviewDefaultZoom:
          type: number
          minimum: 0.5
          maximum: 5.0
          default: 1.0
        overviewShowGrid:
          type: boolean
          default: true
        overviewShowMarkers:
          type: boolean
          default: true
        overviewOpenOnLoad:
          type: boolean
          default: false
        visibleMarkerTypes:
          type: array
          items:
            type: string
            enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
          default: [fish, shipwreck, coral, vent, custom]
        showMarkerLabels:
          type: boolean
          default: true
        smoothTerrainSpikes:
          type: boolean
