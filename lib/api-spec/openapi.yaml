          description: Draw a USGS National Map hillshaded relief layer as the bottom layer of the Overview Map. Independent of satelliteImagery.
        showDepthLegend:
          type: boolean
          default: true
          description: Show the depth-colourmap legend overlay in the 3D viewscreen HUD.
        showDepthScaleBar:
          type: boolean
          default: true
          description: Show the depth scale bar in the 3D viewscreen HUD.
        showCompassMinimap:
          type: boolean
          default: true
          description: Show the compass/minimap widget in the HUD.
        showControlsLegend:
          type: boolean
          default: true
          description: Show the keyboard/controls legend overlay in the HUD.
        showTidePanel:
          type: boolean
          default: true
          description: Show the tidal data side panel.
        showHabitatPanel:
          type: boolean
