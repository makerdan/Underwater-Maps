        tideOverlayActive:
          type: boolean
          default: false
          description: Show tidal height overlay on the overview map.
        currentOverlayActive:
          type: boolean
          default: false
          description: Show ocean current overlay on the overview map.
        currentDepthLayers:
          type: array
          description: Which depth layers to display for the current overlay.
