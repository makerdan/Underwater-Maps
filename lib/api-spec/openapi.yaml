        sidePaneCollapsed:
          type: boolean
          default: false
          description: Whether the side panel is collapsed.
        zonePaintBrushRadius:
          type: integer
          minimum: 1
          maximum: 20
          default: 4
          description: Radius in grid cells of the zone-paint brush tool.
        zoneOverlayEnabled:
          type: boolean
          default: false
          description: Whether the substrate zone overlay is visible.
        zonePaintMode:
          type: boolean
          default: false
          description: Whether the zone-paint mode is active.
        zonePaintSlot:
          type: integer
          minimum: 0
          maximum: 3
          default: 0
          description: Active zone-paint slot index (0–3).
        substrateColorMode:
          type: boolean
          default: false
          description: When true, terrain is coloured by substrate class instead of depth.
        hiddenSubstrateClasses:
          type: array
          items:
            type: string
          default: []
          description: List of substrate class names hidden from the substrate overlay.
        intertidalHotspotsEnabled:
          type: boolean
          default: false
          description: Whether the intertidal hotspot overlay is enabled.
        intertidalScoreMode:
          type: string
          enum: [tidepool, beachcombing]
          default: tidepool
          description: Scoring mode used to rank intertidal hotspot polygons.
        efhOverlayEnabled:
          type: boolean
          default: false
          description: Whether the Essential Fish Habitat overlay is visible.
        hiddenEfhSpecies:
          type: array
          items:
            type: string
          default: []
          description: Species names whose EFH polygons are hidden from the overlay.
        hyd93ActiveFeatureCodes:
          type: array
          items:
            type: integer
          default: [89, 103, 146, 530, 988]
          description: HYD93 feature type codes currently visible (89=Rocks, 103=Kelp, 146=Ledge, 530=Rocky reef, 988=Obstruction).
        hyd93FeaturesEnabled:
