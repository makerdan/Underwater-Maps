openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poe
    description: Poe AI proxy operations
  - name: datasets
    description: Bathymetric dataset operations
  - name: markers
    description: Persisted point-of-interest marker operations
  - name: settings
    description: Per-user application settings
  - name: user-datasets
    description: Authenticated user's saved custom terrain datasets
  - name: trails
    description: GPS trail recording operations
  - name: drift-planner
    description: Surface conditions for drift planning
  - name: trolling-presets
    description: Saved trolling heading/speed presets
paths:
  /datasets:
    get:
      operationId: getDatasets
      tags: [datasets]
      summary: List available pre-loaded bathymetric regions
      description: Returns metadata for all built-in GEBCO and demo datasets
      parameters:
        - in: query
          name: waterType
          required: false
          description: Filter datasets by water body type
          schema:
            type: string
            enum: [saltwater, freshwater]
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetMeta"

  /datasets/{id}/terrain:
    get:
      operationId: getDatasetsIdTerrain
      tags: [datasets]
      summary: Get gridded terrain data for a dataset
      description: Returns a 256×256 depth grid for the given dataset ID, suitable for building a Three.js terrain mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: integer
            default: 256
            minimum: 32
            maximum: 512
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/overview:
    get:
      operationId: getDatasetsIdOverview
      tags: [datasets]
      summary: Get a low-resolution overview terrain for a dataset
      description: Returns a 64×64 downsampled depth grid for use in the overview map — lightweight alternative to the full terrain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload:
    post:
      operationId: postDatasetsUpload
      tags: [datasets]
      summary: Upload an XYZ or CSV file and receive terrain data at two resolutions
      description: Accepts a UTF-8 .xyz or .csv file with lon,lat,depth columns via multipart form upload. Auto-detects delimiter, header rows, and column order. Returns both a full terrain grid and a 64×64 overview grid.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: XYZ or CSV file with lon,lat,depth columns
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
                  description: Target grid resolution for the full terrain (overview is always 64)
              required:
                - file
      responses:
        "200":
          description: Parsed terrain and overview grids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Unparseable file or insufficient valid points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets:
    get:
      operationId: getUserDatasets
      tags: [user-datasets]
      summary: List the current user's saved custom terrain datasets
      description: Returns metadata for all terrain files the authenticated user has uploaded and saved
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDatasetMeta"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/terrain:
    get:
      operationId: getUserDatasetsIdTerrain
      tags: [user-datasets]
      summary: Get full terrain grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/overview:
    get:
      operationId: getUserDatasetsIdOverview
      tags: [user-datasets]
      summary: Get low-resolution overview grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}:
    delete:
      operationId: deleteUserDatasetsId
      tags: [user-datasets]
      summary: Delete a saved user terrain dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Dataset deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/move:
    patch:
      operationId: patchUserDatasetsIdMove
      tags: [user-datasets]
      summary: Move a user dataset into a folder (or to the root)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetBody"
      responses:
        "200":
          description: Updated dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid target folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/duplicate:
    post:
      operationId: postUserDatasetsIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a user dataset into the same folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created duplicate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/rename:
    patch:
      operationId: patchUserDatasetsIdRename
      tags: [user-datasets]
      summary: Rename a user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders:
    get:
      operationId: getUserFolders
      tags: [user-datasets]
      summary: List all dataset folders for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Folder list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetFolder"
    post:
      operationId: postUserFolders
      tags: [user-datasets]
      summary: Create a new folder
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/rename:
    patch:
      operationId: patchUserFoldersIdRename
      tags: [user-datasets]
      summary: Rename a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/move:
    patch:
      operationId: patchUserFoldersIdMove
      tags: [user-datasets]
      summary: Move a folder to a new parent
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetFolderBody"
      responses:
        "200":
          description: Moved folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid target (cycle or duplicate sibling)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/duplicate:
    post:
      operationId: postUserFoldersIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a folder (recursive deep copy)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created folder root
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"

  /user/folders/{id}:
    delete:
      operationId: deleteUserFoldersId
      tags: [user-datasets]
      summary: Delete a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteDatasetFolderBody"
      responses:
        "204":
          description: Folder deleted
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers:
    get:
      operationId: getMarkers
      tags: [markers]
      summary: List persisted markers for a dataset
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset slug to filter markers by
      responses:
        "200":
          description: Marker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: postMarkers
      tags: [markers]
      summary: Create a new marker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerInput"
      responses:
        "201":
          description: Created marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/mine:
    delete:
      operationId: deleteMarkersMine
      tags: [markers]
      summary: Delete all markers created by the authenticated user
      description: Permanently deletes every marker where userId matches the Clerk user. Requires authentication.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Number of markers deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/{id}:
    delete:
      operationId: deleteMarkersId
      tags: [markers]
      summary: Delete a marker by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marker deleted
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails:
    get:
      operationId: getTrails
      tags: [trails]
      summary: List GPS trails for a dataset
      security:
        - clerkAuth: []
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trail list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsTrail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postTrails
      tags: [trails]
      summary: Create a new GPS trail
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsTrailInput"
      responses:
        "201":
          description: Created trail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsTrail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails/{id}:
    delete:
      operationId: deleteTrailsId
      tags: [trails]
      summary: Delete a GPS trail
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Trail deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Trail not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails/{id}/points:
    get:
      operationId: getTrailsIdPoints
      tags: [trails]
      summary: Get paginated trail points
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Paginated trail points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrailPointsPage"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Trail not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get the current user's settings
      description: Returns stored settings or the default settings object if none are saved yet. Requires authentication.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: putSettings
      tags: [settings]
      summary: Upsert the current user's settings
      description: Stores the full settings object for the authenticated user.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trolling-presets:
    get:
      operationId: getTrollingPresets
      tags: [trolling-presets]
      summary: List the authenticated user's trolling presets
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrollingPreset"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postTrollingPresets
      tags: [trolling-presets]
      summary: Save a new trolling preset
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrollingPresetInput"
      responses:
        "201":
          description: Created preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrollingPreset"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trolling-presets/{id}:
    delete:
      operationId: deleteTrollingPresetsId
      tags: [trolling-presets]
      summary: Delete a trolling preset by ID
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Preset deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Preset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /poe/classify:
    post:
      operationId: poeClassify
      tags: [poe]
      summary: Classify terrain zones via AI
      description: Sends a depth grid image to Poe AI and returns 1024 zone labels (32×32 coarse grid)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeClassifyRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResult"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/query:
    post:
      operationId: poeQuery
      tags: [poe]
      summary: Natural language terrain query
      description: Interprets a user message and returns tool calls and/or a text response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeQueryRequest"
      responses:
        "200":
          description: Query result with optional tool calls and text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/describe:
    post:
      operationId: poeDescribe
      tags: [poe]
      summary: Stream a location description via SSE
      description: Returns a Server-Sent Event stream of geological description deltas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeDescribeRequest"
      responses:
        "200":
          description: SSE stream of text deltas, terminated with data:[DONE]
          content:
            text/event-stream:
              schema:
                type: string

  /poe/models:
    get:
      operationId: getPoeModels
      tags: [poe]
      summary: List available Poe models
      description: Returns publicly available Poe models (cached 1 hour)
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeModelList"
        "502":
          description: Could not reach Poe models endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /substrate/{id}:
    get:
      operationId: getSubstrate
      tags: [datasets]
      summary: Real Alaska ShoreZone substrate polygons
      description: |
        Returns a GeoJSON FeatureCollection of substrate polygons sourced from the
        Alaska ShoreZone Coastal Habitat Mapping Program (NOAA AKR / ADF&G — public
        domain, https://alaskafisheries.noaa.gov/shorezone/). Each polygon is a
        ShoreZone intertidal-zone (ITZ) unit from the `AK_SZ_ITZ_Polygons` layer
        whose `Mat_Desc` and `Form_Desc` attributes have been classified into a
        CMECS broad substrate class (bedrock / gravel / sand / mud).

        The server bundles a regional Alaska ShoreZone collection (refreshed
        offline via `pnpm --filter @workspace/scripts run build-shorezone`) and
        filters it to the dataset's AOI bbox at request time. Datasets whose AOI
        does not overlap published ShoreZone polygon coverage receive an empty
        FeatureCollection together with a `nearestCoverage` block in `metadata`
        describing where real ShoreZone coverage actually exists.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset identifier
      responses:
        "200":
          description: GeoJSON FeatureCollection of substrate polygons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubstrateFeatureCollection"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/catalog:
    get:
      operationId: getDatasetsCatalog
      tags: [datasets]
      summary: List all known public data sources in the catalog
      description: Returns all entries in the dataset discovery catalog, optionally filtered by data type, water type, or bounding box.
      parameters:
        - in: query
          name: dataType
          required: false
          schema:
            type: string
            enum: [bathymetry, substrate, habitat, lidar, chart]
        - in: query
          name: waterType
          required: false
          schema:
            type: string
            enum: [saltwater, freshwater]
      responses:
        "200":
          description: List of catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetCatalogEntry"

  /datasets/catalog/search:
    get:
      operationId: getDatasetsCatalogSearch
      tags: [datasets]
      summary: Keyword search over the dataset catalog
      description: Full-text keyword search with optional type, waterType, and bounding-box filters. Returns results ranked by keyword relevance.
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: dataType
          required: false
          schema:
            type: string
            enum: [bathymetry, substrate, habitat, lidar, chart]
        - in: query
          name: waterType
          required: false
          schema:
            type: string
            enum: [saltwater, freshwater]
        - in: query
          name: minLon
          required: false
          schema:
            type: number
        - in: query
          name: minLat
          required: false
          schema:
            type: number
        - in: query
          name: maxLon
          required: false
          schema:
            type: number
        - in: query
          name: maxLat
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Ranked list of matching catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetCatalogSearchResult"

  /datasets/catalog/{id}/save:
    post:
      operationId: postDatasetsCatalogIdSave
      tags: [datasets]
      summary: Save a catalog dataset to the user's account
      description: Queues a catalog dataset for caching and associates it with the authenticated user's account. Returns a save job record.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Catalog dataset ID
      responses:
        "201":
          description: Save job created (status queued or ready)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Catalog entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves:
    get:
      operationId: getDatasetsMySaves
      tags: [datasets]
      summary: List the authenticated user's saved catalog datasets
      description: Returns all catalog datasets the user has saved, joined with catalog metadata.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of user save records with embedded catalog metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}/status:
    get:
      operationId: getDatasetsMySavesIdStatus
      tags: [datasets]
      summary: Poll the status of a user's save job
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "200":
          description: Current status of the save job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /surface-conditions:
    get:
      operationId: getSurfaceConditions
      tags: [drift-planner]
      summary: Fetch hourly surface weather and tidal conditions for drift planning
      description: |
        Returns 24 hours of hourly wind, tidal current, and wave data for a given
        lat/lon from Open-Meteo. Tidal current is approximated via a sinusoidal
        model when live data is unavailable. Returns estimatedConditions=true when
        Open-Meteo is unreachable and default values are substituted.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: 24-hour surface conditions array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurfaceConditions"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /water-temperature:
    get:
      operationId: getWaterTemperature
      tags: [drift-planner]
      summary: Fetch current sea-surface temperature for a lat/lon point
      description: |
        Returns the current sea-surface temperature (°C) at the requested
        lat/lon from the Open-Meteo Marine API. Used by BathyScan's HUD
        temperature readout as the surface anchor of a thermocline model.
        Returns available=false when the live feed is unreachable so the
        caller can gracefully fall back to a synthetic estimate.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: Current sea-surface temperature for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterTemperature"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /temperature-profile:
    get:
      operationId: getTemperatureProfile
      tags: [drift-planner]
      summary: Fetch a depth-resolved temperature profile for a lat/lon point
      description: |
        Returns a real per-location temperature-vs-depth profile when one
        is available from a bundled CTD cast, an Argo float, or an
        oceanographic reanalysis dataset. The samples are sorted
        shallow→deep so a client can plot them directly. When no real
        profile is available the response is `{ available: false, ... }`
        and the caller is expected to fall back to its surface-anchored
        thermocline model.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: Depth-resolved temperature profile for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureProfile"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /efh:
    get:
      operationId: getEfh
      tags: [datasets]
      summary: Essential Fish Habitat (EFH) zones
      description: |
        Returns GeoJSON EFH zone polygons for the requested area.
        Currently covers the Thorne Bay / Clarence Strait / SE Alaska region.
        Data credit: NOAA Fisheries / NMFS Alaska Region.
        https://www.fisheries.noaa.gov/resource/data/alaska-essential-fish-habitat-efh-species-shapefiles
      parameters:
        - name: datasetId
          in: query
          schema:
            type: string
          description: Filter to a known preset dataset's AOI (e.g. thorne-bay)
        - name: species
          in: query
          schema:
            type: string
          description: Comma-separated species names or common names to filter
      responses:
        "200":
          description: GeoJSON FeatureCollection of EFH zone polygons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfhFeatureCollection"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PoeError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    PoeClassifyRequest:
      type: object
      properties:
        gridBase64:
          type: string
          description: Base64-encoded PNG data URL of the 256×256 depth grid
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
        datasetId:
          type: string
          description: Dataset identifier used for cache keying
        gridHash:
          type: string
          description: Client-computed FNV-1a 32-bit hash of the depth grid (8-char hex)
        depths32:
          type: array
          items:
            type: number
          description: |
            Optional 1024-length (32×32 row-major) downsample of the depth grid in metres.
            Used by the server as input for the depth-based fallback classifier when the
            AI call fails. Not used when the AI call succeeds.
      required:
        - gridBase64

    ClassifyResult:
      type: object
      properties:
        zones:
          type: array
          items:
            type: string
          description: 1024 zone labels in row-major order (32×32 coarse grid)
        fromCache:
          type: boolean
          description: Whether the result was served from the in-memory cache
        source:
          type: string
          enum: [ai, heuristic]
          description: |
            "ai" when the labels come from the Poe AI classifier (live or cached);
            "heuristic" when the AI was unavailable and labels were estimated from
            depth percentiles only.
      required:
        - zones
        - fromCache

    ToolCall:
      type: object
      properties:
        name:
          type: string
        args:
          type: object
          additionalProperties: true
        id:
          type: string
      required:
        - name
        - args

    PoeQueryRequest:
      type: object
      properties:
        userMessage:
          type: string
          description: The user's natural language query
        context:
          type: object
          additionalProperties: true
          description: Terrain context (datasetName, waterType, minDepth, maxDepth, lon, lat, cameraDepth, zoneName)
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
          description: Last N conversation turns (server clips to 10)
        previousResponseId:
          type: string
          description: Poe response ID for multi-turn context chaining
      required:
        - userMessage

    QueryResult:
      type: object
      properties:
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        text:
          type: string
          nullable: true
          description: Text reply when no tool calls are made
        responseId:
          type: string
          nullable: true
          description: Poe response ID for chaining
      required:
        - toolCalls

    PoeDescribeRequest:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        zoneName:
          type: string
        datasetName:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]

    PoeModelList:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              owned_by:
                type: string
              description:
                type: string
            required:
              - id
              - object
              - owned_by

    UserSettings:
      type: object
      description: Per-user application settings with sensible defaults
      properties:
        textureQuality:
          type: string
          enum: [off, low, high]
          default: high
        enableCaustics:
          type: boolean
          default: false
        particleDensity:
          type: string
          enum: [off, sparse, dense]
          default: sparse
        fogDensity:
          type: number
          minimum: 0.004
          maximum: 0.030
          default: 0.012
        colormapTheme:
          type: string
          enum: [ocean, thermal, grayscale, viridis, freshwater]
          default: ocean
        lampIntensity:
          type: number
          minimum: 0
          maximum: 5
          default: 2
        defaultSpeedTier:
          type: integer
          minimum: 0
          maximum: 4
          default: 2
        invertMouseY:
          type: boolean
          default: false
        mouseSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
        cameraSpawnBehaviour:
          type: string
          enum: [deepest, home, last]
          default: deepest
        showCrosshairGps:
          type: boolean
          default: true
        showCameraPosition:
          type: boolean
          default: true
        showSpeedIndicator:
          type: boolean
          default: true
        showHeading:
          type: boolean
          default: true
        coordinateFormat:
          type: string
          enum: [decimal, dms]
          default: decimal
        depthUnit:
          type: string
          enum: [metres, feet]
          default: metres
        units:
          type: string
          enum: [metric, imperial]
          default: metric
          description: Global units system applied to depths, distances, speeds and temperatures throughout the app.
        hudOpacity:
          type: number
          minimum: 0.3
          maximum: 1.0
          default: 0.75
        overviewDefaultZoom:
          type: number
          minimum: 0.5
          maximum: 5.0
          default: 1.0
        overviewShowGrid:
          type: boolean
          default: true
        overviewShowMarkers:
          type: boolean
          default: true
        overviewOpenOnLoad:
          type: boolean
          default: false
        visibleMarkerTypes:
          type: array
          items:
            type: string
            enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish]
          default: [fish, shipwreck, coral, vent, custom]
        showMarkerLabels:
          type: boolean
          default: true
        smoothTerrainSpikes:
          type: boolean
          default: true
          description: When true, the server applies an angle-based spike smoothing pass to terrain grids. Disable to inspect raw bathymetric artifacts for scientific use.
        privateMarkers:
          type: boolean
          default: false
        defaultMarkerType:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish]
          default: fish
        defaultRegion:
          type: string
          default: mariana-trench
        gpsRecordingInterval:
          type: integer
          minimum: 1000
          maximum: 60000
          default: 10000
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
          description: Active water body type; controls colormap, species lists, marker types, and dataset filter
        showUiTooltips:
          type: boolean
          default: true
          description: Show hover/focus tooltips on viewscreen controls and HUD readouts.

    ApiError:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        details:
          type: string
          description: Human-readable description of what went wrong
      required:
        - error
        - details

    DatasetMeta:
      type: object
      properties:
        id:
          type: string
          description: Stable slug used in API paths
        name:
          type: string
          description: Human-readable region name
        description:
          type: string
          description: One-line geological description
        waterType:
          type: string
          enum: [saltwater, freshwater]
        minDepth:
          type: number
          description: Shallowest point in metres (positive = below sea level)
        maxDepth:
          type: number
          description: Deepest point in metres
        centerLon:
          type: number
        centerLat:
          type: number
        bbox:
          type: object
          description: Bounding box [minLon, minLat, maxLon, maxLat]
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        hasTopography:
          type: boolean
          description: True when the dataset bbox includes above-water terrain (land/islands) suitable for landmass visualisation.
        hasEfh:
          type: boolean
          description: True when the dataset has bundled Essential Fish Habitat (EFH) zone data available via /efh.
      required:
        - id
        - name
        - description
        - waterType
        - minDepth
        - maxDepth
        - centerLon
        - centerLat
        - bbox

    TerrainData:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]
        resolution:
          type: integer
          description: Grid side length N (grid is NxN)
        width:
          type: integer
        height:
          type: integer
        depths:
          type: array
          items:
            type: number
          description: Row-major flat array of depth values (metres, positive = below surface)
        minDepth:
          type: number
        maxDepth:
          type: number
        minLon:
          type: number
        maxLon:
          type: number
        minLat:
          type: number
        maxLat:
          type: number
        centerLon:
          type: number
        centerLat:
          type: number
        topography:
          type: array
          items:
            type: number
          description: Row-major flat array of above-water elevation values (metres above sea level, 0 for water cells). Same NxN shape as `depths`. Omitted when the dataset has no above-water terrain.
        hasTopography:
          type: boolean
          description: True when this terrain grid includes a non-empty `topography` array. Clients can use this to enable/hide the landmass visualisation.
        synthetic:
          type: boolean
          description: "Deprecated: use dataSource instead. True when the grid was produced from the synthetic fbm fallback."
        dataSource:
          type: string
          enum: [ncei, gebco, synthetic]
          description: |
            Which upstream data service produced this grid.
            ncei      — NCEI Bag Mosaic WCS (high-resolution multibeam survey)
            gebco     — GEBCO 2024 WCS (~400 m global grid)
            synthetic — fbm fallback used when all upstream services are unreachable
      required:
        - datasetId
        - name
        - waterType
        - resolution
        - width
        - height
        - depths
        - minDepth
        - maxDepth
        - minLon
        - maxLon
        - minLat
        - maxLat
        - centerLon
        - centerLat

    TerrainUploadInput:
      type: object
      properties:
        fileContent:
          type: string
          description: Raw UTF-8 text content of the XYZ or CSV file
        fileName:
          type: string
          description: Original file name (used to detect format)
        resolution:
          type: integer
          default: 256
          minimum: 32
          maximum: 512
          description: Target grid resolution for the full terrain (overview is always 64)
      required:
        - fileContent
        - fileName

    UploadResult:
      type: object
      description: Full terrain and overview grids generated from an uploaded file. When the user is authenticated the terrain is also persisted and savedDatasetId is returned.
      properties:
        terrain:
          $ref: "#/components/schemas/TerrainData"
        overview:
          $ref: "#/components/schemas/TerrainData"
        savedDatasetId:
          type: string
          description: UUID of the saved custom dataset row (only present when the request was authenticated AND the row was persisted successfully)
        savedDatasetMeta:
          $ref: "#/components/schemas/UserDatasetMeta"
          description: Metadata for the freshly-saved row, suitable for optimistically inserting into the "My Uploads" list without a refetch
        saveError:
          type: string
          description: Human-readable error string returned when the request was authenticated but the auto-save to the user's account failed. The terrain itself is still returned so the session is usable.
      required:
        - terrain
        - overview

    UserDatasetMeta:
      type: object
      description: Metadata for a user-saved custom terrain dataset
      properties:
        id:
          type: string
          description: UUID primary key
        name:
          type: string
          description: Dataset name derived from the uploaded filename
        minDepth:
          type: number
        maxDepth:
          type: number
        folderId:
          type: string
          nullable: true
          description: Parent folder UUID, or null when at the library root
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - minDepth
        - maxDepth
        - createdAt

    DatasetFolder:
      type: object
      description: A folder within the user's dataset library tree
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: string
          nullable: true
      required:
        - name

    RenameDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    MoveDatasetFolderBody:
      type: object
      properties:
        parentId:
          type: string
          nullable: true
      required:
        - parentId

    DeleteDatasetFolderBody:
      type: object
      properties:
        mode:
          type: string
          enum: [contents, promote]
          description: contents = delete folder and everything inside; promote = move children to grandparent before deleting
      required:
        - mode

    MoveDatasetBody:
      type: object
      properties:
        folderId:
          type: string
          nullable: true
      required:
        - folderId

    Marker:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        datasetId:
          type: string
          description: Dataset this marker belongs to
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
          description: Depth in metres (positive = below surface)
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish]
        label:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - datasetId
        - lon
        - lat
        - depth
        - type
        - label
        - createdAt

    GpsPoint:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        accuracy:
          type: number
          default: 0
        timestamp:
          type: number
          description: Unix ms timestamp
        seq:
          type: integer
          default: 0
      required:
        - lon
        - lat
        - timestamp

    GpsTrail:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        userId:
          type: string
        datasetId:
          type: string
        name:
          type: string
        colour:
          type: string
          default: "#ff6600"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        pointCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - datasetId
        - name
        - colour
        - startedAt
        - endedAt
        - pointCount
        - createdAt

    SubstrateProperties:
      type: object
      description: |
        Per-feature properties for an Alaska ShoreZone substrate polygon.
      properties:
        unitId:
          type: string
          description: ShoreZone PHY_IDENT — stable unit identifier
        substrate:
          type: string
          enum: [bedrock, gravel, sand, mud]
          description: CMECS broad substrate class
        shoreZoneClass:
          type: string
          description: Human-readable ShoreZone class (e.g. "Rock Platform", "Clastic Beach")
        cmecsCode:
          type: string
          description: CMECS substrate classification code and label
        color:
          type: string
          description: Suggested hex color for rendering
        szMaterial:
          type: string
          nullable: true
          description: Raw ShoreZone Mat_Desc (Rock / Clastic / Biogenic)
        szForm:
          type: string
          nullable: true
          description: Raw ShoreZone Form_Desc (Cliff / Platform / Beach / Tidal Flat / Marsh)
        areaSqM:
          type: number
          nullable: true
          description: Polygon area in square metres from the upstream Area attribute
      required:
        - unitId
        - substrate
        - shoreZoneClass
        - cmecsCode
        - color

    SubstrateFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        properties:
          $ref: "#/components/schemas/SubstrateProperties"
        geometry:
          type: object
          additionalProperties: true
      required:
        - type
        - properties
        - geometry

    SubstrateFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/SubstrateFeature"
        metadata:
          type: object
          additionalProperties: true
      required:
        - type
        - features

    EfhSpeciesProperties:
      type: object
      properties:
        species:
          type: string
          description: Scientific species name (snake_case)
        commonName:
          type: string
        fmp:
          type: string
          description: Fishery Management Plan name
        depthRangeM:
          type: array
          items:
            type: number
          description: "[minDepth, maxDepth] in metres"
        habitatDescription:
          type: string
        source:
          type: string
        creditUrl:
          type: string
        color:
          type: string
          description: Suggested hex color for rendering
      required:
        - species
        - commonName
        - fmp
        - depthRangeM
        - habitatDescription
        - source
        - creditUrl
        - color

    EfhFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        properties:
          $ref: "#/components/schemas/EfhSpeciesProperties"
        geometry:
          type: object
          additionalProperties: true
      required:
        - type
        - properties
        - geometry

    EfhFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/EfhFeature"
        metadata:
          type: object
          additionalProperties: true
      required:
        - type
        - features

    DatasetCatalogEntry:
      type: object
      description: A known public data source in the discovery catalog
      properties:
        id:
          type: string
          description: Stable slug identifier
        name:
          type: string
        sourceAgency:
          type: string
          description: Organisation that produced the data (e.g. NOAA/NCEI, GEBCO, Alaska DNR)
        dataType:
          type: string
          enum: [bathymetry, substrate, habitat, lidar, chart]
        resolutionMMin:
          type: number
          nullable: true
          description: Finest resolution in metres
        resolutionMMax:
          type: number
          nullable: true
          description: Coarsest resolution in metres
        coverageBbox:
          type: object
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        endpointUrl:
          type: string
          nullable: true
        accessNotes:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        keywords:
          type: string
          nullable: true
          description: Comma-separated keyword tags
        lastUpdated:
          type: string
          nullable: true
        waterType:
          type: string
          enum: [saltwater, freshwater]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sourceAgency
        - dataType
        - coverageBbox
        - waterType
        - createdAt

    DatasetCatalogSearchResult:
      allOf:
        - $ref: "#/components/schemas/DatasetCatalogEntry"
        - type: object
          properties:
            relevanceScore:
              type: number
              description: 0–1 relevance to the search query
          required:
            - relevanceScore

    UserCatalogSave:
      type: object
      description: A user's saved reference to a catalog dataset
      properties:
        id:
          type: string
          description: UUID primary key
        catalogId:
          type: string
          description: References the dataset_catalog.id
        status:
          type: string
          enum: [queued, processing, ready, failed]
        requestedAt:
          type: string
          format: date-time
        readyAt:
          type: string
          format: date-time
          nullable: true
        cacheKey:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        catalog:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DatasetCatalogEntry"
          description: Embedded catalog metadata (present when returned from list/status endpoints)
      required:
        - id
        - catalogId
        - status
        - requestedAt

    GpsTrailInput:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        colour:
          type: string
          default: "#ff6600"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/GpsPoint"
      required:
        - datasetId
        - name
        - startedAt
        - endedAt
        - points

    TrailPointsPage:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/GpsPoint"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - points
        - total
        - page
        - pageSize

    SurfaceConditions:
      type: object
      properties:
        available:
          type: boolean
        lat:
          type: number
        lon:
          type: number
        dataSource:
          type: string
        tidalDataSource:
          type: string
          enum: [noaa-coops, sinusoidal]
          description: Source of tidal current data — real NOAA CO-OPS station predictions or sinusoidal M2 approximation
        tidalStationId:
          type: string
          description: NOAA CO-OPS station id used when tidalDataSource is noaa-coops
        tidalStationName:
          type: string
          description: Human-readable name of the NOAA CO-OPS station
        tidalStationDistanceKm:
          type: number
          description: Distance in kilometers from the requested point to the NOAA station
        estimatedConditions:
          type: boolean
          description: True when actual data was unavailable and defaults were substituted
        hours:
          type: array
          items:
            $ref: "#/components/schemas/HourlySurfaceCondition"
      required:
        - available
        - lat
        - lon
        - hours

    WaterTemperature:
      type: object
      properties:
        available:
          type: boolean
          description: True when a live sea-surface temperature was retrieved
        lat:
          type: number
        lon:
          type: number
        sstCelsius:
          type: number
          description: Sea-surface temperature in degrees Celsius (omitted when available=false)
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the sample (top of hour)
        source:
          type: string
          description: Human-readable attribution for the data source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
      required:
        - available
        - lat
        - lon

    TemperatureProfileSample:
      type: object
      properties:
        depthM:
          type: number
          description: Depth below the surface in metres
        temperatureC:
          type: number
          description: Water temperature in degrees Celsius
      required:
        - depthM
        - temperatureC

    TemperatureProfile:
      type: object
      properties:
        available:
          type: boolean
          description: True when a real depth-resolved profile was found
        lat:
          type: number
        lon:
          type: number
        samples:
          type: array
          description: Sorted shallow→deep depth/temperature samples (empty when available=false)
          items:
            $ref: "#/components/schemas/TemperatureProfileSample"
        source:
          type: string
          description: Human-readable attribution for the profile source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the measurement (when applicable)
        provider:
          type: string
          description: Identifier of the underlying data provider (e.g. "bundled-ctd", "argo", "woa", "estimated")
      required:
        - available
        - lat
        - lon
        - samples

    HourlySurfaceCondition:
      type: object
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        windSpeedKnots:
          type: number
        windDegrees:
          type: number
        tidalSpeedKnots:
          type: number
        tidalDegrees:
          type: number
        waveHeightM:
          type: number
        isSlack:
          type: boolean
          description: True when the modeled tidal current is below the slack threshold (~0.1 kn)
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
          description: Tidal phase for this hour
      required:
        - hour
        - windSpeedKnots
        - windDegrees
        - tidalSpeedKnots
        - tidalDegrees
        - waveHeightM

    SlackBlock:
      type: object
      description: Slack-tide context for a single instant
      properties:
        isSlack:
          type: boolean
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
        minutesToSlack:
          type: number
        minutesSinceSlack:
          type: number
        nextReversalAt:
          type: string
          description: ISO timestamp of the next slack (next high/low)
      required:
        - isSlack
        - phase
        - minutesToSlack
        - minutesSinceSlack
        - nextReversalAt

    TrollingPreset:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        userId:
          type: string
        name:
          type: string
        headingDeg:
          type: number
          minimum: 0
          maximum: 360
        speedKnots:
          type: number
          minimum: 0
          maximum: 10
        startLat:
          type: number
          nullable: true
        startLon:
          type: number
          nullable: true
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/TrollingPresetWaypoint"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - headingDeg
        - speedKnots
        - waypoints
        - createdAt

    TrollingPresetWaypoint:
      type: object
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lon:
          type: number
          minimum: -180
          maximum: 180
      required:
        - lat
        - lon

    TrollingPresetInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        headingDeg:
          type: number
          minimum: 0
          maximum: 360
        speedKnots:
          type: number
          minimum: 0
          maximum: 10
        startLat:
          type: number
          nullable: true
        startLon:
          type: number
          nullable: true
        waypoints:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/TrollingPresetWaypoint"
      required:
        - name
        - headingDeg
        - speedKnots

    MarkerInput:
      type: object
      properties:
        datasetId:
          type: string
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish]
          default: custom
        label:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - datasetId
        - lon
        - lat
        - depth
        - label
