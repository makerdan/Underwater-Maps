        - lon
        - samples

    HourlySurfaceCondition:
      type: object
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        windSpeedKnots:
          type: number
        windDegrees:
          type: number
        tidalSpeedKnots:
          type: number
        tidalDegrees:
          type: number
        waveHeightM:
          type: number
        waveDirectionDeg:
          type: number
          description: Swell/wave direction in degrees (0–359) from Open-Meteo Marine API; omitted when data is unavailable.
        isSlack:
          type: boolean
          description: True when the modeled tidal current is below the slack threshold (~0.1 kn)
