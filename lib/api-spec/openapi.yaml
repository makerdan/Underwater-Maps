        - fmp
        - depthRangeM
        - habitatDescription
        - source
        - creditUrl
        - color

    EfhFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        properties:
          $ref: "#/components/schemas/EfhSpeciesProperties"
        geometry:
          type: object
          additionalProperties: true
      required:
        - type
        - properties
        - geometry

    EfhFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/EfhFeature"
        metadata:
          type: object
          additionalProperties: true
      required:
        - type
        - features

    NceiPortalResult:
      type: object
      description: A bathymetric survey dataset discovered via the NCEI Bathymetry Geoportal
      properties:
        id:
          type: string
          description: NCEI Geoportal record id (e.g. "gov.noaa.ngdc.mgg.dem:703")
        name:
          type: string
          description: Dataset title from NCEI metadata
        description:
          type: string
          nullable: true
          description: Abstract / dataset description from NCEI metadata
        sourceAgency:
          type: string
          description: Producing agency (always "NOAA/NCEI" for portal results)
        resolutionMMin:
          type: number
          nullable: true
          description: Finest resolution in metres (null when not stated in NCEI metadata)
        resolutionMMax:
          type: number
          nullable: true
          description: Coarsest resolution in metres (null when not stated in NCEI metadata)
        coverageBbox:
          type: object
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        metadataUrl:
          type: string
          nullable: true
          description: Link to the NCEI metadata record or landing page
        wcsAvailable:
          type: boolean
          description: |
            True when the result's bbox intersects NCEI WCS mosaic coverage
            (BAG Mosaic for US coastal high-res data, DEM Global Mosaic for
            global ocean coverage). False means the dataset cannot be
            materialised in BathyScan yet.
      required:
        - id
        - name
        - sourceAgency
        - coverageBbox
        - wcsAvailable

    NceiPortalSaveBody:
      type: object
      description: Request body for POST /ncei/save
      properties:
        result:
          $ref: "#/components/schemas/NceiPortalResult"
      required:
        - result

    DatasetCatalogEntry:
      type: object
      description: A known public data source in the discovery catalog
      properties:
        id:
          type: string
          description: Stable slug identifier
        name:
          type: string
        sourceAgency:
          type: string
          description: Organisation that produced the data (e.g. NOAA/NCEI, GEBCO, Alaska DNR)
        dataType:
          type: string
          enum: [bathymetry, substrate, habitat, lidar, chart]
        resolutionMMin:
          type: number
          nullable: true
          description: Finest resolution in metres
        resolutionMMax:
          type: number
          nullable: true
          description: Coarsest resolution in metres
        coverageBbox:
          type: object
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        endpointUrl:
          type: string
          nullable: true
        accessNotes:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        keywords:
          type: string
          nullable: true
          description: Comma-separated keyword tags
        lastUpdated:
          type: string
          nullable: true
        waterType:
          type: string
          enum: [saltwater, freshwater]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sourceAgency
        - dataType
        - coverageBbox
        - waterType
        - createdAt

    DatasetCatalogSearchResult:
      allOf:
        - $ref: "#/components/schemas/DatasetCatalogEntry"
        - type: object
          properties:
            relevanceScore:
              type: number
              description: 0–1 relevance to the search query
          required:
            - relevanceScore

    UserCatalogSave:
      type: object
      description: A user's saved reference to a catalog dataset
      properties:
        id:
          type: string
          description: UUID primary key
        catalogId:
          type: string
          description: References the dataset_catalog.id
        status:
          type: string
          enum: [queued, processing, ready, failed]
        requestedAt:
          type: string
          format: date-time
        readyAt:
          type: string
          format: date-time
          nullable: true
        cacheKey:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        datasetId:
          type: string
          nullable: true
          description: UUID of the materialized `custom_datasets` row for this save, or null if materialization has not completed (status `queued`, `processing`, or `failed`).
        catalog:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DatasetCatalogEntry"
          description: Embedded catalog metadata (present when returned from list/status endpoints)
      required:
        - id
        - catalogId
        - status
        - requestedAt

    GpsTrailInput:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        colour:
          type: string
          default: "#ff6600"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/GpsPoint"
      required:
        - datasetId
        - name
        - startedAt
        - endedAt
        - points

    TrailPointsPage:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/GpsPoint"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - points
        - total
        - page
        - pageSize

    SurfaceConditions:
      type: object
      properties:
        available:
          type: boolean
        lat:
          type: number
        lon:
          type: number
        dataSource:
          type: string
        tidalDataSource:
          type: string
          enum: [noaa-coops, sinusoidal]
          description: Source of tidal current data — real NOAA CO-OPS station predictions or sinusoidal M2 approximation
        tidalStationId:
          type: string
          description: NOAA CO-OPS station id used when tidalDataSource is noaa-coops
        tidalStationName:
          type: string
          description: Human-readable name of the NOAA CO-OPS station
        tidalStationDistanceKm:
          type: number
          description: Distance in kilometers from the requested point to the NOAA station
        estimatedConditions:
          type: boolean
          description: True when actual data was unavailable and defaults were substituted
        hours:
          type: array
          items:
            $ref: "#/components/schemas/HourlySurfaceCondition"
        forecast48h:
          type: array
          description: 48-hour hourly forecast strip, anchored at the current UTC hour (relHour 0 = now).
          items:
            $ref: "#/components/schemas/ForecastHour"
      required:
        - available
        - lat
        - lon
        - hours

    ForecastHour:
      type: object
      properties:
        relHour:
          type: integer
          minimum: 0
          maximum: 47
          description: Relative hours from the fetch time (0–47).
        isoTime:
          type: string
          description: ISO 8601 UTC timestamp of this hour.
        windSpeedKnots:
          type: number
        windDegrees:
          type: number
        waveHeightM:
          type: number
        waveDirectionDeg:
          type: number
          description: Swell/wave direction in degrees (0–359) from Open-Meteo Marine API; omitted when data is unavailable.
        tidalSpeedKnots:
          type: number
        tidalDegrees:
          type: number
        isSlack:
          type: boolean
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
      required:
        - relHour
        - isoTime
        - windSpeedKnots
        - windDegrees
        - waveHeightM
        - tidalSpeedKnots
        - tidalDegrees
        - isSlack
        - phase

    WeatherStation:
      type: object
      description: A NOAA ASOS/AWOS aviation weather observation station with its latest obs
      properties:
        id:
          type: string
          description: ICAO station identifier (e.g. "KBLI")
        name:
          type: string
          description: Human-readable station name
        lat:
          type: number
          description: Station latitude
        lon:
          type: number
          description: Station longitude
        windSpeedKnots:
          type: number
          nullable: true
          description: Wind speed in knots (null if not reported)
        windDirDeg:
          type: number
          nullable: true
          description: Wind direction in degrees true (null if variable/calm/not reported)
        visibilityMiles:
          type: number
          nullable: true
          description: Visibility in statute miles (null if not reported)
        ceilingFt:
          type: number
          nullable: true
          description: Cloud ceiling height in feet AGL (null if unlimited/not reported)
        tempC:
          type: number
          nullable: true
          description: Temperature in degrees Celsius (null if not reported)
        observedAt:
          type: string
          nullable: true
          description: ISO 8601 UTC timestamp of the observation
      required:
        - id
        - name
        - lat
        - lon

    WeatherStationsResponse:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/WeatherStation"
          description: Nearby ASOS/AWOS stations with live observations
        stateCode:
          type: string
          nullable: true
          description: Two-letter US state code derived from the query point (null outside US)
        faaWeatherCamsUrl:
          type: string
          nullable: true
          description: FAA WeatherCams page URL for the derived state (null if state unknown)
        stale:
          type: boolean
          description: >
            True when the response is served from the DB fallback cache due to
            a NOAA API error. The data may be up to 1 hour old.
      required:
        - stations

    RawsStationItem:
      type: object
      description: A single AOOS RAWS weather station from the ERDDAP catalog
      properties:
        datasetId:
          type: string
          description: AOOS ERDDAP dataset ID (e.g. "raws_haida")
        name:
          type: string
          description: Human-readable station name
        lat:
          type: number
          description: Station latitude
        lon:
          type: number
          description: Station longitude
      required:
        - datasetId
        - name
        - lat
        - lon

    RawsStationsResponse:
      type: object
      properties:
        available:
          type: boolean
          description: False when the AOOS ERDDAP catalog was unreachable
        stations:
          type: array
          items:
            $ref: "#/components/schemas/RawsStationItem"
          description: Nearby RAWS stations within the requested radius
        source:
          type: string
          description: Data source identifier ("aoos-raws")
      required:
        - available
        - stations
        - source

    RawsObservation:
      type: object
      description: Latest sensor readings from a single RAWS station
      properties:
        time:
          type: string
          nullable: true
          description: ISO 8601 UTC timestamp of the observation
        airTemperatureC:
          type: number
          nullable: true
          description: Air temperature in degrees Celsius
        windSpeedMs:
          type: number
          nullable: true
          description: Wind speed in metres per second
        windFromDirectionDeg:
          type: number
          nullable: true
          description: Wind direction (from) in degrees true
        windGustMs:
          type: number
          nullable: true
          description: Wind gust speed in metres per second
        relativeHumidityPct:
          type: number
          nullable: true
          description: Relative humidity in percent
        solarIrradianceWm2:
          type: number
          nullable: true
          description: Solar irradiance in watts per square metre
        precipitationMm:
          type: number
          nullable: true
          description: Liquid-water-equivalent precipitation in millimetres
        fuelTemperatureC:
          type: number
          nullable: true
          description: Fuel temperature (fire weather) in degrees Celsius
        batteryVoltageV:
          type: number
          nullable: true
          description: Station battery voltage

