        contoursEnabled:
          type: boolean
          default: true
          description: Draw iso-depth contour lines on the 2D overview map.
        contourInterval:
          type: number
          minimum: 0.5
          maximum: 1000
          default: 10
          description: Spacing between contour lines in the user's active unit system (metres for metric, feet for imperial/nautical).
        defaultDepthPoleColor:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#22d3ee'
          description: Default hex colour applied to new depth-pole markers.
        markerClusterThreshold:
          type: integer
          minimum: 0
          maximum: 500
          default: 25
          description: Maximum number of visible markers before clustering is activated. Set to 0 to disable clustering.
        autoLoadTidal:
          type: boolean
          default: false
          description: Automatically load tidal current data when a dataset is opened.
        tripMinDurationH:
          type: integer
          minimum: 0
          maximum: 12
          default: 0
          description: Minimum trip length in hours for the Trip Window finder. Windows shorter than this are dimmed. 0 = show all windows.
        defaultTidalDepthLayer:
          type: string
          enum: [surface, mid, near-bottom]
          default: surface
          description: Depth layer pre-selected in the tidal overlay controls.
        currentArrowDensity:
          type: string
          enum: [sparse, normal, dense]
          default: normal
          description: Global density of current direction arrows shown across all depth layers.
        layerArrowDensity:
          type: object
          description: Per-depth-layer arrow density override. When set, overrides currentArrowDensity for that specific layer.
          properties:
            surface:
              type: string
              enum: [sparse, normal, dense]
            mid:
              type: string
              enum: [sparse, normal, dense]
            near-bottom:
              type: string
              enum: [sparse, normal, dense]
        windOverlayStyle:
          type: string
          enum: [arrows, particles]
          default: arrows
          description: Visual style for the wind overlay — directional arrows or streaming particles.
        tideOverlayStyle:
          type: string
          enum: [arrows, particles]
          default: arrows
          description: Visual style for the tidal height overlay.
        currentOverlayStyle:
          type: string
          enum: [arrows, particles]
          default: arrows
          description: Visual style for the ocean current overlay.
        currentsEnabled:
          type: boolean
          default: false
          description: Master enable for the bathymetry-shaped current simulation.
        currentsSource:
          type: string
