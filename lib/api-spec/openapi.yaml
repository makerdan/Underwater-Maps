        pageSize:
          type: integer
      required:
        - points
        - total
        - page
        - pageSize

    SurfaceConditions:
      type: object
      properties:
        available:
          type: boolean
        lat:
          type: number
        lon:
          type: number
        dataSource:
          type: string
        tidalDataSource:
          type: string
          enum: [noaa-coops, sinusoidal]
          description: Source of tidal current data — real NOAA CO-OPS station predictions or sinusoidal M2 approximation
        tidalStationId:
          type: string
          description: NOAA CO-OPS station id used when tidalDataSource is noaa-coops
        tidalStationName:
          type: string
          description: Human-readable name of the NOAA CO-OPS station
        tidalStationDistanceKm:
          type: number
          description: Distance in kilometers from the requested point to the NOAA station
        estimatedConditions:
          type: boolean
          description: True when actual data was unavailable and defaults were substituted
        hours:
          type: array
          items:
            $ref: "#/components/schemas/HourlySurfaceCondition"
        forecast48h:
          type: array
          description: 48-hour hourly forecast strip, anchored at the current UTC hour (relHour 0 = now).
          items:
            $ref: "#/components/schemas/ForecastHour"
      required:
        - available
        - lat
        - lon
        - hours

    ForecastHour:
      type: object
      properties:
        relHour:
          type: integer
          minimum: 0
          maximum: 47
          description: Relative hours from the fetch time (0–47).
        isoTime:
          type: string
          description: ISO 8601 UTC timestamp of this hour.
        windSpeedKnots:
          type: number
        windDegrees:
          type: number
        waveHeightM:
          type: number
        waveDirectionDeg:
          type: number
          description: Swell/wave direction in degrees (0–359) from Open-Meteo Marine API; omitted when data is unavailable.
        tidalSpeedKnots:
          type: number
        tidalDegrees:
          type: number
        isSlack:
          type: boolean
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
      required:
        - relHour
        - isoTime
        - windSpeedKnots
        - windDegrees
        - waveHeightM
        - tidalSpeedKnots
        - tidalDegrees
        - isSlack
        - phase

    WeatherStation:
      type: object
      description: A NOAA ASOS/AWOS aviation weather observation station with its latest obs
      properties:
        id:
          type: string
          description: ICAO station identifier (e.g. "KBLI")
        name:
          type: string
          description: Human-readable station name
        lat:
          type: number
          description: Station latitude
        lon:
          type: number
          description: Station longitude
        windSpeedKnots:
          type: number
          nullable: true
          description: Wind speed in knots (null if not reported)
        windDirDeg:
          type: number
          nullable: true
          description: Wind direction in degrees true (null if variable/calm/not reported)
        visibilityMiles:
          type: number
          nullable: true
          description: Visibility in statute miles (null if not reported)
        ceilingFt:
          type: number
          nullable: true
          description: Cloud ceiling height in feet AGL (null if unlimited/not reported)
        tempC:
          type: number
          nullable: true
          description: Temperature in degrees Celsius (null if not reported)
        observedAt:
          type: string
          nullable: true
          description: ISO 8601 UTC timestamp of the observation
      required:
        - id
        - name
        - lat
        - lon

    WeatherStationsResponse:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/WeatherStation"
          description: Nearby ASOS/AWOS stations with live observations
        stateCode:
          type: string
          nullable: true
          description: Two-letter US state code derived from the query point (null outside US)
        faaWeatherCamsUrl:
          type: string
          nullable: true
          description: FAA WeatherCams page URL for the derived state (null if state unknown)
        stale:
          type: boolean
          description: >
            True when the response is served from the DB fallback cache due to
            a NOAA API error. The data may be up to 1 hour old.
      required:
        - stations

    RawsStationItem:
      type: object
      description: A single AOOS RAWS weather station from the ERDDAP catalog
      properties:
        datasetId:
          type: string
          description: AOOS ERDDAP dataset ID (e.g. "raws_haida")
        name:
          type: string
          description: Human-readable station name
        lat:
          type: number
          description: Station latitude
        lon:
          type: number
          description: Station longitude
      required:
        - datasetId
        - name
        - lat
        - lon

    RawsStationsResponse:
      type: object
      properties:
        available:
          type: boolean
          description: False when the AOOS ERDDAP catalog was unreachable
        stations:
          type: array
          items:
            $ref: "#/components/schemas/RawsStationItem"
          description: Nearby RAWS stations within the requested radius
        source:
          type: string
          description: Data source identifier ("aoos-raws")
      required:
        - available
        - stations
        - source

    RawsObservation:
      type: object
      description: Latest sensor readings from a single RAWS station
      properties:
        time:
          type: string
          nullable: true
          description: ISO 8601 UTC timestamp of the observation
        airTemperatureC:
          type: number
          nullable: true
          description: Air temperature in degrees Celsius
        windSpeedMs:
          type: number
          nullable: true
          description: Wind speed in metres per second
        windFromDirectionDeg:
          type: number
          nullable: true
          description: Wind direction (from) in degrees true
        windGustMs:
          type: number
          nullable: true
          description: Wind gust speed in metres per second
        relativeHumidityPct:
          type: number
          nullable: true
          description: Relative humidity in percent
        solarIrradianceWm2:
          type: number
          nullable: true
          description: Solar irradiance in watts per square metre
        precipitationMm:
          type: number
          nullable: true
          description: Liquid-water-equivalent precipitation in millimetres
        fuelTemperatureC:
          type: number
          nullable: true
          description: Fuel temperature (fire weather) in degrees Celsius
        batteryVoltageV:
          type: number
          nullable: true
          description: Station battery voltage

    RawsWeatherResponse:
      type: object
      properties:
        available:
          type: boolean
          description: False when the AOOS ERDDAP station was unreachable or had no recent data
        observation:
          $ref: "#/components/schemas/RawsObservation"
        station:
          type: object
          properties:
            datasetId:
              type: string
          required:
            - datasetId
      required:
        - available

    WeatherStationObsResponse:
      type: object
      properties:
        available:
          type: boolean
          description: False when the NOAA API was unreachable or returned no observations
        observation:
          type: object
          description: The observation nearest to the requested time (omitted when available=false)
          properties:
            windSpeedKnots:
              type: number
              nullable: true
              description: Wind speed in knots
            windDirDeg:
              type: number
              nullable: true
              description: Wind direction in degrees true
            visibilityMiles:
              type: number
              nullable: true
              description: Visibility in statute miles
            ceilingFt:
              type: number
              nullable: true
              description: Cloud ceiling in feet AGL
            tempC:
              type: number
              nullable: true
              description: Air temperature in degrees Celsius
            observedAt:
              type: string
              nullable: true
              description: ISO 8601 UTC timestamp of the observation
      required:
        - available

    WaterTemperature:
      type: object
      properties:
        available:
          type: boolean
          description: True when a live sea-surface temperature was retrieved
        lat:
          type: number
        lon:
          type: number
        sstCelsius:
          type: number
          description: Sea-surface temperature in degrees Celsius (omitted when available=false)
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the sample (top of hour)
        source:
          type: string
          description: Human-readable attribution for the data source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
      required:
        - available
        - lat
        - lon

    TemperatureProfileSample:
      type: object
      properties:
        depthM:
          type: number
          description: Depth below the surface in metres
        temperatureC:
          type: number
          description: Water temperature in degrees Celsius
      required:
        - depthM
        - temperatureC

    TemperatureProfile:
      type: object
      properties:
        available:
          type: boolean
          description: True when a real depth-resolved profile was found
        lat:
          type: number
        lon:
          type: number
        samples:
          type: array
          description: Sorted shallow→deep depth/temperature samples (empty when available=false)
          items:
            $ref: "#/components/schemas/TemperatureProfileSample"
        source:
          type: string
          description: Human-readable attribution for the profile source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the measurement (when applicable)
        provider:
          type: string
          description: Identifier of the underlying data provider (e.g. "bundled-ctd", "argo", "woa", "estimated")
      required:
        - available
        - lat
        - lon
        - samples

    HourlySurfaceCondition:
      type: object
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        windSpeedKnots:
          type: number
        windDegrees:
          type: number
        tidalSpeedKnots:
          type: number
        tidalDegrees:
          type: number
        waveHeightM:
          type: number
        waveDirectionDeg:
          type: number
          description: Swell/wave direction in degrees (0–359) from Open-Meteo Marine API; omitted when data is unavailable.
        isSlack:
          type: boolean
          description: True when the modeled tidal current is below the slack threshold (~0.1 kn)
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
          description: Tidal phase for this hour
      required:
        - hour
        - windSpeedKnots
        - windDegrees
        - tidalSpeedKnots
        - tidalDegrees
        - waveHeightM

    SlackBlock:
      type: object
      description: Slack-tide context for a single instant
      properties:
        isSlack:
          type: boolean
        phase:
          type: string
          enum: [flooding, ebbing, slack-high, slack-low]
        minutesToSlack:
          type: number
        minutesSinceSlack:
          type: number
        nextReversalAt:
          type: string
          description: ISO timestamp of the next slack (next high/low)
      required:
        - isSlack
        - phase
        - minutesToSlack
        - minutesSinceSlack
        - nextReversalAt

    TrollingPreset:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        userId:
          type: string
        name:
          type: string
        headingDeg:
          type: number
          minimum: 0
          maximum: 360
        speedKnots:
          type: number
          minimum: 0
          maximum: 10
        startLat:
          type: number
          nullable: true
        startLon:
          type: number
          nullable: true
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/TrollingPresetWaypoint"
        sortOrder:
          type: integer
          description: Ascending sort key; lower values surface first
        folderId:
          type: string
          nullable: true
          description: ID of the folder grouping this preset, or null for root
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - headingDeg
        - speedKnots
        - waypoints
        - sortOrder
        - createdAt

    TrollingPresetWaypoint:
      type: object
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lon:
          type: number
          minimum: -180
          maximum: 180
      required:
        - lat
        - lon

    TrollingPresetUpdate:
      type: object
      description: Partial update to a saved trolling preset. At least one field must be provided.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        sortOrder:
          type: integer
        folderId:
          type: string
          nullable: true
          description: ID of the folder this preset belongs to, or null to move to the root
      minProperties: 1

    TrollingPresetInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        headingDeg:
          type: number
          minimum: 0
          maximum: 360
        speedKnots:
          type: number
          minimum: 0
          maximum: 10
        startLat:
          type: number
          nullable: true
        startLon:
          type: number
          nullable: true
        waypoints:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/TrollingPresetWaypoint"
        folderId:
          type: string
          nullable: true
      required:
        - name
        - headingDeg
        - speedKnots

    TrollingPresetFolder:
      type: object
      description: A folder for grouping the user's saved trolling presets
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateTrollingPresetFolderBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
      required:
        - name

    RenameTrollingPresetFolderBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
      required:
        - name

    MarkerPatch:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 60
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
        notes:
          type: string
          maxLength: 500
          nullable: true

    MarkerInput:
      type: object
      properties:
        datasetId:
          type: string
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
          default: custom
        label:
          type: string
          minLength: 1
          maxLength: 60
        notes:
          type: string
          nullable: true
          maxLength: 280
        quickCatch:
          type: boolean
          default: false
          description: >
            When true, the server assigns the user's next sequential catch
            number and overrides the label with "Catch N". Used by the
            one-tap GPS quick-drop.
        conditions:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MarkerConditions"
          description: Optional frozen conditions snapshot captured at drop time
      required:
        - datasetId
        - lon
        - lat
        - depth
        - label

    SavedRoute:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        datasetId:
          type: string
        name:
          type: string
        waypoints:
          type: array
          items:
            type: object
            properties:
              lon:
                type: number
              lat:
                type: number
              depth:
                type: number
        waypointCount:
          type: integer
        totalDistanceM:
          type: number
        createdAt:
          type: string
      required:
        - id
        - userId
        - datasetId
        - name
        - waypoints
        - waypointCount
        - totalDistanceM

    DeepHealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        subsystems:
          type: object
          properties:
            db:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, degraded]
                latencyMs:
                  type: integer
                error:
                  type: string
            poe:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, degraded]
                latencyMs:
                  type: integer
                error:
                  type: string
            aoos:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, degraded]
                latencyMs:
                  type: integer
                error:
                  type: string
      required:
        - status
        - subsystems

    GithubWorkflowRun:
      type: object
      description: Slim representation of a GitHub Actions workflow run
      required: [id, status, created_at, html_url, workflow_id]
      properties:
        id:
          type: integer
          description: Numeric run ID
        name:
          type: string
          nullable: true
          description: Display name of the workflow run
        status:
          type: string
          nullable: true
          description: Run status (queued, in_progress, completed, etc.)
        conclusion:
          type: string
          nullable: true
          description: Run conclusion (success, failure, cancelled, etc.)
        created_at:
          type: string
          format: date-time
        html_url:
          type: string
          description: URL to the run on github.com
        workflow_id:
          type: integer
          description: Numeric workflow ID this run belongs to
