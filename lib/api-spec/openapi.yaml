  /intertidal-spots/{id}:
    get:
      operationId: getIntertidalSpots
      tags: [datasets]
      summary: Tidepool & beachcombing hotspot polygons scored from ShoreZone / AOOS data
      description: |
        Returns a GeoJSON FeatureCollection of intertidal substrate polygons that have
        been rated for recreational tidepool exploration and beachcombing using the
        BathyScan Intertidal Scorer algorithm.

        Polygons are sourced from the Alaska ShoreZone program and (for Prince of Wales
        Island datasets) the AOOS Alaska Coastal Habitats intertidal layer.  Each feature
        carries two computed scores:

          - `tidepoolScore`     — 0-100, weighted by bedrock/rubble substrate, zone
                                  relief, and invertebrate/algal bioband density.
          - `beachcombingScore` — 0-100, weighted by sand/cobble substrate, stone
                                  roundness, debris load, and wave energy.

        An optional `scoreSignals` object provides the top contributing attributes plus
        a natural-language "Why this spot?" summary.

        The response is sorted descending by the dominant score for the requested `type`.
        Datasets outside SE Alaska return an empty FeatureCollection (no ShoreZone coverage).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Dataset ID (must match a known preset or uploaded dataset)
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [tidepool, beachcombing, both]
            default: both
          description: Filter to tidepool spots, beachcombing spots, or both
        - in: query
          name: minScore
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 0
          description: Minimum score (inclusive) for the returned activity type
      responses:
        "200":
          description: Scored intertidal hotspot FeatureCollection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntertidalSpotFeatureCollection"
        "400":
          description: Invalid query parameter value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /substrate/{id}:
    get:
      operationId: getSubstrate
      tags: [datasets]
      summary: Real Alaska ShoreZone substrate polygons
      description: |
        Returns a GeoJSON FeatureCollection of substrate polygons sourced from the
        Alaska ShoreZone Coastal Habitat Mapping Program (NOAA AKR / ADF&G — public
        domain, https://alaskafisheries.noaa.gov/shorezone/). Each polygon is a
        ShoreZone intertidal-zone (ITZ) unit from the `AK_SZ_ITZ_Polygons` layer
        whose `Mat_Desc` and `Form_Desc` attributes have been classified into a
        CMECS broad substrate class (bedrock / gravel / sand / mud).

        The server bundles a regional Alaska ShoreZone collection (refreshed
        offline via `pnpm --filter @workspace/scripts run build-shorezone`) and
        filters it to the dataset's AOI bbox at request time. Datasets whose AOI
        does not overlap published ShoreZone polygon coverage receive an empty
        FeatureCollection together with a `nearestCoverage` block in `metadata`
        describing where real ShoreZone coverage actually exists.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset identifier
      responses:
        "200":
          description: GeoJSON FeatureCollection of substrate polygons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubstrateFeatureCollection"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/catalog:
    get:
      operationId: getDatasetsCatalog
      tags: [datasets]
      summary: List all known public data sources in the catalog
      description: Returns all entries in the dataset discovery catalog, optionally filtered by data type, water type, or bounding box.
      parameters:
        - in: query
          name: dataType
          required: false
          schema:
            type: string
            enum: [bathymetry, substrate, habitat, lidar, chart]
        - in: query
          name: waterType
          required: false
          schema:
            type: string
            enum: [saltwater, freshwater]
      responses:
        "200":
          description: List of catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetCatalogEntry"

  /datasets/catalog/search:
    get:
      operationId: getDatasetsCatalogSearch
      tags: [datasets]
      summary: Keyword search over the dataset catalog
      description: Full-text keyword search with optional type, waterType, and bounding-box filters. Returns results ranked by keyword relevance.
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: dataType
          required: false
          schema:
            type: string
            enum: [bathymetry, substrate, habitat, lidar, chart]
        - in: query
          name: waterType
          required: false
          schema:
            type: string
            enum: [saltwater, freshwater]
        - in: query
          name: minLon
          required: false
          schema:
            type: number
        - in: query
          name: minLat
          required: false
          schema:
            type: number
        - in: query
          name: maxLon
          required: false
          schema:
            type: number
        - in: query
          name: maxLat
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Ranked list of matching catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetCatalogSearchResult"

  /datasets/bbox-query:
    post:
      operationId: postDatasetsBboxQuery
      tags: [datasets]
      summary: Find catalog datasets whose coverage intersects a bounding box
      description: |
        Returns the dataset catalog entries whose coverage bounding box
        intersects the request bbox. Use this for "give me data for this area"
        queries drawn on the 2D overview map.

        Validation rules:
          * north > south, east > west
          * latitudes clamped to [-90, 90], longitudes clamped to [-180, 180]
          * zero-area or near-zero-area bboxes are rejected
          * antimeridian-crossing bboxes (east < west) are rejected
          * boxes spanning more than 180° in longitude or 170° in latitude
            are rejected as "too large"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [north, south, east, west]
              properties:
                north: { type: number, minimum: -90, maximum: 90, description: Northern latitude in decimal degrees }
                south: { type: number, minimum: -90, maximum: 90, description: Southern latitude in decimal degrees }
                east:  { type: number, minimum: -180, maximum: 180, description: Eastern longitude in decimal degrees }
                west:  { type: number, minimum: -180, maximum: 180, description: Western longitude in decimal degrees }
                dataType:
                  type: string
                  enum: [bathymetry, substrate, habitat, lidar, chart]
                waterType:
                  type: string
                  enum: [saltwater, freshwater]
      responses:
        "200":
          description: Catalog entries intersecting the bbox, ordered by relevance
          content:
            application/json:
              schema:
                type: object
                required: [bbox, datasets]
                properties:
                  bbox:
                    type: object
                    required: [north, south, east, west]
                    properties:
                      north: { type: number }
                      south: { type: number }
                      east:  { type: number }
                      west:  { type: number }
                  datasets:
                    type: array
                    items:
                      $ref: "#/components/schemas/DatasetCatalogSearchResult"
        "400":
          description: Invalid bbox (zero area, antimeridian, out of range, or too large)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ncei/search:
    get:
      operationId: getNceiSearch
      tags: [datasets]
      summary: Search the NCEI Bathymetry Geoportal
      description: |
        Proxies a keyword + optional bounding-box search against the NCEI
        Bathymetry Geoportal (ncei.noaa.gov/maps/bathymetry/). Results are
        normalised, filtered to records with a valid bbox, and cached for
        10 minutes. When q is empty the proxy defaults to "bathymetry" to
        avoid returning non-ocean datasets from the NCEI catalog.
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Free-text keyword query (e.g. "Sitka bathymetry", "Alaska DEM")
        - in: query
          name: bbox
          required: false
          schema:
            type: string
          description: Spatial filter as "minLon,minLat,maxLon,maxLat"
        - in: query
          name: from
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 1-based result offset for pagination (default 1)
        - in: query
          name: max
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of results to return per page (default 20)
      responses:
        "200":
          description: Normalised list of matching NCEI portal results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NceiPortalResult"
        "503":
          description: NCEI Geoportal is unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ncei/save:
    post:
      operationId: postNceiSave
      tags: [datasets]
      summary: Save an NCEI portal result to the user's library
      description: |
        Upserts an NCEI portal result into the dataset catalog (with a
        `ncei-portal-{id}` slug) and queues terrain materialisation via the
        NCEI WCS mosaics. Requires authentication. Idempotent — returns the
        existing save row if one is already in progress or ready.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NceiPortalSaveBody"
      responses:
        "200":
          description: Existing save row returned (already saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "201":
          description: New save job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "400":
          description: Invalid request body or dataset has no WCS coverage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/catalog/{id}/save:
    post:
      operationId: postDatasetsCatalogIdSave
      tags: [datasets]
      summary: Save a catalog dataset to the user's account
      description: Queues a catalog dataset for caching and associates it with the authenticated user's account. Returns a save job record.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Catalog dataset ID
      responses:
        "201":
          description: Save job created (status queued or ready)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Catalog entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves:
    get:
      operationId: getDatasetsMySaves
      tags: [datasets]
      summary: List the authenticated user's saved catalog datasets
      description: Returns all catalog datasets the user has saved, joined with catalog metadata.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of user save records with embedded catalog metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}:
    delete:
      operationId: deleteDatasetsMySavesId
      tags: [datasets]
      summary: Delete a saved catalog dataset
      description: |
        Removes the user's `user_catalog_saves` row and, if the save has been
        materialized, the linked `custom_datasets` row (terrain + overview
        grids) as well. Ownership is enforced — only the user that created
        the save may delete it.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "204":
          description: Save deleted
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}/status:
    get:
      operationId: getDatasetsMySavesIdStatus
      tags: [datasets]
      summary: Poll the status of a user's save job
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "200":
          description: Current status of the save job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/my-saves/{id}/retry:
    post:
      operationId: postDatasetsMySavesIdRetry
      tags: [datasets]
      summary: Retry materialization of a failed save
      description: |
        Re-runs materialization for a save row that previously failed. Flips
        the row status back to `processing`, clears the prior `errorMessage`,
        and kicks off the materialization pipeline again. If the save is
        already `processing` or `ready`, returns the current row unchanged.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Save record UUID
      responses:
        "200":
          description: Save row after retry (status processing, or unchanged if not retryable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCatalogSave"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Save record or catalog entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /surface-conditions:
    get:
      operationId: getSurfaceConditions
      tags: [drift-planner]
      summary: Fetch hourly surface weather and tidal conditions for drift planning
      description: |
        Returns 48 hours of hourly wind, tidal current, and wave data for a given
        lat/lon from Open-Meteo. Tidal current is approximated via a sinusoidal
        model when live data is unavailable. Returns estimatedConditions=true when
        Open-Meteo is unreachable and default values are substituted. The `hours`
        array contains the first 24 hours (backward-compatible); `forecast48h`
        contains all 48 hours with ISO timestamps and relative hour indices.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: 24-hour surface conditions array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurfaceConditions"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /weather-stations:
    get:
      operationId: getWeatherStations
      tags: [drift-planner]
      summary: Fetch nearby NOAA aviation weather station observations
      description: |
        Returns ASOS/AWOS station observations (wind, visibility, ceiling,
        temperature) for stations near the given lat/lon using the NOAA
        Weather API (api.weather.gov). Also returns the FAA WeatherCams URL
        for the resolved US state. Observations are cached for 10 minutes.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
        - name: radiusMiles
          in: query
          required: false
          schema:
            type: number
            default: 75
          description: Search radius in statute miles (default 75, max 500)
      responses:
        "200":
          description: Nearby weather stations with live observations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStationsResponse"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream NOAA API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /raws-stations:
    get:
      operationId: getRawsStations
      tags: [drift-planner]
      summary: Fetch nearby AOOS RAWS weather station list
      description: |
        Returns all RAWS (Remote Automatic Weather Station) stations within
        `radiusKm` kilometres of the given lat/lon, drawn from the AOOS ERDDAP
        catalog (cached 24 h). Returns available=false on ERDDAP failure so
        the UI degrades gracefully.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of dataset centre
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of dataset centre
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            default: 150
          description: Search radius in kilometres (default 150, max 500)
      responses:
        "200":
          description: Nearby RAWS stations or available=false on upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawsStationsResponse"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /raws-weather:
    get:
      operationId: getRawsWeather
      tags: [drift-planner]
      summary: Fetch latest observation for a single AOOS RAWS station
      description: |
        Returns the most-recent observation row for the given RAWS datasetId
        from the AOOS ERDDAP server. The datasetId must match the raws_* pattern.
        Results are cached 10 min on success, 2 min on failure.
        Returns available=false on ERDDAP failure so the UI degrades gracefully.
      parameters:
        - name: datasetId
          in: query
          required: true
          schema:
            type: string
          description: AOOS ERDDAP dataset ID (must match raws_* pattern)
      responses:
        "200":
          description: Latest RAWS observation or available=false on upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawsWeatherResponse"
        "400":
          description: Missing or invalid datasetId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /water-temperature:
    get:
      operationId: getWaterTemperature
      tags: [drift-planner]
      summary: Fetch current sea-surface temperature for a lat/lon point
      description: |
        Returns the current sea-surface temperature (°C) at the requested
        lat/lon from the Open-Meteo Marine API. Used by BathyScan's HUD
        temperature readout as the surface anchor of a thermocline model.
        Returns available=false when the live feed is unreachable so the
        caller can gracefully fall back to a synthetic estimate.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
      responses:
        "200":
          description: Current sea-surface temperature for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterTemperature"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /temperature-profile:
    get:
      operationId: getTemperatureProfile
      tags: [drift-planner]
      summary: Fetch a depth-resolved temperature profile for a lat/lon point
      description: |
        Returns a real per-location temperature-vs-depth profile when one
        is available from a bundled CTD cast, an Argo float, or an
        oceanographic reanalysis dataset. The samples are sorted
        shallow→deep so a client can plot them directly. When no real
        profile is available the response is `{ available: false, ... }`
        and the caller is expected to fall back to its surface-anchored
        thermocline model.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of query point
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude of query point
        - name: datasetId
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional preset dataset id (e.g. `thorne-bay`). When provided,
            the server prefers a bundled cast registered for that dataset
            over a generic nearest-neighbour lookup.
      responses:
        "200":
          description: Depth-resolved temperature profile for the point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureProfile"
        "400":
          description: Missing or invalid lat/lon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /efh:
    get:
      operationId: getEfh
      tags: [datasets]
      summary: Essential Fish Habitat zones
      description: |
        Returns GeoJSON Essential Fish Habitat zone polygons for the requested area.
        Currently covers the Thorne Bay / Clarence Strait / SE Alaska region.
        Data credit: NOAA Fisheries / NMFS Alaska Region.
        https://www.fisheries.noaa.gov/resource/data/alaska-essential-fish-habitat-efh-species-shapefiles
      parameters:
        - name: datasetId
          in: query
          schema:
            type: string
          description: Filter to a known preset dataset's AOI (e.g. thorne-bay)
        - name: species
          in: query
          schema:
            type: string
          description: Comma-separated species names or common names to filter
      responses:
        "200":
          description: GeoJSON FeatureCollection of Essential Fish Habitat zone polygons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfhFeatureCollection"

  /datasets/{id}/zones:
    get:
      operationId: getDatasetZones
      tags: [datasets]
      summary: Get AI-classified seafloor/lake-bed zones for a dataset
      description: Returns 1024 zone labels for the 32×32 coarse grid. Results are cached; a stable gridHash avoids redundant AI calls.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Dataset ID (UUID, "upload", or built-in preset ID)
        - in: query
          name: h
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{8}$|^[a-f0-9]{64}$'
          description: Lowercase hex hash of the depth grid (8-char FNV-1a or 64-char SHA-256) for cache keying
        - in: query
          name: w
          required: true
          schema:
            type: string
            enum: [saltwater, freshwater]
          description: Water type — must be 'saltwater' or 'freshwater'
      responses:
        "200":
          description: Zone classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/chunk:
    post:
      operationId: uploadDatasetChunk
      tags: [datasets]
      summary: Upload one chunk of a large dataset file
      description: Receives a single 5 MB slice of a file. The first chunk (chunkIndex=0) opens the upload session; subsequent chunks must come from the same authenticated user.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [uploadId, chunkIndex, totalChunks, file]
              properties:
                uploadId:
                  type: string
                  description: Stable UUID chosen by the client for this upload session
                chunkIndex:
                  type: integer
                  description: 0-based index of this slice
                totalChunks:
                  type: integer
                  description: Total number of slices the client will send
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Chunk received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/chunk/finalize:
    post:
      operationId: finalizeChunkedUpload
      tags: [datasets]
      summary: Finalize a chunked upload and start processing
      description: Called after all chunks have been sent. Enqueues an async job that reassembles chunks, parses the file, builds the terrain grid, and saves to DB. Returns a jobId to poll.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadId, fileName, totalChunks]
              properties:
                uploadId:
                  type: string
                fileName:
                  type: string
                totalChunks:
                  type: integer
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
      responses:
        "200":
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
        "400":
          description: Invalid parameters or missing chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Upload session belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Upload session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/jobs/{jobId}:
    get:
      operationId: getUploadJobStatus
      tags: [datasets]
      summary: Poll the status of a chunked-upload processing job
      description: Returns the current state of a background upload-processing job. Falls back to the database after a server restart.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [queued, processing, done, error]
                  progress:
                    type: integer
                  error:
                    type: string
                  datasetId:
                    type: string
        "403":
          description: Job belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/request-gcs-url:
    post:
      operationId: requestGcsUploadUrl
      tags: [datasets]
      summary: Get a presigned GCS PUT URL for oversized file uploads
      description: Generates a presigned GCS PUT URL for files >50 MB. The client uploads directly to GCS; the API server's memory is never involved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName]
              properties:
                fileName:
                  type: string
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                  objectKey:
                    type: string
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "415":
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload/gcs-job-status:
    get:
      operationId: getGcsJobStatus
      tags: [datasets]
      summary: Check processing status for a GCS-backed upload job
      description: Returns the status of a GCS background-processing job by objectKey. The objectKey must belong to the authenticated user.
      parameters:
        - in: query
          name: objectKey
          required: true
          schema:
            type: string
          description: GCS object key returned by /datasets/upload/request-gcs-url
      responses:
        "200":
          description: GCS job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, processing, done, error]
                  datasetId:
                    type: string
                  error:
                    type: string
        "400":
          description: objectKey is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Object key does not belong to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tidal:
    get:
      operationId: getTidal
      tags: [tidal]
      summary: Current tide height, current speed/direction, and next high/low event
      description: Queries the nearest NOAA water-level and currents-prediction stations for the given coordinates and returns current conditions with slack window data.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees
        - in: query
          name: lon
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees
        - in: query
          name: datetime
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 datetime for the prediction (defaults to now)
      responses:
        "200":
          description: Current tidal conditions
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  tideHeight:
                    type: number
                  currentDirection:
                    type: number
                  currentSpeed:
                    type: number
                  nextEvent:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [high, low]
                      time:
                        type: string
                      height:
                        type: number
                  source:
                    type: string
                    enum: [noaa, estimated]
        "400":
          description: lat and lon are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tidal/schedule:
    get:
      operationId: getTidalSchedule
      tags: [tidal]
      summary: Multi-day tide schedule with slack windows
      description: Returns an ordered list of high/low tide events with slack windows and current direction changes for the requested location and day range.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lon
          required: true
          schema:
            type: number
        - in: query
          name: days
          required: false
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 14
          description: Number of days to return (1–14)
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 start datetime (defaults to now)
      responses:
        "200":
          description: Tide schedule
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  source:
                    type: string
                    enum: [noaa, estimated]
                  stationId:
                    type: string
                  stationName:
                    type: string
                  rangeStart:
                    type: string
                  rangeEnd:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [high, low]
                        time:
                          type: string
                        height:
                          type: number
                        nextDirectionDeg:
                          type: number
                        windowStart:
                          type: string
                        windowEnd:
                          type: string
        "400":
          description: lat and lon are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /healthz/deep:
    get:
      operationId: getDeepHealthz
      tags: [health]
      summary: Deep health probe — checks DB, Poe, and AOOS subsystems
      description: Probes each critical subsystem and returns per-subsystem status. Returns HTTP 503 when any subsystem is degraded. Use the shallow /healthz for load-balancer liveness probes.
      responses:
        "200":
          description: All subsystems healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthStatus"
        "503":
          description: One or more subsystems degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepHealthStatus"

  /admin/bucket-monitor:
    get:
      operationId: adminBucketMonitor
      tags: [admin]
      summary: GCS dataset landing bucket processing summary
      description: Returns a JSON summary of all objects in the GCS dataset landing bucket broken down by status (pending, processing, done, failed). Restricted to admin users.
      responses:
        "200":
          description: Bucket status summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: integer
                  processing:
                    type: integer
                  done:
                    type: integer
                  failed:
                    type: integer
                  lifecycle:
                    type: object
                    properties:
                      processedDatasetsTtlDays:
                        type: integer
                      failedDatasetsTtlDays:
                        type: integer
                      note:
                        type: string
                      lastAppliedAt:
                        type: string
                        nullable: true
                      lastApplyError:
                        type: string
                        nullable: true
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/export:
    get:
      operationId: exportUserData
      tags: [account]
      summary: Export all user data as a downloadable JSON file
      description: Returns markers, custom datasets, GPS trails, and settings as a JSON attachment. Used by Settings → Account & Privacy.
      responses:
        "200":
          description: Full user data export (JSON attachment)
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportedAt:
                    type: string
                  userId:
                    type: string
                  settings:
                    type: object
                    nullable: true
                  markers:
                    type: array
                    items:
                      type: object
                  customDatasets:
                    type: array
                    items:
                      type: object
                  trails:
                    type: array
                    items:
                      type: object

  /me:
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the authenticated user's account and all associated data
      description: Deletes all markers, custom datasets, GPS trails, trail points, and settings for the caller. This action is irreversible.
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deletedAt:
                    type: string

  /github/repos:
    get:
      operationId: listGithubRepos
      tags: [github]
      summary: List GitHub repositories accessible to the configured PAT
      description: Returns up to 100 repositories for the authenticated GitHub token.
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /github/repos/{owner}/{repo}/contents/{path}:
    put:
      operationId: putGithubFileContents
      tags: [github]
      summary: Create or update a file in a GitHub repository
      description: Creates or updates a file. Requires a commit message, base64-encoded content, and optionally the current blob SHA (for updates) and a branch name.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, content]
              properties:
                message:
                  type: string
                  description: Commit message
                content:
                  type: string
                  description: Base64-encoded file content
                sha:
                  type: string
                  description: Current blob SHA (required when updating an existing file)
                branch:
                  type: string
                  description: Target branch (defaults to repo default branch)
      responses:
        "200":
          description: File created or updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: GitHub API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /query:
    post:
      operationId: queryTerrain
      tags: [query]
      summary: Natural-language terrain query via OpenAI tool calling ("Ask the Ocean")
      description: Receives a free-text query and terrain context. Sends to GPT with terrain tool schema and returns tool calls and/or a text response that the frontend executes locally. Rate-limited per user and per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Natural-language question or command about the terrain
                context:
                  type: object
                  properties:
                    datasetName:
                      type: string
                    waterType:
                      type: string
                    minDepth:
                      type: number
                    maxDepth:
                      type: number
                    cameraLon:
                      type: number
                      nullable: true
                    cameraLat:
                      type: number
                      nullable: true
                    cameraDepth:
                      type: number
                      nullable: true
                    topZones:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Query result with tool calls and/or text response
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolCalls:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        args:
                          type: object
                  textResponse:
                    type: string
                    nullable: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: OpenAI upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /poe/help:
    post:
      operationId: poeHelp
      tags: [poe]
      summary: Answer a BathyScan help question using Poe AI
      description: Receives a plain-text question (and optional conversation history) and returns a concise answer drawn from the built-in help articles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  maxLength: 1000
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
      responses:
        "200":
          description: Help answer
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
        "400":
          description: Missing or invalid question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/upscale:
    post:
      operationId: poeUpscale
      tags: [poe]
      summary: Upscale a 2D heatmap PNG via Poe (TopazLabs model)
      description: Accepts a base64-encoded PNG and an upscale factor (2 or 4). Returns the upscaled image as a base64 PNG. On failure returns a non-200 status so the frontend can fall back to the original bitmap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageBase64]
              properties:
                imageBase64:
                  type: string
                  description: "Base64-encoded PNG (with or without data: prefix)"
                upscaleFactor:
                  type: integer
                  minimum: 2
                  maximum: 4
                  default: 2
      responses:
        "200":
          description: Upscaled image
          content:
            application/json:
              schema:
                type: object
                properties:
                  imageBase64:
                    type: string
        "400":
          description: Missing imageBase64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: TopazLabs returned no image or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Circuit breaker open — upscale service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /routes:
    get:
      operationId: getRoutes
      tags: [routes]
      summary: List saved navigation routes for a dataset
      description: Returns all routes belonging to the authenticated user for the given dataset, ordered by creation time.
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset ID to filter routes by
      responses:
        "200":
          description: List of saved routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRoute"
        "400":
          description: datasetId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createRoute
      tags: [routes]
      summary: Create a new saved navigation route
      description: Saves a named waypoint sequence for the given dataset. Waypoints must contain at least 2 and at most 20 points.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [datasetId, name, waypoints, totalDistanceM]
              properties:
                datasetId:
                  type: string
                name:
                  type: string
                  maxLength: 120
                waypoints:
                  type: array
                  minItems: 2
                  maxItems: 20
                  items:
                    type: object
                    properties:
                      lon:
                        type: number
                      lat:
                        type: number
                      depth:
                        type: number
                totalDistanceM:
                  type: number
      responses:
        "201":
          description: Route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /routes/{id}:
    patch:
      operationId: patchRoute
      tags: [routes]
      summary: Rename a saved navigation route
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 120
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid id or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteRoute
      tags: [routes]
      summary: Delete a saved navigation route
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Route deleted
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PoeError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    PoeClassifyRequest:
      type: object
      properties:
        gridBase64:
          type: string
          description: Base64-encoded PNG data URL of the 256×256 depth grid
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
        datasetId:
          type: string
          description: Dataset identifier used for cache keying
        gridHash:
          type: string
          description: Client-computed FNV-1a 32-bit hash of the depth grid (8-char hex)
        depths32:
          type: array
          items:
            type: number
          description: |
            Optional 1024-length (32×32 row-major) downsample of the depth grid in metres.
            Used by the server as input for the depth-based fallback classifier when the
            AI call fails. Not used when the AI call succeeds.
        depthsFull:
          type: array
          items:
            type: number
          description: |
            Optional full-resolution row-major depth grid (length widthFull*heightFull).
            When provided the server may split the area into multiple overlapping 32×32
            tiles, classify each at the existing per-call resolution, and stitch the
            results so high-resolution datasets preserve detail instead of being
            collapsed into a single thumbnail.
        widthFull:
          type: integer
          description: Width of `depthsFull` in cells. Required when `depthsFull` is set.
        heightFull:
          type: integer
          description: Height of `depthsFull` in cells. Required when `depthsFull` is set.
      required:
        - gridBase64

    ClassifyResult:
      type: object
      properties:
        zones:
          type: array
          items:
            type: string
          description: |
            Zone labels in row-major order. Length is `coarseWidth*coarseHeight`,
            which defaults to 1024 (32×32) for the single-tile path and grows for
            tiled high-resolution datasets.
        fromCache:
          type: boolean
          description: Whether the result was served from the in-memory cache
        source:
          type: string
          enum: [ai, heuristic, partial]
          description: |
            "ai" when every cell was labeled by the Poe AI classifier (live or
            cached); "heuristic" when the depth-based fallback covered the whole
            grid because the AI was unavailable; "partial" when the result was
            stitched from a mix of AI-classified and heuristic tiles.
        substrateFp:
          type: string
          description: |
            8-char hex fingerprint of the bundled ShoreZone + ENC substrate grid
            sampled for this dataset's AOI. Forms part of the zone-cache key so
            a change in surveyed substrate coverage invalidates stale results.
            "00000000" when the dataset has no substrate coverage.
        coarseWidth:
          type: integer
          description: Width of the returned zones grid. Defaults to 32 when omitted.
        coarseHeight:
          type: integer
          description: Height of the returned zones grid. Defaults to 32 when omitted.
        tilesTotal:
          type: integer
          description: Total number of tiles in the plan (1 for the single-tile path).
        tilesAi:
          type: integer
          description: Number of tiles that were successfully labeled by the AI.
        tilesHeuristic:
          type: integer
          description: Number of tiles that fell back to the heuristic classifier.
      required:
        - zones
        - fromCache

    ToolCall:
      type: object
      properties:
        name:
          type: string
        args:
          type: object
          additionalProperties: true
        id:
          type: string
      required:
        - name
        - args

    PoeQueryRequest:
      type: object
      properties:
        userMessage:
          type: string
          description: The user's natural language query
        context:
          type: object
          additionalProperties: true
          description: Terrain context (datasetName, waterType, minDepth, maxDepth, lon, lat, cameraDepth, zoneName)
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
          description: Last N conversation turns (server clips to 10)
        previousResponseId:
          type: string
          description: Poe response ID for multi-turn context chaining
      required:
        - userMessage

    QueryResult:
      type: object
      properties:
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        text:
          type: string
          nullable: true
          description: Text reply when no tool calls are made
        responseId:
          type: string
          nullable: true
          description: Poe response ID for chaining
      required:
        - toolCalls

    PoeDescribeRequest:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        zoneName:
          type: string
        datasetName:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]

    PoeModelList:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              owned_by:
                type: string
              description:
                type: string
            required:
              - id
              - object
              - owned_by

    UserSettings:
      type: object
      description: Per-user application settings with sensible defaults
      properties:
        textureQuality:
          type: string
          enum: [off, low, high]
          default: high
        enableCaustics:
          type: boolean
          default: false
        particleDensity:
          type: string
          enum: [off, sparse, dense]
          default: sparse
        fogDensity:
          type: number
          minimum: 0.004
          maximum: 0.030
          default: 0.012
        colormapTheme:
          type: string
          enum: [ocean, thermal, grayscale, viridis, freshwater, custom]
          default: ocean
        paletteShallow:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#00e5ff'
          description: Shallow endpoint hex colour for the Ocean depth palette.
        paletteDeep:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#283593'
          description: Deep endpoint hex colour for the Ocean depth palette.
        customStops:
          type: array
          minItems: 2
          description: Ordered colour stops for the user's Custom depth palette (min 2). Positions are normalised to [0, 1] along the depth axis.
          items:
            type: object
            required: [position, hex]
            properties:
              position:
                type: number
                minimum: 0
                maximum: 1
              hex:
                type: string
                pattern: '^#[0-9a-fA-F]{6}$'
          default:
            - { position: 0.0,  hex: '#00e5ff' }
            - { position: 0.3,  hex: '#0d47a1' }
            - { position: 0.65, hex: '#1a237e' }
            - { position: 1.0,  hex: '#283593' }
        bandColors:
          type: array
          minItems: 10
          maxItems: 10
          description: Per-band hex colours for the Ocean theme. Exactly 10 entries, one per depth band lower boundary (0, 50, 100, 150, 200, 250, 300, 350, 450, 600 ft). Persisted server-side so the palette is consistent across devices.
          items:
            type: string
            pattern: '^#[0-9a-fA-F]{6}$'
          default:
            - '#00e5ff'
            - '#00c8de'
            - '#00a8d0'
            - '#0288d1'
            - '#0277bd'
            - '#1565c0'
            - '#0d47a1'
            - '#1a237e'
            - '#283593'
            - '#1e2b6e'
        bandBoundaries:
          type: array
          minItems: 11
          maxItems: 11
          description: Depth band boundaries in feet. Exactly 11 integers, strictly increasing, first must be 0, last must be 2000. The 9 interior values are user-editable. Persisted server-side so customised boundaries survive across devices.
          items:
            type: integer
            minimum: 0
            maximum: 2000
          default:
            - 0
            - 50
            - 100
            - 150
            - 200
            - 250
            - 300
            - 350
            - 450
            - 600
            - 2000
        lampIntensity:
          type: number
          minimum: 0
          maximum: 5
          default: 2
        defaultSpeedTier:
          type: integer
          minimum: 0
          maximum: 4
          default: 2
        invertMouseY:
          type: boolean
          default: false
        mouseSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
        cameraSpawnBehaviour:
          type: string
          enum: [deepest, home, last]
          default: deepest
        showCrosshairGps:
          type: boolean
          default: true
        showCameraPosition:
          type: boolean
          default: true
        showSpeedIndicator:
          type: boolean
          default: true
        showHeading:
          type: boolean
          default: true
        coordinateFormat:
          type: string
          enum: [decimal, dms]
          default: decimal
        depthUnit:
          type: string
          enum: [metres, feet]
          default: metres
        units:
          type: string
          enum: [metric, imperial, nautical]
          default: metric
          description: Global units system applied to depths, distances, speeds and temperatures throughout the app. "nautical" shows speeds in knots and depths/distances in imperial-style feet/miles, for boaters who think in nautical units.
        hudOpacity:
          type: number
          minimum: 0.3
          maximum: 1.0
          default: 0.75
        overviewDefaultZoom:
          type: number
          minimum: 0.5
          maximum: 5.0
          default: 1.0
        overviewShowGrid:
          type: boolean
          default: true
        overviewShowMarkers:
          type: boolean
          default: true
        overviewOpenOnLoad:
          type: boolean
          default: false
        visibleMarkerTypes:
          type: array
          items:
            type: string
            enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
          default: [fish, shipwreck, coral, vent, custom]
        showMarkerLabels:
          type: boolean
          default: true
        smoothTerrainSpikes:
          type: boolean
          default: true
          description: When true, the server applies an angle-based spike smoothing pass to terrain grids. Disable to inspect raw bathymetric artifacts for scientific use.
        privateMarkers:
          type: boolean
          default: false
        defaultMarkerType:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
          default: fish
        defaultRegion:
          type: string
          default: thorne-bay
        gpsRecordingInterval:
          type: integer
          minimum: 1000
          maximum: 60000
          default: 10000
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
          description: Active water body type; controls colormap, species lists, marker types, and dataset filter
        showUiTooltips:
          type: boolean
          default: true
          description: Show hover/focus tooltips on viewscreen controls and HUD readouts.
        panelCollapse:
          type: object
          additionalProperties:
            type: boolean
          default: {}
          description: Panel expand/collapse state keyed by panel id. Synced cross-device for signed-in users.
        zoneOverlaySlots:
          type: object
          description: Per-slot zone colour and visibility, stored independently for saltwater and freshwater sessions. Each key holds a four-element array (0=sand, 1=sediment, 2=silt, 3=basalt). Synced cross-device for signed-in users.
          properties:
            saltwater:
              type: array
              minItems: 4
              maxItems: 4
              items:
                type: object
                properties:
                  color:
                    type: string
                    pattern: '^#[0-9a-fA-F]{6}$'
                  visible:
                    type: boolean
                required: [color, visible]
            freshwater:
              type: array
              minItems: 4
              maxItems: 4
              items:
                type: object
                properties:
                  color:
                    type: string
                    pattern: '^#[0-9a-fA-F]{6}$'
                  visible:
                    type: boolean
                required: [color, visible]

    ApiError:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        details:
          type: string
          description: Human-readable description of what went wrong
      required:
        - error
        - details

    DatasetMeta:
      type: object
      properties:
        id:
          type: string
          description: Stable slug used in API paths
        name:
          type: string
          description: Human-readable region name
        description:
          type: string
          description: One-line geological description
        waterType:
          type: string
          enum: [saltwater, freshwater]
        minDepth:
          type: number
          description: Shallowest point in metres (positive = below sea level)
        maxDepth:
          type: number
          description: Deepest point in metres
        centerLon:
          type: number
        centerLat:
          type: number
        bbox:
          type: object
          description: Bounding box [minLon, minLat, maxLon, maxLat]
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        hasTopography:
          type: boolean
          description: True when the dataset bbox includes above-water terrain (land/islands) suitable for landmass visualisation.
        hasEfh:
          type: boolean
          description: True when the dataset has bundled Essential Fish Habitat zone data available via /efh.
      required:
        - id
        - name
        - description
        - waterType
        - minDepth
        - maxDepth
        - centerLon
        - centerLat
        - bbox

    TerrainData:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]
        resolution:
          type: integer
          description: Grid side length N (grid is NxN)
        width:
          type: integer
        height:
          type: integer
        depths:
          type: array
          items:
            type: number
          description: Row-major flat array of depth values (metres, positive = below surface)
        minDepth:
          type: number
        maxDepth:
          type: number
        minLon:
          type: number
        maxLon:
          type: number
        minLat:
          type: number
        maxLat:
          type: number
        centerLon:
          type: number
        centerLat:
          type: number
        topography:
          type: array
          items:
            type: number
          description: Row-major flat array of above-water elevation values (metres above sea level, 0 for water cells). Same NxN shape as `depths`. Omitted when the dataset has no above-water terrain.
        hasTopography:
          type: boolean
          description: True when this terrain grid includes a non-empty `topography` array. Clients can use this to enable/hide the landmass visualisation.
        synthetic:
          type: boolean
          description: "Deprecated: use dataSource instead. True when the grid was produced from the synthetic fbm fallback."
        dataSource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: |
            Which upstream data service produced this grid (bathymetry primary).
            ncei      — NCEI Bag Mosaic WCS (high-resolution multibeam survey)
            gebco     — GEBCO 2024 WCS (~400 m global grid)
            synthetic — fbm fallback used when all upstream services are unreachable
            twdb      — TWDB Reservoir Volumetric & Sedimentation Survey
            usace     — USACE hydrographic survey
            usgs-3dep — USGS 3DEP best-available DEM (pre-impoundment basin + topography)
        bathymetrySource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: Per-layer provenance for the below-water (bathymetry) layer when it has a different source than topography (e.g. inland reservoirs).
        topographySource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: Per-layer provenance for the above-water (topography) layer when it has a different source than bathymetry.
        bathymetrySourceLabel:
          type: string
          description: Display label for the bathymetry source (overrides the default per-source label in the UI).
        topographySourceLabel:
          type: string
          description: Display label for the topography source (overrides the default per-source label in the UI).
        bathymetryCreditUrl:
          type: string
          description: Credit URL surfaced next to the bathymetry source badge.
        topographyCreditUrl:
          type: string
          description: Credit URL surfaced next to the topography source badge.
        habitatPolygons:
          type: object
          description: |
            EFH (Essential Fish Habitat) FeatureCollection embedded directly in the terrain
            response for user-saved noaa-efh-* catalog datasets. Present only when the
            dataset carries polygon habitat data (i.e. was saved from a NOAA EFH catalog
            entry). Clients should render these polygons instead of (or in addition to)
            fetching from /efh when this field is present.
          properties:
            type:
              type: string
              enum: [FeatureCollection]
            features:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [Feature]
                  properties:
                    $ref: "#/components/schemas/EfhSpeciesProperties"
                  geometry:
                    type: object
                    additionalProperties: true
                required: [type, properties, geometry]
            metadata:
              type: object
              additionalProperties: true
          required: [type, features]
      required:
        - datasetId
        - name
        - waterType
        - resolution
        - width
        - height
        - depths
        - minDepth
        - maxDepth
        - minLon
        - maxLon
        - minLat
        - maxLat
        - centerLon
        - centerLat

    DatasetPreview:
      type: object
      description: |
        Lightweight preflight describing which upstream source would serve
        this dataset, without transferring the full depth grid. Used by the
        client to warn the user before loading procedurally-generated
        (synthetic) bathymetry.
      properties:
        datasetId:
          type: string
        name:
          type: string
        bbox:
          type: object
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        dataSource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep, unknown]
          description: |
            Which upstream source would produce this grid.
            ncei       — NCEI Bag Mosaic WCS (high-resolution multibeam survey)
            gebco      — GEBCO 2024 WCS (~400 m global grid)
            twdb       — Texas Water Development Board reservoir bathymetry
            usace      — US Army Corps of Engineers reservoir survey
            usgs-3dep  — USGS 3DEP DEM (used for inland AOIs)
            synthetic  — fbm fallback used when no real source is available
            unknown    — preflight itself failed (e.g. network/timeout); treat as suspect
        syntheticReason:
          type: string
          description: |
            Short human-readable reason describing why the result would be
            synthetic (e.g. "outside NCEI/GEBCO coverage" or "upstream
            bathymetry services unreachable"). Present whenever
            `dataSource` is `synthetic` or `unknown`.
      required:
        - datasetId
        - name
        - bbox
        - dataSource

    TerrainUploadInput:
      type: object
      properties:
        fileContent:
          type: string
          description: Raw UTF-8 text content of the XYZ or CSV file
        fileName:
          type: string
          description: Original file name (used to detect format)
        resolution:
          type: integer
          default: 256
          minimum: 32
          maximum: 512
          description: Target grid resolution for the full terrain (overview is always 64)
      required:
        - fileContent
        - fileName

    UploadResult:
      type: object
      description: Full terrain and overview grids generated from an uploaded file. The upload is always persisted into the caller's dataset library; `savedDatasetId` carries the new row's UUID.
      properties:
        terrain:
          $ref: "#/components/schemas/TerrainData"
        overview:
          $ref: "#/components/schemas/TerrainData"
        savedDatasetId:
          type: string
          description: UUID of the saved custom_datasets row. Present whenever persistence succeeded; omitted only if the database insert returned no row (see `saveError`).
        savedDatasetMeta:
          $ref: "#/components/schemas/UserDatasetMeta"
          description: Metadata for the freshly-saved row, suitable for optimistically inserting into the "My Uploads" list without a refetch
        saveError:
          type: string
          description: Human-readable error string returned when the auto-save to the user's account failed. The terrain itself is still returned so the session is usable.
      required:
        - terrain
        - overview

    UserDatasetMeta:
      type: object
      description: Metadata for a user-saved custom terrain dataset
      properties:
        id:
          type: string
          description: UUID primary key
        name:
          type: string
          description: Dataset name derived from the uploaded filename
        minDepth:
          type: number
        maxDepth:
          type: number
        folderId:
          type: string
          nullable: true
          description: Parent folder UUID, or null when at the library root
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - minDepth
        - maxDepth
        - createdAt

    DatasetFolder:
      type: object
      description: A folder within the user's dataset library tree
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: string
          nullable: true
      required:
        - name

    RenameDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    MoveDatasetFolderBody:
      type: object
      properties:
        parentId:
          type: string
          nullable: true
      required:
        - parentId

    DeleteDatasetFolderBody:
      type: object
      properties:
        mode:
          type: string
          enum: [contents, promote]
          description: contents = delete folder and everything inside; promote = move children to grandparent before deleting
      required:
        - mode

    MoveDatasetBody:
      type: object
      properties:
        folderId:
          type: string
          nullable: true
      required:
        - folderId

    Marker:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        datasetId:
          type: string
          description: Dataset this marker belongs to
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
          description: Depth in metres (positive = below surface)
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
        label:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - datasetId
        - lon
        - lat
        - depth
        - type
        - label
        - createdAt

    GpsPoint:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        accuracy:
          type: number
          default: 0
        timestamp:
          type: number
          description: Unix ms timestamp
        seq:
          type: integer
          default: 0
