        lat:
          type: number
        lon:
          type: number
        sstCelsius:
          type: number
          description: Sea-surface temperature in degrees Celsius (omitted when available=false)
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the sample (top of hour)
        source:
          type: string
          description: Human-readable attribution for the data source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
      required:
        - available
        - lat
        - lon

    TemperatureProfileSample:
      type: object
      properties:
        depthM:
          type: number
          description: Depth below the surface in metres
        temperatureC:
          type: number
          description: Water temperature in degrees Celsius
      required:
        - depthM
        - temperatureC

    TemperatureProfile:
      type: object
      properties:
        available:
          type: boolean
          description: True when a real depth-resolved profile was found
        lat:
          type: number
        lon:
          type: number
        samples:
          type: array
          description: Sorted shallow→deep depth/temperature samples (empty when available=false)
          items:
            $ref: "#/components/schemas/TemperatureProfileSample"
        source:
          type: string
          description: Human-readable attribution for the profile source
        sourceUrl:
          type: string
          description: Canonical URL for the data source
        timestamp:
          type: string
          description: ISO 8601 UTC timestamp of the measurement (when applicable)
        provider:
          type: string
          description: Identifier of the underlying data provider (e.g. "bundled-ctd", "argo", "woa", "estimated")
