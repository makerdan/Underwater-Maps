    NceiPortalResult:
      type: object
      description: A bathymetric survey dataset discovered via the NCEI Bathymetry Geoportal
      properties:
        id:
          type: string
          description: NCEI Geoportal record id (e.g. "gov.noaa.ngdc.mgg.dem:703")
        name:
