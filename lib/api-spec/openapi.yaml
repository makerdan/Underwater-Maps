          description: Whether the master HYD93 cartographic annotation overlay is visible (kelp, rocks, rocky reefs, ledges, obstructions).
        globalFontSize:
          type: string
          enum: [smallest, small, medium, large, x-large, largest]
          default: medium
          description: Global UI font size level applied throughout the application.
        schemaVersion:
          type: integer
          default: 19
          description: Client settings schema version used for client-side migrations.
        showAdvancedEverywhere:
          type: boolean
          default: false
          description: Show advanced settings in all sections without hiding them behind a toggle.
        mouseZoomSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
          description: Mouse scroll-wheel zoom speed multiplier.
        touchpadZoomSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
          description: Touchpad pinch/scroll zoom speed multiplier.
        pinchZoomSensitivity:
          type: number
          minimum: 0.1
          maximum: 3.0
          default: 1.0
          description: Touch-screen pinch-to-zoom sensitivity multiplier.
        joystickMode:
          type: string
          enum: [auto, always, off]
