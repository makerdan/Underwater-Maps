openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poe
    description: Poe AI proxy operations
  - name: datasets
    description: Bathymetric dataset operations
  - name: markers
    description: Persisted point-of-interest marker operations
paths:
  /datasets:
    get:
      operationId: getDatasets
      tags: [datasets]
      summary: List available pre-loaded bathymetric regions
      description: Returns metadata for all built-in GEBCO and demo datasets
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetMeta"

  /datasets/{id}/terrain:
    get:
      operationId: getDatasetsIdTerrain
      tags: [datasets]
      summary: Get gridded terrain data for a dataset
      description: Returns a 256×256 depth grid for the given dataset ID, suitable for building a Three.js terrain mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: integer
            default: 256
            minimum: 32
            maximum: 512
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/overview:
    get:
      operationId: getDatasetsIdOverview
      tags: [datasets]
      summary: Get a low-resolution overview terrain for a dataset
      description: Returns a 64×64 downsampled depth grid for use in the overview map — lightweight alternative to the full terrain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload:
    post:
      operationId: postDatasetsUpload
      tags: [datasets]
      summary: Upload an XYZ or CSV file and receive terrain data at two resolutions
      description: Accepts a UTF-8 .xyz or .csv file with lon,lat,depth columns via multipart form upload. Auto-detects delimiter, header rows, and column order. Returns both a full terrain grid and a 64×64 overview grid.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: XYZ or CSV file with lon,lat,depth columns
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
                  description: Target grid resolution for the full terrain (overview is always 64)
              required:
                - file
      responses:
        "200":
          description: Parsed terrain and overview grids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Unparseable file or insufficient valid points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers:
    get:
      operationId: getMarkers
      tags: [markers]
      summary: List persisted markers for a dataset
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset slug to filter markers by
      responses:
        "200":
          description: Marker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: postMarkers
      tags: [markers]
      summary: Create a new marker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerInput"
      responses:
        "201":
          description: Created marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/{id}:
    delete:
      operationId: deleteMarkersId
      tags: [markers]
      summary: Delete a marker by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marker deleted
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /poe/classify:
    post:
      operationId: poeClassify
      tags: [poe]
      summary: Classify terrain zones via AI
      description: Sends a depth grid image to Poe AI and returns 1024 zone labels (32×32 coarse grid)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeClassifyRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResult"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/query:
    post:
      operationId: poeQuery
      tags: [poe]
      summary: Natural language terrain query
      description: Interprets a user message and returns tool calls and/or a text response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeQueryRequest"
      responses:
        "200":
          description: Query result with optional tool calls and text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "402":
          description: Poe credits exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

  /poe/describe:
    post:
      operationId: poeDescribe
      tags: [poe]
      summary: Stream a location description via SSE
      description: Returns a Server-Sent Event stream of geological description deltas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoeDescribeRequest"
      responses:
        "200":
          description: SSE stream of text deltas, terminated with data:[DONE]
          content:
            text/event-stream:
              schema:
                type: string

  /poe/models:
    get:
      operationId: getPoeModels
      tags: [poe]
      summary: List available Poe models
      description: Returns publicly available Poe models (cached 1 hour)
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeModelList"
        "502":
          description: Could not reach Poe models endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoeError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PoeError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    PoeClassifyRequest:
      type: object
      properties:
        gridBase64:
          type: string
          description: Base64-encoded PNG data URL of the 256×256 depth grid
        waterType:
          type: string
          enum: [saltwater, freshwater]
          default: saltwater
        datasetId:
          type: string
          description: Dataset identifier used for cache keying
      required:
        - gridBase64

    ClassifyResult:
      type: object
      properties:
        zones:
          type: array
          items:
            type: string
          description: 1024 zone labels in row-major order (32×32 coarse grid)
        fromCache:
          type: boolean
          description: Whether the result was served from the in-memory cache
      required:
        - zones
        - fromCache

    ToolCall:
      type: object
      properties:
        name:
          type: string
        args:
          type: object
          additionalProperties: true
        id:
          type: string
      required:
        - name
        - args

    PoeQueryRequest:
      type: object
      properties:
        userMessage:
          type: string
          description: The user's natural language query
        context:
          type: object
          additionalProperties: true
          description: Terrain context (datasetName, waterType, minDepth, maxDepth, lon, lat, cameraDepth, zoneName)
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
          description: Last N conversation turns (server clips to 10)
        previousResponseId:
          type: string
          description: Poe response ID for multi-turn context chaining
      required:
        - userMessage

    QueryResult:
      type: object
      properties:
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        text:
          type: string
          nullable: true
          description: Text reply when no tool calls are made
        responseId:
          type: string
          nullable: true
          description: Poe response ID for chaining
      required:
        - toolCalls

    PoeDescribeRequest:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        zoneName:
          type: string
        datasetName:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]

    PoeModelList:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              owned_by:
                type: string
              description:
                type: string
            required:
              - id
              - object
              - owned_by

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    DatasetMeta:
      type: object
      properties:
        id:
          type: string
          description: Stable slug used in API paths
        name:
          type: string
          description: Human-readable region name
        description:
          type: string
          description: One-line geological description
        waterType:
          type: string
          enum: [saltwater, freshwater]
        minDepth:
          type: number
          description: Shallowest point in metres (positive = below sea level)
        maxDepth:
          type: number
          description: Deepest point in metres
        centerLon:
          type: number
        centerLat:
          type: number
        bbox:
          type: object
          description: Bounding box [minLon, minLat, maxLon, maxLat]
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
      required:
        - id
        - name
        - description
        - waterType
        - minDepth
        - maxDepth
        - centerLon
        - centerLat
        - bbox

    TerrainData:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]
        resolution:
          type: integer
          description: Grid side length N (grid is NxN)
        width:
          type: integer
        height:
          type: integer
        depths:
          type: array
          items:
            type: number
          description: Row-major flat array of depth values (metres, positive = below surface)
        minDepth:
          type: number
        maxDepth:
          type: number
        minLon:
          type: number
        maxLon:
          type: number
        minLat:
          type: number
        maxLat:
          type: number
        centerLon:
          type: number
        centerLat:
          type: number
      required:
        - datasetId
        - name
        - waterType
        - resolution
        - width
        - height
        - depths
        - minDepth
        - maxDepth
        - minLon
        - maxLon
        - minLat
        - maxLat
        - centerLon
        - centerLat

    TerrainUploadInput:
      type: object
      properties:
        fileContent:
          type: string
          description: Raw UTF-8 text content of the XYZ or CSV file
        fileName:
          type: string
          description: Original file name (used to detect format)
        resolution:
          type: integer
          default: 256
          minimum: 32
          maximum: 512
          description: Target grid resolution for the full terrain (overview is always 64)
      required:
        - fileContent
        - fileName

    UploadResult:
      type: object
      description: Full terrain and overview grids generated from an uploaded file
      properties:
        terrain:
          $ref: "#/components/schemas/TerrainData"
        overview:
          $ref: "#/components/schemas/TerrainData"
      required:
        - terrain
        - overview

    Marker:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        datasetId:
          type: string
          description: Dataset this marker belongs to
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
          description: Depth in metres (positive = below surface)
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom]
        label:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - datasetId
        - lon
        - lat
        - depth
        - type
        - label
        - createdAt

    MarkerInput:
      type: object
      properties:
        datasetId:
          type: string
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom]
          default: custom
        label:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - datasetId
        - lon
        - lat
        - depth
        - label
