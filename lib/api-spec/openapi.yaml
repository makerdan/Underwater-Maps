          description: How the landmass is coloured — realistic elevation ramp or a single flat neutral colour.
        satelliteImagery:
          type: boolean
          default: true
          description: Drape ESRI World Imagery satellite photo over the land mesh. When false, use the procedural colour ramp.
        terrainImagery:
