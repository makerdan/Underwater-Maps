openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poe
    description: Poe AI proxy operations
  - name: datasets
    description: Bathymetric dataset operations
  - name: markers
    description: Persisted point-of-interest marker operations
  - name: catches
    description: Catch journal entries (symbols, notes, photos) linked to markers
  - name: settings
    description: Per-user application settings
  - name: user-datasets
    description: Authenticated user's saved custom terrain datasets
  - name: trails
    description: GPS trail recording operations
  - name: drift-planner
    description: Surface conditions for drift planning
  - name: trolling-presets
    description: Saved trolling heading/speed presets
  - name: trolling-preset-folders
    description: Folders for grouping saved trolling presets
  - name: routes
    description: Saved navigation route operations
  - name: tidal
    description: NOAA tide prediction operations
  - name: admin
    description: Admin-only operations
  - name: account
    description: User account and data export operations
  - name: github
    description: GitHub repository sync operations
  - name: query
    description: OpenAI terrain query (Ask the Ocean) operations
  - name: terrain
    description: Land DEM, satellite tile, and CSV download operations
paths:
  /datasets:
    get:
      operationId: getDatasets
      tags: [datasets]
      summary: List available pre-loaded bathymetric regions
      description: Returns metadata for all built-in GEBCO and demo datasets
      parameters:
        - in: query
          name: waterType
          required: false
          description: Filter datasets by water body type
          schema:
            type: string
            enum: [saltwater, freshwater]
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetMeta"

  /datasets/{id}/terrain:
    get:
      operationId: getDatasetsIdTerrain
      tags: [datasets]
      summary: Get gridded terrain data for a dataset
      description: Returns a 256×256 depth grid for the given dataset ID, suitable for building a Three.js terrain mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: integer
            default: 256
            minimum: 32
            maximum: 512
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/preview:
    get:
      operationId: getDatasetsIdPreview
      tags: [datasets]
      summary: Probe which upstream source would serve this dataset
      description: |
        Lightweight preflight that resolves the upstream `dataSource`
        (`ncei` | `gebco` | `synthetic`) for the given dataset without
        transferring the full depth grid. The client uses this to warn the
        user before loading procedurally-generated (synthetic) bathymetry.
        Results are cached briefly per dataset to avoid double-probing
        upstream services when the user immediately confirms.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preflight result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetPreview"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/overview:
    get:
      operationId: getDatasetsIdOverview
      tags: [datasets]
      summary: Get a low-resolution overview terrain for a dataset
      description: Returns a 64×64 downsampled depth grid for use in the overview map — lightweight alternative to the full terrain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload:
    post:
      operationId: postDatasetsUpload
      tags: [datasets]
      summary: Upload an XYZ or CSV file and persist it to the user's dataset library
      description: |
        Accepts a UTF-8 .xyz or .csv file with lon,lat,depth columns via
        multipart form upload. Auto-detects delimiter, header rows, and column
        order. Authentication is required — every successful upload is
        persisted into the caller's `custom_datasets` library and the new
        row's UUID is returned as `savedDatasetId`. The response also includes
        a full terrain grid and a 64×64 overview grid for the client to
        render immediately without round-tripping to /user/datasets.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: XYZ or CSV file with lon,lat,depth columns
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
                  description: Target grid resolution for the full terrain (overview is always 64)
              required:
                - file
      responses:
        "200":
          description: Parsed terrain and overview grids, persisted to the user's dataset library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Unparseable file or insufficient valid points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          description: Uploaded file exceeds the server-side size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets:
    get:
      operationId: getUserDatasets
      tags: [user-datasets]
      summary: List the current user's saved custom terrain datasets
      description: Returns metadata for all terrain files the authenticated user has uploaded and saved
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDatasetMeta"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/terrain:
    get:
      operationId: getUserDatasetsIdTerrain
      tags: [user-datasets]
      summary: Get full terrain grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/overview:
    get:
      operationId: getUserDatasetsIdOverview
      tags: [user-datasets]
      summary: Get low-resolution overview grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/hyd93-features:
    get:
      operationId: getUserDatasetsIdHyd93Features
      tags: [user-datasets]
      summary: Get HYD93 cartographic annotation features for a saved user dataset
      description: |
        Returns the array of cartographic annotation points extracted from HYD93
        `.a93.gz` files when the dataset was uploaded.  Feature codes indicate the
        type of seafloor hazard or biological feature:

        | Code | Label        |
        |------|--------------|
        | 89   | Rocks        |
        | 103  | Kelp         |
        | 146  | Ledge        |
        | 530  | Rocky reef   |
        | 988  | Obstruction  |

        Returns an empty array (`[]`) when the dataset was not sourced from a HYD93
        archive or contained no annotation rows — this is the normal case for most
        datasets and is not an error condition.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User dataset identifier
      responses:
        "200":
          description: Array of HYD93 annotation feature points (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hyd93AnnotationPoint"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/raster-image:
    get:
      operationId: getUserDatasetsIdRasterImage
      tags: [user-datasets]
      summary: Get the scanned raster image for a dataset pending georeferencing
      description: |
        Returns the raw scanned chart image (JPEG) for a dataset whose inner
        GeoTIFF lacked georeferencing tags during upload.  Only available when
        `needsGeoreferencing` is true on the dataset and the raster was within
        the storage size cap.  Used to display the scanned chart in the
        interactive georeferencing wizard so the user can place control points.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User dataset identifier
      responses:
        "200":
          description: JPEG image of the scanned raster
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or has no pending raster image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/georef:
    post:
      operationId: postUserDatasetsIdGeoref
      tags: [user-datasets]
      summary: Submit georeferencing control points for a pending raster
      description: |
        Accepts 2–4 control points that map pixel coordinates on the scanned
        raster to real-world WGS84 lon/lat positions.  Stores the control
        points, marks the dataset as georeferenced, and discards the pending
        raster blob to save storage.  Returns the updated dataset metadata.
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User dataset identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeorefBody"
      responses:
        "200":
          description: Updated dataset metadata (needsGeoreferencing now absent/false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid control points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Dataset does not have a pending georeferencing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}:
    delete:
      operationId: deleteUserDatasetsId
      tags: [user-datasets]
      summary: Delete a saved user terrain dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Dataset deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/move:
    patch:
      operationId: patchUserDatasetsIdMove
      tags: [user-datasets]
      summary: Move a user dataset into a folder (or to the root)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetBody"
      responses:
        "200":
          description: Updated dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid target folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/duplicate:
    post:
      operationId: postUserDatasetsIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a user dataset into the same folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created duplicate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/rename:
    patch:
      operationId: patchUserDatasetsIdRename
      tags: [user-datasets]
      summary: Rename a user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders:
    get:
      operationId: getUserFolders
      tags: [user-datasets]
      summary: List all dataset folders for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Folder list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetFolder"
    post:
      operationId: postUserFolders
      tags: [user-datasets]
      summary: Create a new folder
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/rename:
    patch:
      operationId: patchUserFoldersIdRename
      tags: [user-datasets]
      summary: Rename a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/move:
    patch:
      operationId: patchUserFoldersIdMove
      tags: [user-datasets]
      summary: Move a folder to a new parent
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetFolderBody"
      responses:
        "200":
          description: Moved folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid target (cycle or duplicate sibling)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/duplicate:
    post:
      operationId: postUserFoldersIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a folder (recursive deep copy)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created folder root
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"

  /user/folders/{id}:
    delete:
      operationId: deleteUserFoldersId
      tags: [user-datasets]
      summary: Delete a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteDatasetFolderBody"
      responses:
        "204":
          description: Folder deleted
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers:
    get:
      operationId: getMarkers
      tags: [markers]
      summary: List persisted markers for a dataset
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset slug to filter markers by
      responses:
        "200":
          description: Marker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: postMarkers
      tags: [markers]
      summary: Create a new marker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerInput"
      responses:
        "201":
          description: Created marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/mine:
    delete:
      operationId: deleteMarkersMine
      tags: [markers]
      summary: Delete all markers created by the authenticated user
      description: Permanently deletes every marker where userId matches the Clerk user. Requires authentication.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Number of markers deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/{id}:
    patch:
      operationId: patchMarkersId
      tags: [markers]
      summary: Edit a marker's label, type, or notes
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerPatch"
      responses:
        "200":
          description: Updated marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMarkersId
      tags: [markers]
      summary: Delete a marker by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marker deleted
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /catches:
    get:
      operationId: getCatches
      tags: [catches]
      summary: List all catch entries for the caller's markers in a dataset
      security:
        - clerkAuth: []
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Catch entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatchEntry"
        "400":
          description: Missing datasetId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/{markerId}/catches:
    get:
      operationId: getMarkersMarkerIdCatches
      tags: [catches]
      summary: List catch entries for one marker
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: markerId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Catch entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatchEntry"
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postMarkersMarkerIdCatches
      tags: [catches]
      summary: Create a catch entry on a marker
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: markerId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatchEntryInput"
      responses:
        "201":
          description: Created catch entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatchEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /catches/{id}:
    patch:
      operationId: patchCatchesId
      tags: [catches]
      summary: Edit a catch entry's symbol, notes, or photos
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatchEntryPatch"
      responses:
        "200":
          description: Updated catch entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatchEntry"
        "400":
          description: Validation error
          content:
            application/json:
