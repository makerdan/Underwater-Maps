          description: Source for the ambient (depth-averaged) current vector used in the simulation.
        currentsManualDirectionDeg:
          type: number
          minimum: 0
          maximum: 360
          default: 90
          description: Manual ambient current direction in degrees (compass going-to bearing).
        currentsManualSpeedKt:
          type: number
          minimum: 0
          maximum: 50
          default: 0.8
          description: Manual ambient current speed in knots.
        currentsTidePhase:
          type: number
          minimum: 0
          maximum: 1
          default: 0
          description: Tide-phase scrubber position in [0, 1) — 0 = flood peak, 0.5 = ebb peak.
        currentsAutoAdvance:
          type: boolean
          default: false
          description: Automatically animate the tide-phase scrubber.
        currentsShowParticles:
          type: boolean
          default: true
          description: Show the animated particle layer in the current simulation.
        currentsShowArrows:
          type: boolean
          default: true
          description: Show the instanced speed-coloured arrow layer in the current simulation.
        currentsShowStreamlines:
          type: boolean
          default: false
          description: Show integrated streamline ribbons in the current simulation.
        autoShowZoneOverlay:
          type: boolean
          default: false
          description: Automatically show the substrate zone overlay when a dataset is loaded.
        defaultHabitatSpecies:
          type: string
          default: ''
          description: Species pre-selected in the habitat suitability panel on load.
        habitatOverlayIntensity:
          type: number
          minimum: 0
          maximum: 1
          default: 0.4
          description: Habitat suitability overlay blend strength (0 = invisible, 1 = fully opaque).
        habitatOverlayColor:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#ff9919'
          description: Tint hex colour for the habitat suitability overlay.
        autoStartTrailRecording:
          type: boolean
          default: false
          description: Automatically start GPS trail recording when the app loads.
        defaultTrailColor:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#ff6600'
          description: Default hex colour applied to new GPS trail recordings.
        trailRetention:
          type: string
          enum: ['7', '30', '90', all]
          default: '30'
          description: Number of days of GPS trail history to retain locally. "all" disables automatic pruning.
        followResumeDelaySec:
          type: number
          minimum: 5
          maximum: 120
          default: 20
          description: Seconds of inactivity after a manual camera interaction before GPS Follow Me mode automatically resumes tracking.
        autoLoadLastDataset:
          type: boolean
          default: true
          description: Automatically reload the most recently used dataset when the app starts.
        defaultMapLoad:
          nullable: true
          type: object
          description: Dataset to load automatically on every app start. Null means use the built-in default.
          properties:
            kind:
              type: string
              enum: [preset, upload]
              description: Whether this is a built-in preset or a user-uploaded dataset.
            id:
              type: string
              description: Dataset slug (preset) or upload id (upload).
          required: [kind, id]
        reducedMotion:
          type: boolean
          default: false
          description: Reduce or eliminate non-essential UI animations for accessibility.
        colorBlindSafePalette:
          type: boolean
          default: false
          description: Apply a colour-blind-friendly palette to the depth colourmap and overlays.
        largeHudText:
          type: boolean
          default: false
          description: "(Deprecated — use globalFontSize instead.) Enlarge HUD text for readability."
        highContrastHud:
          type: boolean
          default: false
          description: Apply high-contrast styling to HUD elements.
        brightDaylight:
          type: boolean
          default: false
          description: Outdoor display mode — opaque panels, bold text, cobalt accent for direct-sunlight use.
        colormapUserSet:
          type: boolean
          default: false
          description: True when the user has explicitly chosen a depth colourmap via the Settings UI. Used to avoid auto-switching palettes.
        telemetryOptIn:
          type: boolean
          default: false
          description: Whether the user has opted in to anonymous usage telemetry.
        llmDisclosureAcknowledged:
          type: boolean
          default: false
          description: Whether the user has read and dismissed the one-time AI/LLM data-sharing disclosure.
        hasSeenOnboarding:
          type: boolean
          default: false
          description: Set to true once the user completes or skips the first-time guided tour. Synced cross-device.
        datasetFolderExpanded:
          type: object
          additionalProperties:
            type: boolean
          default: {}
          description: Expand/collapse state for dataset library folders, keyed by folder id.
        bookmarks:
          type: object
          description: Per-dataset camera bookmarks keyed by dataset id. Each value is an ordered array of named camera positions.
          additionalProperties:
            type: array
            items:
              type: object
              required: [id, name, lon, lat, depth, heading]
              properties:
                id:
                  type: string
                  description: Unique bookmark id (UUID).
                name:
                  type: string
                  description: User-assigned bookmark label.
                lon:
                  type: number
                  description: Camera longitude at the bookmark.
                lat:
                  type: number
                  description: Camera latitude at the bookmark.
                depth:
                  type: number
                  description: Camera depth (metres, positive = below sea level) at the bookmark.
                heading:
                  type: number
                  description: Camera heading in degrees at the bookmark.
        keyBindings:
          type: object
          description: Remapped keyboard shortcuts keyed by action id (e.g. "moveForward"). Values are KeyboardEvent.code strings (e.g. "KeyW"). Missing keys fall back to their default binding.
          additionalProperties:
            type: string
        crosshairMenuGamepadButton:
          nullable: true
          type: integer
          minimum: 0
          maximum: 31
          default: 3
          description: Standard-mapping gamepad button index that opens the crosshair action menu. Null disables the gamepad binding.
        lastSyncedAt:
          nullable: true
          type: string
          description: ISO 8601 timestamp of the most recent successful server sync (GET hydration or PUT save). Null when the user has never synced.
        showWaterTempLayer:
          type: boolean
          default: false
          description: Whether the water-temperature layer overlay is visible in the 3D viewscreen.
        timelineCurrentTime:
          nullable: true
          type: string
          description: Last timeline scrubber position as an ISO 8601 string. Restored on next load. Null when the scrubber has never been used.
        timelineRange:
          nullable: true
          type: object
          description: Last timeline range (start/end ISO 8601 strings). Restored on next load. Null when no range has been set.
          properties:
            start:
              type: string
              description: Range start as ISO 8601 string.
            end:
              type: string
              description: Range end as ISO 8601 string.
          required: [start, end]
        sidebarMode:
          type: string
          enum: [explore, plan, analyze, live]
          default: explore
          description: Which contextual mode the left sidebar shows. Persisted so the user's last mode survives page reloads.

    ApiError:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        details:
          type: string
          description: Human-readable description of what went wrong
        requestId:
          type: string
          description: Optional tracing ID for correlating this error with server logs
      required:
        - error
        - details

    DatasetMeta:
      type: object
      properties:
        id:
          type: string
          description: Stable slug used in API paths
        name:
          type: string
          description: Human-readable region name
        description:
          type: string
          description: One-line geological description
        waterType:
          type: string
          enum: [saltwater, freshwater]
        minDepth:
          type: number
          description: Shallowest point in metres (positive = below sea level)
        maxDepth:
          type: number
          description: Deepest point in metres
        centerLon:
          type: number
        centerLat:
          type: number
        bbox:
          type: object
          description: Bounding box [minLon, minLat, maxLon, maxLat]
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        hasTopography:
          type: boolean
          description: True when the dataset bbox includes above-water terrain (land/islands) suitable for landmass visualisation.
        hasEfh:
          type: boolean
          description: True when the dataset has bundled Essential Fish Habitat zone data available via /efh.
      required:
        - id
        - name
        - description
        - waterType
        - minDepth
        - maxDepth
        - centerLon
        - centerLat
        - bbox

    TerrainData:
      type: object
      properties:
        datasetId:
          type: string
        name:
          type: string
        waterType:
          type: string
          enum: [saltwater, freshwater]
        resolution:
          type: integer
          description: Grid side length N (grid is NxN)
        width:
          type: integer
        height:
          type: integer
        depths:
          type: array
          items:
            type: number
          description: Row-major flat array of depth values (metres, positive = below surface)
        minDepth:
          type: number
        maxDepth:
          type: number
        minLon:
          type: number
        maxLon:
          type: number
        minLat:
          type: number
        maxLat:
          type: number
        centerLon:
          type: number
        centerLat:
          type: number
        topography:
          type: array
          items:
            type: number
          description: Row-major flat array of above-water elevation values (metres above sea level, 0 for water cells). Same NxN shape as `depths`. Omitted when the dataset has no above-water terrain.
        hasTopography:
          type: boolean
          description: True when this terrain grid includes a non-empty `topography` array. Clients can use this to enable/hide the landmass visualisation.
        synthetic:
          type: boolean
          description: "Deprecated: use dataSource instead. True when the grid was produced from the synthetic fbm fallback."
        dataSource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: |
            Which upstream data service produced this grid (bathymetry primary).
            ncei      — NCEI Bag Mosaic WCS (high-resolution multibeam survey)
            gebco     — GEBCO 2024 WCS (~400 m global grid)
            synthetic — fbm fallback used when all upstream services are unreachable
            twdb      — TWDB Reservoir Volumetric & Sedimentation Survey
            usace     — USACE hydrographic survey
            usgs-3dep — USGS 3DEP best-available DEM (pre-impoundment basin + topography)
        bathymetrySource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: Per-layer provenance for the below-water (bathymetry) layer when it has a different source than topography (e.g. inland reservoirs).
        topographySource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep]
          description: Per-layer provenance for the above-water (topography) layer when it has a different source than bathymetry.
        bathymetrySourceLabel:
          type: string
          description: Display label for the bathymetry source (overrides the default per-source label in the UI).
        topographySourceLabel:
          type: string
          description: Display label for the topography source (overrides the default per-source label in the UI).
        bathymetryCreditUrl:
          type: string
          description: Credit URL surfaced next to the bathymetry source badge.
        topographyCreditUrl:
          type: string
          description: Credit URL surfaced next to the topography source badge.
        habitatPolygons:
          type: object
          description: |
            EFH (Essential Fish Habitat) FeatureCollection embedded directly in the terrain
            response for user-saved noaa-efh-* catalog datasets. Present only when the
            dataset carries polygon habitat data (i.e. was saved from a NOAA EFH catalog
            entry). Clients should render these polygons instead of (or in addition to)
            fetching from /efh when this field is present.
          properties:
            type:
              type: string
              enum: [FeatureCollection]
            features:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [Feature]
                  properties:
                    $ref: "#/components/schemas/EfhSpeciesProperties"
                  geometry:
                    type: object
                    additionalProperties: true
                required: [type, properties, geometry]
            metadata:
              type: object
              additionalProperties: true
          required: [type, features]
      required:
        - datasetId
        - name
        - waterType
        - resolution
        - width
        - height
        - depths
        - minDepth
        - maxDepth
        - minLon
        - maxLon
        - minLat
        - maxLat
        - centerLon
        - centerLat

    DatasetPreview:
      type: object
      description: |
        Lightweight preflight describing which upstream source would serve
        this dataset, without transferring the full depth grid. Used by the
        client to warn the user before loading procedurally-generated
        (synthetic) bathymetry.
      properties:
        datasetId:
          type: string
        name:
          type: string
        bbox:
          type: object
          properties:
            minLon: { type: number }
            minLat: { type: number }
            maxLon: { type: number }
            maxLat: { type: number }
          required: [minLon, minLat, maxLon, maxLat]
        dataSource:
          type: string
          enum: [ncei, gebco, synthetic, twdb, usace, usgs-3dep, unknown]
          description: |
            Which upstream source would produce this grid.
            ncei       — NCEI Bag Mosaic WCS (high-resolution multibeam survey)
            gebco      — GEBCO 2024 WCS (~400 m global grid)
            twdb       — Texas Water Development Board reservoir bathymetry
            usace      — US Army Corps of Engineers reservoir survey
            usgs-3dep  — USGS 3DEP DEM (used for inland AOIs)
            synthetic  — fbm fallback used when no real source is available
            unknown    — preflight itself failed (e.g. network/timeout); treat as suspect
        syntheticReason:
          type: string
          description: |
            Short human-readable reason describing why the result would be
            synthetic (e.g. "outside NCEI/GEBCO coverage" or "upstream
            bathymetry services unreachable"). Present whenever
            `dataSource` is `synthetic` or `unknown`.
      required:
        - datasetId
        - name
        - bbox
        - dataSource

    TerrainUploadInput:
      type: object
      properties:
        fileContent:
          type: string
          description: Raw UTF-8 text content of the XYZ or CSV file
        fileName:
          type: string
          description: Original file name (used to detect format)
        resolution:
          type: integer
          default: 256
          minimum: 32
          maximum: 512
          description: Target grid resolution for the full terrain (overview is always 64)
      required:
        - fileContent
        - fileName

    UploadResult:
      type: object
      description: Full terrain and overview grids generated from an uploaded file. The upload is always persisted into the caller's dataset library; `savedDatasetId` carries the new row's UUID.
      properties:
        terrain:
          $ref: "#/components/schemas/TerrainData"
        overview:
          $ref: "#/components/schemas/TerrainData"
        savedDatasetId:
          type: string
          description: UUID of the saved custom_datasets row. Present whenever persistence succeeded; omitted only if the database insert returned no row (see `saveError`).
        savedDatasetMeta:
          $ref: "#/components/schemas/UserDatasetMeta"
          description: Metadata for the freshly-saved row, suitable for optimistically inserting into the "My Uploads" list without a refetch
        saveError:
          type: string
          description: Human-readable error string returned when the auto-save to the user's account failed. The terrain itself is still returned so the session is usable.
      required:
        - terrain
        - overview

    UserDatasetMeta:
      type: object
      description: Metadata for a user-saved custom terrain dataset
      properties:
        id:
          type: string
          description: UUID primary key
        name:
          type: string
          description: Dataset name derived from the uploaded filename
        minDepth:
          type: number
        maxDepth:
          type: number
        folderId:
          type: string
          nullable: true
          description: Parent folder UUID, or null when at the library root
        createdAt:
          type: string
          format: date-time
        needsGeoreferencing:
          type: boolean
          description: |
            True when an inner GeoTIFF from a Smooth_Sheets NOAA archive lacked
            georeferencing tags and the user must manually pin it to geographic
            coordinates using the georeferencing wizard. Absent (falsy) once
            control points have been submitted.
        hasRasterImage:
          type: boolean
          description: |
            True when a pending raster image is stored and available from
            GET /user/datasets/{id}/raster-image for display in the wizard.
            Absent when the raster exceeded the storage cap or has been cleared.
        tideStation:
          $ref: "#/components/schemas/StoredTideStation"
          description: Nearest NOAA tide station resolved from the dataset bbox centroid at upload time. Absent when resolution failed or the dataset predates the tides feature.
      required:
        - id
        - name
        - minDepth
        - maxDepth
        - createdAt

    TideStation:
      type: object
      description: A NOAA water-level station with its distance from the queried point
      properties:
        id:
          type: string
          description: 7-digit NOAA station id
        name:
          type: string
        lat:
          type: number
        lon:
          type: number
        distanceMiles:
          type: number
          description: Great-circle distance from the queried point, statute miles
      required: [id, name, lat, lon, distanceMiles]

    StoredTideStation:
      type: object
      description: Nearest NOAA tide station binding stored on a user dataset at upload time
      properties:
        stationId:
          type: string
          description: 7-digit NOAA station id
        stationName:
          type: string
        lat:
          type: number
        lon:
          type: number
        distanceMiles:
          type: number
          description: Great-circle distance from the dataset bbox centroid, statute miles
      required: [stationId, stationName, lat, lon, distanceMiles]

    GeorefControlPoint:
      type: object
      description: A single control point mapping a pixel coordinate on the scanned raster to a real-world WGS84 lon/lat position
      properties:
        px:
          type: number
          description: Pixel X coordinate (column) in the image, measured from the left edge
        py:
          type: number
          description: Pixel Y coordinate (row) in the image, measured from the top edge
        lon:
          type: number
          description: WGS84 longitude in decimal degrees (−180 to +180)
        lat:
          type: number
          description: WGS84 latitude in decimal degrees (−90 to +90)
      required: [px, py, lon, lat]

    GeorefBody:
      type: object
      description: Control points for georeferencing a pending raster scan
      properties:
        controlPoints:
          type: array
          description: "2–4 control points that anchor the scanned image to real-world coordinates"
          minItems: 2
          maxItems: 4
          items:
            $ref: "#/components/schemas/GeorefControlPoint"
      required: [controlPoints]

    DatasetFolder:
      type: object
      description: A folder within the user's dataset library tree
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: string
          nullable: true
      required:
        - name

    RenameDatasetFolderBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    MoveDatasetFolderBody:
      type: object
      properties:
        parentId:
          type: string
          nullable: true
      required:
        - parentId

    DeleteDatasetFolderBody:
      type: object
      properties:
        mode:
          type: string
          enum: [contents, promote]
          description: contents = delete folder and everything inside; promote = move children to grandparent before deleting
      required:
        - mode

    MoveDatasetBody:
      type: object
      properties:
        folderId:
          type: string
          nullable: true
      required:
        - folderId

    Marker:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        datasetId:
          type: string
          description: Dataset this marker belongs to
        lon:
          type: number
        lat:
          type: number
        depth:
          type: number
          description: Depth in metres (positive = below surface)
        type:
          type: string
          enum: [fish, shipwreck, coral, vent, custom, depth_pole, log, vegetation, sample, bass, trout, pike, walleye, crayfish, salmon, tuna, halibut, shark, swordfish, rockfish, cod, mahi_mahi, grouper, snapper, crab, lobster, shrimp, krill, jellyfish, octopus, squid, sea_urchin, starfish, sea_turtle, school_herring, school_sardine, school_mackerel, school_tuna, school_anchovy, catfish, crappie, bluegill, sunfish, carp, yellow_perch, muskie, largemouth_bass, smallmouth_bass, channel_catfish, freshwater_shrimp, freshwater_crab, snapping_turtle, bullfrog, beaver_dam, lily_pad, cattail, reed_bed, submerged_grass, spring, school_perch, school_bluegill, school_bass, school_crappie, school_carp]
        label:
          type: string
        notes:
          type: string
          nullable: true
        catchSeq:
          type: integer
          nullable: true
          description: Per-user sequential catch number assigned by quick-drop ("Catch N"); null for manually created markers
        conditions:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MarkerConditions"
          description: Frozen conditions snapshot captured at quick-drop time; null when not a quick-drop marker
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - datasetId
        - lon
        - lat
        - depth
        - type
        - label
        - createdAt

    MarkerConditions:
      type: object
      description: >
        Frozen snapshot of conditions at the moment a quick-drop marker was
        created. Every data field is nullable — missing sources never block a
        drop; each source field records where the value came from.
      properties:
        capturedAt:
          type: string
          format: date-time
          description: Client timestamp of the drop
        gpsAccuracyM:
          type: number
          nullable: true
          description: Reported GPS accuracy radius in metres
        speedMps:
          type: number
          nullable: true
          description: GPS ground speed in metres/second
        headingDeg:
          type: number
          nullable: true
          description: GPS heading in degrees true (0–360)
        depthM:
          type: number
          nullable: true
          description: Seafloor depth in metres under the drop position, sampled from the loaded terrain
        depthSource:
          type: string
          enum: [terrain, unavailable]
        tideHeightM:
          type: number
          nullable: true
          description: Cached tidal height in metres (MLLW) at drop time
        currentSpeedKt:
          type: number
          nullable: true
          description: Cached current speed prediction in knots
        currentDirDeg:
          type: number
          nullable: true
          description: Cached current direction prediction in degrees true
        tideSource:
          type: string
          enum: [pack, unavailable]
          description: Where the tide/current values came from (offline pack) or unavailable
        windSpeedKnots:
          type: number
          nullable: true
        windDirDeg:
          type: number
          nullable: true
        tempC:
          type: number
          nullable: true
        weatherObservedAt:
          type: string
          nullable: true
          description: ISO timestamp of the cached weather observation
        weatherSource:
          type: string
          enum: [pack, unavailable]
      required:
        - capturedAt
        - depthSource
        - tideSource
        - weatherSource
      additionalProperties: false

    CatchEntry:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        markerId:
          type: string
          description: Marker (spot) this catch belongs to
        symbol:
          type: string
          description: Emoji / symbol representing what was caught
        symbolName:
          type: string
          description: Human-readable name for the symbol (e.g. "Salmon")
        notes:
          type: string
          nullable: true
        photos:
          type: array
          items:
            type: string
          description: Normalized "/objects/…" photo paths in private storage
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - markerId
        - symbol
        - symbolName
        - photos
        - createdAt
        - updatedAt

    CatchEntryInput:
      type: object
      properties:
        symbol:
          type: string
          minLength: 1
          maxLength: 16
        symbolName:
          type: string
          maxLength: 60
          default: ""
        notes:
          type: string
          maxLength: 1000
          nullable: true
        photos:
          type: array
          maxItems: 6
          items:
            type: string
            maxLength: 512
          default: []
      required:
        - symbol
      additionalProperties: false

    CatchEntryPatch:
      type: object
      properties:
        symbol:
          type: string
          minLength: 1
          maxLength: 16
        symbolName:
          type: string
          maxLength: 60
        notes:
          type: string
          maxLength: 1000
          nullable: true
        photos:
          type: array
          maxItems: 6
          items:
            type: string
            maxLength: 512
      additionalProperties: false

    GpsPoint:
      type: object
      properties:
        lon:
          type: number
        lat:
          type: number
        accuracy:
          type: number
          default: 0
        timestamp:
          type: number
          description: Unix ms timestamp
        seq:
          type: integer
          default: 0
      required:
        - lon
        - lat
        - timestamp

    GpsTrail:
      type: object
      properties:
        id:
          type: string
          description: UUID primary key
        userId:
          type: string
        datasetId:
          type: string
        name:
          type: string
        colour:
          type: string
          default: "#ff6600"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        pointCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - datasetId
        - name
        - colour
        - startedAt
        - endedAt
        - pointCount
        - createdAt

    IntertidalSpotProperties:
      type: object
      description: |
        Per-feature properties for a scored intertidal hotspot polygon.
        Extends SubstrateProperties with computed tidepool/beachcombing scores
        and a human-readable score-signals breakdown.
      properties:
        unitId:
          type: string
          description: Stable per-feature id (ShoreZone PHY_IDENT or AOOS OBJECTID)
        substrate:
          type: string
          enum: [bedrock, gravel, sand, mud]
        shoreZoneClass:
          type: string
          description: Human-readable ShoreZone class or AOOS habitat type
        tidepoolScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Tidepool exploration hotspot score 0–100
        beachcombingScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Beachcombing hotspot score 0–100
        szMaterial:
          type: string
          nullable: true
        szForm:
          type: string
          nullable: true
        scoreSignals:
          type: object
          description: Human-readable breakdown of the top contributing score factors
          properties:
            tidepool:
              type: object
              properties:
                substrate: { type: string }
                bioband: { type: string, nullable: true }
                debris: { type: string, nullable: true }
                energy: { type: string, nullable: true }
                humanUse: { type: string, nullable: true }
                whySummary: { type: string }
            beachcombing:
              type: object
              properties:
                substrate: { type: string }
                bioband: { type: string, nullable: true }
                debris: { type: string, nullable: true }
                energy: { type: string, nullable: true }
                humanUse: { type: string, nullable: true }
                whySummary: { type: string }
      required:
        - unitId
        - substrate
        - shoreZoneClass
        - tidepoolScore
        - beachcombingScore

    IntertidalSpotFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        properties:
          $ref: "#/components/schemas/IntertidalSpotProperties"
        geometry:
          type: object
          additionalProperties: true
      required:
        - type
        - properties
        - geometry

    IntertidalSpotFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/IntertidalSpotFeature"
        metadata:
          type: object
          additionalProperties: true
      required:
        - type
        - features

    SubstrateProperties:
      type: object
      description: |
        Per-feature properties for an Alaska ShoreZone substrate polygon.
      properties:
        unitId:
          type: string
          description: ShoreZone PHY_IDENT — stable unit identifier
        substrate:
          type: string
          enum: [bedrock, gravel, sand, mud]
          description: CMECS broad substrate class
        shoreZoneClass:
          type: string
          description: Human-readable ShoreZone class (e.g. "Rock Platform", "Clastic Beach")
        cmecsCode:
          type: string
          description: CMECS substrate classification code and label
        color:
          type: string
          description: Suggested hex color for rendering
        szMaterial:
          type: string
          nullable: true
          description: Raw ShoreZone Mat_Desc (Rock / Clastic / Biogenic)
        szForm:
          type: string
          nullable: true
          description: Raw ShoreZone Form_Desc (Cliff / Platform / Beach / Tidal Flat / Marsh)
        areaSqM:
          type: number
          nullable: true
          description: Polygon area in square metres from the upstream Area attribute
        natsur:
          type: string
          nullable: true
          description: |
            Per-feature citation / classification narrative. For NOAA ENC features
            this is the raw S-57 NATSUR descriptor; for TPWD Texas lake-substrate
            features this is the lake-survey narrative explaining why this polygon
            was classified the way it was (used as the tooltip body).
        natqua:
          type: string
          nullable: true
          description: Raw S-57 NATQUA qualifier (ENC features only)
        encChart:
          type: string
          nullable: true
          description: |
            Provenance link for this feature. For NOAA ENC features this is the
            chart number; for TPWD Texas lake-substrate features this is the
            outbound TPWD lake page URL shown as a "↗ TPWD lake page" link in
            the substrate info card.
      required:
        - unitId
        - substrate
        - shoreZoneClass
        - cmecsCode
        - color

    SubstrateFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        properties:
          $ref: "#/components/schemas/SubstrateProperties"
        geometry:
          type: object
          additionalProperties: true
      required:
        - type
        - properties
        - geometry

    SubstrateFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/SubstrateFeature"
        metadata:
          type: object
          additionalProperties: true
      required:
        - type
        - features

