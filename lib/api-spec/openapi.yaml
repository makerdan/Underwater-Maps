        ambientLightIntensity:
          type: number
          minimum: 0
          maximum: 2
          default: 0.05
          description: Intensity of the ambient (omnidirectional) scene light.
        directionalLightIntensity:
          type: number
          minimum: 0
          maximum: 2
          default: 0.35
          description: Intensity of the primary directional sunlight.
        lampRange:
          type: number
          minimum: 1
          maximum: 200
          default: 40
          description: Range in metres of the camera headlamp point light.
        antialiasing:
          type: boolean
          default: true
          description: Enable anti-aliasing on the 3D canvas.
        showWaterSurface:
          type: boolean
          default: true
          description: Render the sea-level water surface plane over the bathymetry.
        showLandmass:
          type: boolean
          default: false
          description: Render above-water landmass meshing from the terrain topography array.
        landmassStyle:
          type: string
          enum: [realistic, flat]
