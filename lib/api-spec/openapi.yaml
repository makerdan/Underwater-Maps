        Extends SubstrateProperties with computed tidepool/beachcombing scores
        and a human-readable score-signals breakdown.
      properties:
        unitId:
          type: string
          description: Stable per-feature id (ShoreZone PHY_IDENT or AOOS OBJECTID)
        substrate:
          type: string
          enum: [bedrock, gravel, sand, mud]
        shoreZoneClass:
          type: string
          description: Human-readable ShoreZone class or AOOS habitat type
        tidepoolScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Tidepool exploration hotspot score 0–100
        beachcombingScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Beachcombing hotspot score 0–100
        szMaterial:
          type: string
          nullable: true
        szForm:
          type: string
          nullable: true
        scoreSignals:
          type: object
          description: Human-readable breakdown of the top contributing score factors
          properties:
            tidepool:
              type: object
              properties:
                substrate: { type: string }
                bioband: { type: string, nullable: true }
                debris: { type: string, nullable: true }
                energy: { type: string, nullable: true }
                humanUse: { type: string, nullable: true }
                whySummary: { type: string }
            beachcombing:
              type: object
              properties:
                substrate: { type: string }
                bioband: { type: string, nullable: true }
                debris: { type: string, nullable: true }
                energy: { type: string, nullable: true }
                humanUse: { type: string, nullable: true }
                whySummary: { type: string }
      required:
