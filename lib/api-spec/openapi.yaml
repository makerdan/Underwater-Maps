        season:
          type: string
          description: Seasonality / temporal window for this Essential Fish Habitat designation (e.g. "Year-round", "Spawning Feb–Apr")
        source:
          type: string
        creditUrl:
          type: string
        color:
          type: string
          description: Suggested hex color for rendering
      required:
