openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poe
    description: Poe AI proxy operations
  - name: datasets
    description: Bathymetric dataset operations
  - name: markers
    description: Persisted point-of-interest marker operations
  - name: settings
    description: Per-user application settings
  - name: user-datasets
    description: Authenticated user's saved custom terrain datasets
  - name: trails
    description: GPS trail recording operations
  - name: drift-planner
    description: Surface conditions for drift planning
  - name: trolling-presets
    description: Saved trolling heading/speed presets
  - name: trolling-preset-folders
    description: Folders for grouping saved trolling presets
  - name: routes
    description: Saved navigation route operations
  - name: tidal
    description: NOAA tide prediction operations
  - name: admin
    description: Admin-only operations
  - name: account
    description: User account and data export operations
  - name: github
    description: GitHub repository sync operations
  - name: query
    description: OpenAI terrain query (Ask the Ocean) operations
paths:
  /datasets:
    get:
      operationId: getDatasets
      tags: [datasets]
      summary: List available pre-loaded bathymetric regions
      description: Returns metadata for all built-in GEBCO and demo datasets
      parameters:
        - in: query
          name: waterType
          required: false
          description: Filter datasets by water body type
          schema:
            type: string
            enum: [saltwater, freshwater]
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetMeta"

  /datasets/{id}/terrain:
    get:
      operationId: getDatasetsIdTerrain
      tags: [datasets]
      summary: Get gridded terrain data for a dataset
      description: Returns a 256×256 depth grid for the given dataset ID, suitable for building a Three.js terrain mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: integer
            default: 256
            minimum: 32
            maximum: 512
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/preview:
    get:
      operationId: getDatasetsIdPreview
      tags: [datasets]
      summary: Probe which upstream source would serve this dataset
      description: |
        Lightweight preflight that resolves the upstream `dataSource`
        (`ncei` | `gebco` | `synthetic`) for the given dataset without
        transferring the full depth grid. The client uses this to warn the
        user before loading procedurally-generated (synthetic) bathymetry.
        Results are cached briefly per dataset to avoid double-probing
        upstream services when the user immediately confirms.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preflight result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetPreview"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/{id}/overview:
    get:
      operationId: getDatasetsIdOverview
      tags: [datasets]
      summary: Get a low-resolution overview terrain for a dataset
      description: Returns a 64×64 downsampled depth grid for use in the overview map — lightweight alternative to the full terrain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /datasets/upload:
    post:
      operationId: postDatasetsUpload
      tags: [datasets]
      summary: Upload an XYZ or CSV file and persist it to the user's dataset library
      description: |
        Accepts a UTF-8 .xyz or .csv file with lon,lat,depth columns via
        multipart form upload. Auto-detects delimiter, header rows, and column
        order. Authentication is required — every successful upload is
        persisted into the caller's `custom_datasets` library and the new
        row's UUID is returned as `savedDatasetId`. The response also includes
        a full terrain grid and a 64×64 overview grid for the client to
        render immediately without round-tripping to /user/datasets.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: XYZ or CSV file with lon,lat,depth columns
                resolution:
                  type: integer
                  default: 256
                  minimum: 32
                  maximum: 512
                  description: Target grid resolution for the full terrain (overview is always 64)
              required:
                - file
      responses:
        "200":
          description: Parsed terrain and overview grids, persisted to the user's dataset library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: Unparseable file or insufficient valid points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          description: Uploaded file exceeds the server-side size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets:
    get:
      operationId: getUserDatasets
      tags: [user-datasets]
      summary: List the current user's saved custom terrain datasets
      description: Returns metadata for all terrain files the authenticated user has uploaded and saved
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDatasetMeta"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/terrain:
    get:
      operationId: getUserDatasetsIdTerrain
      tags: [user-datasets]
      summary: Get full terrain grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/overview:
    get:
      operationId: getUserDatasetsIdOverview
      tags: [user-datasets]
      summary: Get low-resolution overview grid for a saved user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overview terrain grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerrainData"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}:
    delete:
      operationId: deleteUserDatasetsId
      tags: [user-datasets]
      summary: Delete a saved user terrain dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Dataset deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found or does not belong to current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/move:
    patch:
      operationId: patchUserDatasetsIdMove
      tags: [user-datasets]
      summary: Move a user dataset into a folder (or to the root)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetBody"
      responses:
        "200":
          description: Updated dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid target folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/duplicate:
    post:
      operationId: postUserDatasetsIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a user dataset into the same folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created duplicate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/datasets/{id}/rename:
    patch:
      operationId: patchUserDatasetsIdRename
      tags: [user-datasets]
      summary: Rename a user dataset
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatasetMeta"
        "400":
          description: Invalid name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders:
    get:
      operationId: getUserFolders
      tags: [user-datasets]
      summary: List all dataset folders for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Folder list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetFolder"
    post:
      operationId: postUserFolders
      tags: [user-datasets]
      summary: Create a new folder
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/rename:
    patch:
      operationId: patchUserFoldersIdRename
      tags: [user-datasets]
      summary: Rename a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameDatasetFolderBody"
      responses:
        "200":
          description: Renamed folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid name or duplicate sibling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/move:
    patch:
      operationId: patchUserFoldersIdMove
      tags: [user-datasets]
      summary: Move a folder to a new parent
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDatasetFolderBody"
      responses:
        "200":
          description: Moved folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"
        "400":
          description: Invalid target (cycle or duplicate sibling)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/folders/{id}/duplicate:
    post:
      operationId: postUserFoldersIdDuplicate
      tags: [user-datasets]
      summary: Duplicate a folder (recursive deep copy)
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created folder root
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetFolder"

  /user/folders/{id}:
    delete:
      operationId: deleteUserFoldersId
      tags: [user-datasets]
      summary: Delete a folder
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteDatasetFolderBody"
      responses:
        "204":
          description: Folder deleted
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers:
    get:
      operationId: getMarkers
      tags: [markers]
      summary: List persisted markers for a dataset
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
          description: Dataset slug to filter markers by
      responses:
        "200":
          description: Marker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: postMarkers
      tags: [markers]
      summary: Create a new marker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerInput"
      responses:
        "201":
          description: Created marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/mine:
    delete:
      operationId: deleteMarkersMine
      tags: [markers]
      summary: Delete all markers created by the authenticated user
      description: Permanently deletes every marker where userId matches the Clerk user. Requires authentication.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Number of markers deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /markers/{id}:
    patch:
      operationId: patchMarkersId
      tags: [markers]
      summary: Edit a marker's label, type, or notes
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerPatch"
      responses:
        "200":
          description: Updated marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMarkersId
      tags: [markers]
      summary: Delete a marker by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marker deleted
        "404":
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails:
    get:
      operationId: getTrails
      tags: [trails]
      summary: List GPS trails for a dataset
      security:
        - clerkAuth: []
      parameters:
        - in: query
          name: datasetId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trail list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsTrail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postTrails
      tags: [trails]
      summary: Create a new GPS trail
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsTrailInput"
      responses:
        "201":
          description: Created trail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsTrail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails/{id}:
    delete:
      operationId: deleteTrailsId
      tags: [trails]
      summary: Delete a GPS trail
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Trail deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Trail not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trails/{id}/points:
    get:
      operationId: getTrailsIdPoints
      tags: [trails]
      summary: Get paginated trail points
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Paginated trail points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrailPointsPage"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Trail not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get the current user's settings
      description: Returns stored settings or the default settings object if none are saved yet. Requires authentication.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: putSettings
      tags: [settings]
      summary: Upsert the current user's settings
      description: Stores the full settings object for the authenticated user.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trolling-presets:
    get:
      operationId: getTrollingPresets
      tags: [trolling-presets]
      summary: List the authenticated user's trolling presets
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrollingPreset"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postTrollingPresets
      tags: [trolling-presets]
      summary: Save a new trolling preset
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrollingPresetInput"
      responses:
        "201":
          description: Created preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrollingPreset"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trolling-presets/{id}:
    patch:
      operationId: patchTrollingPresetsId
      tags: [trolling-presets]
      summary: Update a trolling preset's name or sort order
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrollingPresetUpdate"
      responses:
        "200":
          description: Updated preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrollingPreset"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Preset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteTrollingPresetsId
      tags: [trolling-presets]
      summary: Delete a trolling preset by ID
      security:
        - clerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Preset deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Preset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trolling-preset-folders:
    get:
      operationId: getTrollingPresetFolders
      tags: [trolling-preset-folders]
