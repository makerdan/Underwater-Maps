            freshwater:
              type: array
              minItems: 4
              maxItems: 4
              items:
                type: object
                properties:
                  color:
                    type: string
                    pattern: '^#[0-9a-fA-F]{6}$'
                  visible:
                    type: boolean
                required: [color, visible]
        weatherStationsActive:
          type: boolean
          default: false
