packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': 19.2.14
  '@types/react-dom': ^19.2.0
  # Build-critical toolchain: pinned exactly (no caret) because floating minor
  # bumps have silently broken the build before — @vitejs/plugin-react 5.2.0
  # stopped applying the JSX transform under vitest (297 "React is not defined"
  # failures). Bump vite / @vitejs/plugin-react / vitest deliberately, together,
  # and re-run the jsx-sensitive unit tests + testHelpers.bundle.test.ts.
  '@vitejs/plugin-react': 5.2.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: 4.21.0
  # vite pinned (see toolchain note above); bathyscan pins vite 8.x directly
  # in its own package.json.
  vite: 7.3.6
  # vitest pinned (see toolchain note above); consumed via catalog: by all
  # test-bearing packages.
  vitest: 3.2.7
  wouter: ^3.10.0
  zod: 3.25.76

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # ── Security overrides (2025-07-17) ─────────────────────────────────────────
  # Intentionally accepted low-severity findings (not overridden):
  #   • esbuild >=0.27.3 <0.28.1 (GHSA-g7r4-m6w7-qqqr): arbitrary file read on
  #     Windows dev server only; pinned at 0.27.3 to avoid platform-binary churn;
  #     Linux-only deployment is not affected.
  # All moderate/high/critical findings are resolved via the overrides below.
  # @babel/core <=7.29.0 (GHSA-4x5r-pxfx-6jf8): sourceMappingURL arbitrary file
  # read via eslint-plugin-react-hooks; dev/lint toolchain only. Overridden to
  # close the finding proactively; remove once eslint-plugin-react-hooks bumps its
  # own @babel/core peer to >=7.29.6.
  '@babel/core': '^7.29.6'
  # Security: pin vulnerable transitive deps to patched versions (2025-07-17)
  # form-data <4.0.6 / <2.5.6: CRLF injection via @types/supertest and @google-cloud/storage chains
  form-data: '>=4.0.6'
  # linkify-it <=5.0.0: quadratic scan loop via orval->typedoc->markdown-it; build-only exposure
  linkify-it: '>=5.0.1'
  # markdown-it <=14.1.1: quadratic DoS in smartquotes via orval->typedoc; build-only exposure
  markdown-it: '>=14.2.0'
  # js-yaml <=4.1.1: quadratic DoS in merge-key via orval; build-only exposure.
  # Use ">=4.2.0 <5" to stay in the 4.x series (4.3.0 is the patched release)
  # and avoid v5.x which has a different ESM export shape that breaks orval.
  js-yaml: '>=4.2.0 <5'
  # undici: cannot override to >=7.28.0 — jsdom 29.1.1 hard-requires internal
  # paths removed in 7.28.0 (lib/handler/wrap-handler.js), breaking all Vitest tests.
  # Documented as exception in check-audit.mjs + security-audit-exceptions.md.
  # vite <=7.3.4: server.fs.deny bypass + NTLMv2 hash disclosure on Windows;
  # bumped to ^7.3.5 in catalog above for bathyscan; override also covers api-server->vitest->vite path
  vite: '>=7.3.5'
